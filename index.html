<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#e8e3d7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.wall{

width:95vw;
max-width:1100px;

aspect-ratio:16/10;

background:#d2cdc4;
border-radius:20px;

display:grid;

/* マス目 */
grid-template-columns:repeat(40,1fr);
grid-template-rows:repeat(25,1fr);

gap:6px;
padding:20px;

}

/* フレーム共通 */

.frame{
width:100%;
height:100%;

background-size:100% 100%;
background-repeat:no-repeat;
background-position:center;
}

/* ===== 比率固定 ===== */

.vertical{
aspect-ratio:894 / 1063;
background-image:url(frame_vertical.png);
}

.square{
aspect-ratio:1053 / 1052;
background-image:url(frame_square.png);
}

.horizontal{
aspect-ratio:1063 / 894;
background-image:url(frame_horizontal.png);
}

/* ===== 配置 ===== */

.f1{
grid-column:2 / span 4;
grid-row:10 / span 10;
}

.f2{
grid-column:8 / span 7;
grid-row:4 / span 7;
}

.f3{
grid-column:17 / span 6;
grid-row:1 / span 11;
}

.f4{
grid-column:25 / span 6;
grid-row:5 / span 6;
}

.f5{
grid-column:32 / span 8;
grid-row:5 / span 7;
}

.f6{
grid-column:9 / span 9;
grid-row:15 / span 7;
}

.f7{
grid-column:19 / span 7;
grid-row:15 / span 9;
}

.f8{
grid-column:29 / span 4;
grid-row:15 / span 9;
}

</style>
</head>

<body>

<div class="wall">

<div class="frame vertical f1"></div>

<div class="frame square f2"></div>

<div class="frame vertical f3"></div>

<div class="frame horizontal f4"></div>

<div class="frame horizontal f5"></div>

<div class="frame horizontal f6"></div>

<div class="frame square f7"></div>

<div class="frame vertical f8"></div>

</div>

</body>
</html>
