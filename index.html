<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>KABEPIC Story8 Grid Spec</title>
  <style>
    :root {
      --canvas-w: 2400;
      --canvas-h: 1500;
      --cell: 10px;
      --page-bg: #1f1f1f;
      --board-bg: #ffffff;
      --grid-line: rgba(0, 0, 0, 0.11);
      --grid-line-bold: rgba(0, 0, 0, 0.20);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      --label-bg: rgba(35, 35, 35, 0.85);
      --label-fg: #fff;
      --hole-stroke: rgba(70, 70, 70, 0.40);
      --hole-fill: rgba(255,255,255,0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    #boardWrap {
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    #board {
      position: relative;
      width: calc(var(--canvas-w) * 1px);
      height: calc(var(--canvas-h) * 1px);
      background:
        linear-gradient(to right, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to bottom, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-color: var(--board-bg);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .frame {
      position: absolute;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center center;
    }

    .hole {
      position: absolute;
      border: 2px solid var(--hole-stroke);
      background: var(--hole-fill);
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translateX(-50%);
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--label-bg);
      color: var(--label-fg);
      font-size: 20px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      color: #111;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      font-size: 13px;
      line-height: 1.55;
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story8 / 10pxマス固定版</strong>
    外枠・内枠・余白を全部マス数で指定
  </div>

  <div id="app">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CANVAS_W = 2400;
      const CANVAS_H = 1500;
      const CELL = 10;

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      /*
        すべて 10px マス数で指定
        x, y, w, h も inset も全部マス数
      */
      const frames = [
        {
          id: 1,
          asset: "frame_vertical.png",
          x: 4,  y: 51, w: 31, h: 39,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 2,
          asset: "frame_square.png",
          x: 43, y: 31, w: 39, h: 39,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 3,
          asset: "frame_vertical.png",
          x: 91, y: 5,  w: 47, h: 58,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 4,
          asset: "frame_horizontal.png",
          x: 146, y: 43, w: 33, h: 22,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 5,
          asset: "frame_horizontal.png",
          x: 190, y: 46, w: 45, h: 30,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 6,
          asset: "frame_horizontal.png",
          x: 40, y: 75, w: 42, h: 29,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 7,
          asset: "frame_square.png",
          x: 93, y: 74, w: 42, h: 42,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        },
        {
          id: 8,
          asset: "frame_vertical.png",
          x: 147, y: 74, w: 29, h: 38,
          inset: { t: 4, r: 4, b: 4, l: 4 }
        }
      ];

      function px(n) {
        return `${n}px`;
      }

      function createFrame(frame) {
        const el = document.createElement("div");
        el.className = "frame";
        el.style.left = px(frame.x * CELL);
        el.style.top = px(frame.y * CELL);
        el.style.width = px(frame.w * CELL);
        el.style.height = px(frame.h * CELL);
        el.style.backgroundImage = `url("${frame.asset}")`;

        const hole = document.createElement("div");
        hole.className = "hole";
        hole.style.left = px(frame.inset.l * CELL);
        hole.style.top = px(frame.inset.t * CELL);
        hole.style.width = px((frame.w - frame.inset.l - frame.inset.r) * CELL);
        hole.style.height = px((frame.h - frame.inset.t - frame.inset.b) * CELL);

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = String(frame.id);

        el.appendChild(hole);
        el.appendChild(label);
        return el;
      }

      function render() {
        board.innerHTML = "";
        frames.forEach((frame) => {
          board.appendChild(createFrame(frame));
        });
      }

      function fitBoard() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / CANVAS_W, vh / CANVAS_H) * 0.94;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fitBoard();
      window.addEventListener("resize", fitBoard);
    })();
  </script>
</body>
</html>
