<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KABEPIC</title>

<style>

body{
margin:0;
font-family:-apple-system;
background:#efe6d8;
}

.wall{
position:relative;
width:100%;
height:80vh;
background:#f2eadc;
overflow:hidden;
}

.frame{
position:absolute;
width:180px;
height:180px;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
}

.square{
background-image:url("frame_square.png");
}

.vertical{
background-image:url("frame_vertical.png");
}

.horizontal{
background-image:url("frame_horizontal.png");
}

.oval{
background-image:url("frame_oval.png");
-webkit-mask-image:url("mask_oval.png");
mask-image:url("mask_oval.png");
-webkit-mask-size:contain;
mask-size:contain;
}

</style>
</head>

<body>

<div class="wall">

<div class="frame square" style="top:40px;left:30px;">
<img src="https://picsum.photos/300?1">
</div>

<div class="frame vertical" style="top:40px;left:230px;">
<img src="https://picsum.photos/300?2">
</div>

<div class="frame horizontal" style="top:220px;left:100px;">
<img src="https://picsum.photos/300?3">
</div>

<div class="frame oval" style="top:220px;left:320px;">
<img src="https://picsum.photos/300?4">
</div>

</div>

</body>
    </html>
