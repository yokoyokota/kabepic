<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
  />
  <title>KABEPIC</title>
  <meta name="description" content="思い出を、暮らしの背景に。" />
  <style>
    :root {
      --wall-bg: #f2ede3;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --panel-line: rgba(0, 0, 0, 0.08);
      --text: #1d1d1d;
      --muted: #6f685f;
      --accent: #2f5bda;
      --accent-soft: rgba(47, 91, 218, 0.10);
      --danger: #c84a4a;
      --shadow-lg: 0 18px 36px rgba(0, 0, 0, 0.12);
      --shadow-md: 0 10px 18px rgba(0, 0, 0, 0.10);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --world-w: 2400;
      --world-h: 1500;
      --fade-ms: 1200ms;
      --toolbar-h: 62px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--wall-bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body.display-mode {
      background: var(--wall-bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--wall-bg);
    }

    .toolbar {
      position: fixed;
      top: calc(var(--safe-top) + 12px);
      left: 12px;
      right: 12px;
      z-index: 3000;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: var(--toolbar-h);
      padding: 8px 10px;
      border-radius: 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand {
      flex-shrink: 0;
      font-weight: 900;
      font-size: 1.04rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding: 0 4px 0 2px;
    }

    .toolbar-scroll {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .toolbar-scroll::-webkit-scrollbar {
      display: none;
    }

    .toolbar-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-mini {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-md);
      font-weight: 900;
      white-space: nowrap;
      transition:
        transform 140ms ease,
        background 140ms ease,
        color 140ms ease,
        opacity 140ms ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.soft {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(47, 91, 218, 0.12);
      box-shadow: none;
    }

    .btn.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.danger {
      color: var(--danger);
    }

    .btn[disabled] {
      opacity: 0.55;
      pointer-events: none;
    }

    .menu {
      position: fixed;
      top: calc(var(--safe-top) + 78px);
      right: 12px;
      z-index: 2900;
      min-width: 210px;
      padding: 8px;
      border-radius: 18px;
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .menu.open {
      display: flex;
    }

    .menu.frames {
      right: auto;
      left: 120px;
      min-width: 220px;
    }

    .menu-item {
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
    }

    .menu-item.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: var(--wall-bg);
    }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: calc(var(--world-w) * 1px);
      height: calc(var(--world-h) * 1px);
      transform-origin: top left;
      will-change: transform;
    }

    .stage {
      position: relative;
      width: calc(var(--world-w) * 1px);
      height: calc(var(--world-h) * 1px);
      background: var(--wall-bg);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,0.18), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.02));
    }

    body.display-mode .toolbar,
    body.display-mode .menu,
    body.display-mode .selection-bar,
    body.display-mode .photo-sheet {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .frame {
      position: absolute;
      z-index: 1;
      user-select: none;
      transition:
        left 240ms ease,
        top 240ms ease,
        width 240ms ease,
        height 240ms ease,
        filter 180ms ease;
    }

    .frame.selected {
      z-index: 50 !important;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,0.18));
    }

    .frame-outline {
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      border: 3px solid rgba(47, 91, 218, 0.18);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .frame.selected .frame-outline {
      opacity: 1;
    }

    .photo-viewport {
      position: absolute;
      top: var(--pv-top);
      right: var(--pv-right);
      bottom: var(--pv-bottom);
      left: var(--pv-left);
      z-index: 2;
      overflow: hidden;
      background: transparent;
      touch-action: none;
    }

    .photo-viewport.oval {
      border-radius: 9999px;
      clip-path: ellipse(50% 50% at 50% 50%);
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--fade-ms) ease;
    }

    .photo-layer.active {
      opacity: 1;
    }

    .photo-box {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: transparent;
    }

    .photo-inner {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
      will-change: transform, width, height;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo-inner img {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .frame-art-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .frame-art {
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
    }

    .frame-badge {
      position: absolute;
      top: -16px;
      left: -16px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(16, 24, 44, 0.96);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.16);
      font-size: 0.94rem;
      font-weight: 900;
      box-shadow: 0 10px 18px rgba(0,0,0,0.20);
      z-index: 7;
      cursor: grab;
      touch-action: none;
    }

    .resize-handle {
      position: absolute;
      right: -13px;
      bottom: -13px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255,255,255,0.98);
      border: 3px solid rgba(47, 91, 218, 0.92);
      box-shadow: 0 8px 16px rgba(0,0,0,0.14);
      z-index: 7;
      touch-action: none;
    }

    .frame-pin {
      position: absolute;
      top: -10px;
      right: -10px;
      min-width: 40px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 7;
    }

    .frame.locked .frame-pin {
      display: inline-flex;
    }

    body.display-mode .frame-outline,
    body.display-mode .frame-badge,
    body.display-mode .resize-handle,
    body.display-mode .frame-pin {
      display: none !important;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: rgba(0,0,0,0.38);
      font-weight: 900;
      text-align: center;
      padding: 14px;
    }

    .empty-state > span {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1px dashed rgba(0,0,0,0.14);
      box-shadow: 0 6px 14px rgba(0,0,0,0.06);
      font-size: 12px;
    }

    body.display-mode .empty-state {
      display: none !important;
    }

    .selection-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(var(--safe-bottom) + 12px);
      z-index: 2600;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 12px;
      border-radius: 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      scrollbar-width: none;
    }

    .selection-bar::-webkit-scrollbar {
      display: none;
    }

    .photo-sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(var(--safe-bottom) + 12px);
      z-index: 2700;
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform: translateY(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
      transition: transform 220ms ease, opacity 220ms ease;
      overflow: hidden;
    }

    .photo-sheet.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-line);
    }

    .sheet-title {
      font-size: 1.1rem;
      font-weight: 900;
    }

    .sheet-meta {
      color: var(--muted);
      font-weight: 800;
      margin-top: 2px;
      font-size: 0.9rem;
    }

    .sheet-body {
      padding: 14px;
      max-height: min(52vh, 500px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 10px;
    }

    .thumb-card {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--panel-line);
      background: #f7f4ee;
      box-shadow: var(--shadow-md);
      min-height: 96px;
    }

    .thumb-card.selected {
      outline: 3px solid rgba(47, 91, 218, 0.22);
      outline-offset: 2px;
    }

    .thumb-card > button.preview {
      width: 100%;
      height: 100%;
      padding: 0;
      display: block;
    }

    .thumb-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-badge {
      position: absolute;
      left: 6px;
      bottom: 6px;
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(20,20,20,0.78);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-delete {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
      color: var(--danger);
      font-weight: 900;
      z-index: 2;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 4000;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .viewer.open {
      display: flex;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 18px 30px rgba(0,0,0,0.28);
    }

    .viewer-close {
      position: absolute;
      top: calc(var(--safe-top) + 14px);
      right: 14px;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .progress-overlay {
      position: fixed;
      inset: 0;
      z-index: 4500;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .progress-overlay.show {
      display: flex;
    }

    .progress-card {
      width: min(90vw, 360px);
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      border-radius: 22px;
      padding: 18px 18px 16px;
      text-align: center;
    }

    .progress-title {
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .progress-text {
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: #ece6db;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--accent);
      transition: width 180ms ease;
    }

    #displayHint {
      position: fixed;
      top: calc(var(--safe-top) + 14px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 4200;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(20, 28, 48, 0.80);
      color: #fff;
      font-weight: 900;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }

    body.display-mode #displayHint.show {
      opacity: 1;
    }

    #toast {
      position: fixed;
      top: calc(var(--safe-top) + 86px);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 5000;
      max-width: min(92vw, 560px);
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      text-align: center;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 760px) {
      .brand {
        display: none;
      }

      .menu.frames {
        left: 12px;
        right: 12px;
        min-width: auto;
      }

      .thumb-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <input id="photoInput" class="hidden" type="file" accept="image/*" multiple />

    <div id="toolbar" class="toolbar">
      <div class="brand">KABEPIC</div>

      <div class="toolbar-scroll">
        <button id="addPhotosBtn" class="btn primary">＋写真追加</button>
        <button id="framesBtn" class="btn">Frames</button>
        <button id="photosBtn" class="btn">写真一覧</button>
        <button id="displayBtn" class="btn">▶ 表示</button>
        <button id="fitBtn" class="btn soft">全体</button>
      </div>

      <div class="toolbar-right">
        <div id="statusMini" class="status-mini">写真 0枚</div>
        <button id="moreBtn" class="btn">⋯</button>
      </div>
    </div>

    <div id="framesMenu" class="menu frames"></div>

    <div id="moreMenu" class="menu">
      <button id="saveBtn" class="menu-item">保存</button>
      <button id="loadBtn" class="menu-item">読込</button>
      <button id="resetBtn" class="menu-item danger">現在セットを初期位置に戻す</button>
    </div>

    <div id="viewport" class="viewport">
      <div id="world" class="world">
        <div id="stage" class="stage"></div>
      </div>
    </div>

    <div id="selectionBar" class="selection-bar hidden">
      <button id="toggleStyleBtn" class="btn">装飾切替</button>
      <button id="toggleOvalBtn" class="btn">楕円</button>
      <button id="pinPhotoBtn" class="btn soft">写真固定</button>
      <button id="unpinPhotoBtn" class="btn soft">固定解除</button>
      <button id="openPhotosBtn" class="btn soft">写真一覧を開く</button>
      <div id="selectionMeta" class="status-mini">選択なし</div>
    </div>

    <div id="photoSheet" class="photo-sheet">
      <div class="sheet-head">
        <div>
          <div class="sheet-title">写真一覧</div>
          <div id="sheetMeta" class="sheet-meta">0枚</div>
        </div>
        <button id="closeSheetBtn" class="btn">閉じる</button>
      </div>
      <div class="sheet-body">
        <div id="thumbGrid" class="thumb-grid"></div>
      </div>
    </div>

    <div id="viewer" class="viewer">
      <button id="viewerClose" class="viewer-close">×</button>
      <img id="viewerImage" alt="" />
    </div>

    <div id="progressOverlay" class="progress-overlay">
      <div class="progress-card">
        <div class="progress-title">写真を追加中…</div>
        <div id="progressText" class="progress-text">0 / 0</div>
        <div class="progress-bar">
          <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="displayHint">タップで編集に戻る</div>
    <div id="toast"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "kabepic_static_v11";
      const DB_NAME = "kabepic_static_photos_v11";
      const STORE_NAME = "photos";

      const WORLD_W = 2400;
      const WORLD_H = 1500;
      const EDGE_MARGIN = 42;
      const MIN_WIDTH = 180;
      const MAX_WIDTH = 900;
      const HOLD_MS = 420;
      const SWITCH_MIN_MS = 25000;
      const SWITCH_MAX_MS = 35000;
      const FADE_MS = 1200;
      const JPEG_QUALITY = 0.84;
      const MAX_LONG_EDGE = 1600;

      const $ = (id) => document.getElementById(id);

      const els = {
        viewport: $("viewport"),
        world: $("world"),
        stage: $("stage"),
        photoInput: $("photoInput"),
        addPhotosBtn: $("addPhotosBtn"),
        framesBtn: $("framesBtn"),
        photosBtn: $("photosBtn"),
        displayBtn: $("displayBtn"),
        fitBtn: $("fitBtn"),
        moreBtn: $("moreBtn"),
        saveBtn: $("saveBtn"),
        loadBtn: $("loadBtn"),
        resetBtn: $("resetBtn"),
        framesMenu: $("framesMenu"),
        moreMenu: $("moreMenu"),
        statusMini: $("statusMini"),
        selectionBar: $("selectionBar"),
        toggleStyleBtn: $("toggleStyleBtn"),
        toggleOvalBtn: $("toggleOvalBtn"),
        pinPhotoBtn: $("pinPhotoBtn"),
        unpinPhotoBtn: $("unpinPhotoBtn"),
        openPhotosBtn: $("openPhotosBtn"),
        selectionMeta: $("selectionMeta"),
        photoSheet: $("photoSheet"),
        closeSheetBtn: $("closeSheetBtn"),
        thumbGrid: $("thumbGrid"),
        sheetMeta: $("sheetMeta"),
        viewer: $("viewer"),
        viewerImage: $("viewerImage"),
        viewerClose: $("viewerClose"),
        progressOverlay: $("progressOverlay"),
        progressText: $("progressText"),
        progressBarFill: $("progressBarFill"),
        displayHint: $("displayHint"),
        toast: $("toast")
      };

      const FRAME_SET_LABELS = {
        calm: "Calm 3",
        flow: "Flow 5",
        story: "Story 8",
        scene: "Scene 11"
      };

      /*
        配置はここだけ直せばよいように独立。
        今回は直近の配置資料ベースで固定しています。
      */
      const LAYOUTS = {
        calm: [
          { slot: 1, kind: "vertical",          x: 520,  y: 90,   w: 540 },
          { slot: 2, kind: "square",            x: 1200, y: 260,  w: 400 },
          { slot: 3, kind: "horizontal",        x: 760,  y: 830,  w: 680 }
        ],
        flow: [
          { slot: 1, kind: "vertical",          x: 110,  y: 420,  w: 380 },
          { slot: 2, kind: "vertical",          x: 590,  y: 70,   w: 540 },
          { slot: 3, kind: "square",            x: 1220, y: 210,  w: 380 },
          { slot: 4, kind: "square_simple",     x: 1780, y: 310,  w: 320 },
          { slot: 5, kind: "horizontal",        x: 720,  y: 790,  w: 700 }
        ],
        story: [
          { slot: 1, kind: "vertical",          x: 70,   y: 460,  w: 300 },
          { slot: 2, kind: "square",            x: 470,  y: 250,  w: 380 },
          { slot: 3, kind: "vertical_simple",   x: 930,  y: 70,   w: 520 },
          { slot: 4, kind: "vertical",          x: 1500, y: 240,  w: 360 },
          { slot: 5, kind: "horizontal_simple", x: 1820, y: 500,  w: 500 },
          { slot: 6, kind: "square",            x: 420,  y: 770,  w: 330 },
          { slot: 7, kind: "vertical",          x: 1280, y: 720,  w: 360 },
          { slot: 8, kind: "square_simple",     x: 1740, y: 720,  w: 360 }
        ],
        scene: [
          { slot: 1,  kind: "square_simple",     x: 60,   y: 170,  w: 340 },
          { slot: 2,  kind: "square",            x: 480,  y: 100,  w: 420 },
          { slot: 3,  kind: "vertical_simple",   x: 1010, y: 40,   w: 300 },
          { slot: 4,  kind: "vertical",          x: 930,  y: 470,  w: 450 },
          { slot: 5,  kind: "vertical",          x: 1450, y: 210,  w: 300 },
          { slot: 6,  kind: "square_simple",     x: 1810, y: 260,  w: 290 },
          { slot: 7,  kind: "square",            x: 230,  y: 760,  w: 280 },
          { slot: 8,  kind: "vertical_simple",   x: 570,  y: 720,  w: 300 },
          { slot: 9,  kind: "square",            x: 980,  y: 1070, w: 340 },
          { slot: 10, kind: "horizontal",        x: 1430, y: 760,  w: 500 },
          { slot: 11, kind: "square_simple",     x: 1970, y: 760,  w: 290 }
        ]
      };

      /*
        ratio と inset は frame.png の見た目から合わせる前提。
        ここは Claude 案の考え方だけ使い、数値は整え直し。
      */
      const FRAME_SPECS = {
        vertical: {
          family: "vertical",
          ratio: 0.72,
          art: "frame_vertical.png",
          fallback: "frame_vertical.png",
          inset: { top: 16.2, right: 22.2, bottom: 16.2, left: 22.2 }
        },
        vertical_simple: {
          family: "vertical",
          ratio: 0.72,
          art: "frame_vertical_simple.png",
          fallback: "frame_vertical.png",
          inset: { top: 16.0, right: 19.8, bottom: 16.0, left: 19.8 }
        },
        horizontal: {
          family: "horizontal",
          ratio: 1.28,
          art: "frame_horizontal.png",
          fallback: "frame_horizontal.png",
          inset: { top: 18.6, right: 16.4, bottom: 18.6, left: 16.4 }
        },
        horizontal_simple: {
          family: "horizontal",
          ratio: 1.28,
          art: "frame_horizontal_simple.png",
          fallback: "frame_horizontal.png",
          inset: { top: 17.0, right: 15.0, bottom: 17.0, left: 15.0 }
        },
        square: {
          family: "square",
          ratio: 1,
          art: "frame_square.png",
          fallback: "frame_square.png",
          inset: { top: 18.2, right: 18.2, bottom: 18.2, left: 18.2 }
        },
        square_simple: {
          family: "square",
          ratio: 1,
          art: "frame_square_simple.png",
          fallback: "frame_square.png",
          inset: { top: 15.2, right: 15.2, bottom: 15.2, left: 15.2 }
        },
        oval: {
          family: "vertical",
          ratio: 0.78,
          art: "frame_oval.png",
          fallback: "frame_oval.png",
          inset: { top: 12.5, right: 20.0, bottom: 12.5, left: 20.0 },
          oval: true
        }
      };

      const state = {
        db: null,
        mode: "edit",
        layout: "story",
        photos: [],
        frames: [],
        selectedFrameId: null,
        selectedPhotoId: null,
        fitScale: 1,
        editScale: 1,
        panX: 0,
        panY: 0,
        sheetOpen: false,
        viewerOpen: false,
        isUploading: false,
        toastTimer: null,
        holdTimer: null,
        pinchStartDistance: 0,
        pinchStartScale: 1,
        pinchStartPanX: 0,
        pinchStartPanY: 0,
        pinchWorldX: 0,
        pinchWorldY: 0
      };

      function uid(prefix = "id") {
        return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomMs(min, max) {
        return Math.floor(min + Math.random() * (max - min));
      }

      function showToast(message, ms = 2200) {
        clearTimeout(state.toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        state.toastTimer = setTimeout(() => {
          els.toast.classList.remove("show");
        }, ms);
      }

      function setUploading(flag, current = 0, total = 0) {
        state.isUploading = flag;
        els.addPhotosBtn.disabled = flag;
        els.photoInput.disabled = flag;
        els.progressOverlay.classList.toggle("show", flag);
        if (flag) {
          els.progressText.textContent = `${current} / ${total}`;
          const percent = total ? Math.round((current / total) * 100) : 0;
          els.progressBarFill.style.width = `${percent}%`;
          els.statusMini.textContent = `${current} / ${total}`;
        } else {
          els.progressBarFill.style.width = "0%";
          els.statusMini.textContent = `写真 ${state.photos.length}枚`;
        }
      }

      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      function dbPut(photo) {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).put(photo);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      function dbDelete(photoId) {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).delete(photoId);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      function dbGetAll() {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readonly");
          const req = tx.objectStore(STORE_NAME).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      function saveState() {
        const payload = {
          mode: state.mode,
          layout: state.layout,
          editScale: state.editScale,
          panX: state.panX,
          panY: state.panY,
          frames: state.frames.map((frame) => ({
            id: frame.id,
            slot: frame.slot,
            kind: frame.kind,
            baseKind: frame.baseKind,
            x: frame.x,
            y: frame.y,
            w: frame.w,
            focusX: frame.focusX,
            focusY: frame.focusY,
            pinnedPhotoId: frame.pinnedPhotoId || null,
            currentPhotoId: frame.currentPhotoId || null,
            queue: frame.queue || [],
            queueIndex: frame.queueIndex || 0
          }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
          const parsed = JSON.parse(raw);
          state.mode = parsed.mode === "display" ? "display" : "edit";
          state.layout = parsed.layout || "story";
          state.editScale = Number(parsed.editScale || 1);
          state.panX = Number(parsed.panX || 0);
          state.panY = Number(parsed.panY || 0);
          state.frames = (parsed.frames || []).map(normalizeFrame);
          return state.frames.length > 0;
        } catch {
          return false;
        }
      }

      function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      function fitWithin(width, height, maxLongEdge) {
        const longEdge = Math.max(width, height);
        if (longEdge <= maxLongEdge) return { width, height };
        const scale = maxLongEdge / longEdge;
        return {
          width: Math.round(width * scale),
          height: Math.round(height * scale)
        };
      }

      function bucketFor(width, height) {
        const ratio = width / height;
        if (ratio > 1.05) return "horizontal";
        if (ratio < 0.95) return "vertical";
        return "square";
      }

      async function compressImage(file) {
        const src = await fileToDataURL(file);
        const img = await loadImage(src);
        const fitted = fitWithin(img.width, img.height, MAX_LONG_EDGE);

        const canvas = document.createElement("canvas");
        canvas.width = fitted.width;
        canvas.height = fitted.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, fitted.width, fitted.height);

        return {
          id: uid("photo"),
          name: file.name,
          width: fitted.width,
          height: fitted.height,
          bucket: bucketFor(fitted.width, fitted.height),
          dataUrl: canvas.toDataURL("image/jpeg", JPEG_QUALITY),
          createdAt: Date.now()
        };
      }

      function frameHeight(frame) {
        return frame.w / FRAME_SPECS[frame.kind].ratio;
      }

      function rectOf(frame) {
        return {
          left: frame.x,
          top: frame.y,
          right: frame.x + frame.w,
          bottom: frame.y + frameHeight(frame)
        };
      }

      function overlaps(a, b) {
        return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
      }

      function collides(candidate, ignoreId = null) {
        const rect = rectOf(candidate);
        return state.frames.some((frame) => {
          if (frame.id === ignoreId) return false;
          return overlaps(rect, rectOf(frame));
        });
      }

      function photoById(id) {
        return state.photos.find((photo) => photo.id === id) || null;
      }

      function getCurrentFrame() {
        return state.frames.find((frame) => frame.id === state.selectedFrameId) || null;
      }

      function fitFrameInside(frame) {
        frame.w = clamp(frame.w, MIN_WIDTH, MAX_WIDTH);
        const h = frameHeight(frame);
        frame.x = clamp(frame.x, EDGE_MARGIN, WORLD_W - frame.w - EDGE_MARGIN);
        frame.y = clamp(frame.y, EDGE_MARGIN, WORLD_H - h - EDGE_MARGIN);
      }

      function normalizeFrame(frame) {
        const next = {
          id: frame.id || uid("frame"),
          slot: frame.slot || 0,
          kind: frame.kind,
          baseKind: frame.baseKind || frame.kind,
          x: Number(frame.x),
          y: Number(frame.y),
          w: Number(frame.w),
          focusX: Number.isFinite(frame.focusX) ? frame.focusX : 50,
          focusY: Number.isFinite(frame.focusY) ? frame.focusY : 50,
          pinnedPhotoId: frame.pinnedPhotoId || null,
          currentPhotoId: frame.currentPhotoId || null,
          previousPhotoId: null,
          activeLayer: 0,
          timer: null,
          queue: Array.isArray(frame.queue) ? frame.queue.slice() : [],
          queueIndex: Number(frame.queueIndex || 0)
        };
        fitFrameInside(next);
        return next;
      }

      function createLayoutFrames(layoutKey) {
        return LAYOUTS[layoutKey].map((item) => normalizeFrame({
          id: uid("frame"),
          slot: item.slot,
          kind: item.kind,
          baseKind: item.kind,
          x: item.x,
          y: item.y,
          w: item.w,
          focusX: 50,
          focusY: 50,
          pinnedPhotoId: null,
          currentPhotoId: null,
          queue: [],
          queueIndex: 0
        }));
      }

      function closeMenus() {
        els.moreMenu.classList.remove("open");
        els.framesMenu.classList.remove("open");
      }

      function clearTimer(frame) {
        if (frame.timer) clearTimeout(frame.timer);
        frame.timer = null;
      }

      function clearAllTimers() {
        state.frames.forEach(clearTimer);
      }

      function shuffle(arr) {
        const copy = arr.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function familyForKind(kind) {
        return FRAME_SPECS[kind].family;
      }

      function poolForFamily(family) {
        if (family === "vertical") {
          const verticals = state.photos.filter((p) => p.bucket === "vertical");
          return verticals.length ? verticals : state.photos.slice();
        }
        if (family === "horizontal") {
          const horizontals = state.photos.filter((p) => p.bucket === "horizontal");
          return horizontals.length ? horizontals : state.photos.slice();
        }
        const squares = state.photos.filter((p) => p.bucket === "square");
        return squares.length ? squares : state.photos.slice();
      }

      function rebuildFrameQueues() {
        const pools = {
          vertical: shuffle(poolForFamily("vertical").map((p) => p.id)),
          horizontal: shuffle(poolForFamily("horizontal").map((p) => p.id)),
          square: shuffle(poolForFamily("square").map((p) => p.id))
        };

        state.frames.forEach((frame) => {
          const family = familyForKind(frame.kind);
          frame.queue = pools[family].slice();
          frame.queueIndex = 0;
        });
      }

      function visiblePhotoIds(exceptFrameId = null) {
        return new Set(
          state.frames
            .filter((frame) => frame.id !== exceptFrameId)
            .map((frame) => frame.currentPhotoId)
            .filter(Boolean)
        );
      }

      function nextPhotoForFrame(frame) {
        if (frame.pinnedPhotoId) {
          return photoById(frame.pinnedPhotoId);
        }

        const family = familyForKind(frame.kind);
        let pool = frame.queue && frame.queue.length ? frame.queue.slice() : poolForFamily(family).map((p) => p.id);
        if (!pool.length) pool = state.photos.map((p) => p.id);
        if (!pool.length) return null;

        const visible = visiblePhotoIds(frame.id);
        const current = frame.currentPhotoId;
        let attempts = 0;

        while (attempts < pool.length * 3) {
          if (frame.queueIndex >= pool.length) {
            frame.queue = shuffle(pool);
            frame.queueIndex = 0;
          }

          const candidateId = frame.queue[frame.queueIndex];
          frame.queueIndex += 1;

          const candidate = photoById(candidateId);
          if (!candidate) {
            attempts += 1;
            continue;
          }
          if (candidate.id === current) {
            attempts += 1;
            continue;
          }
          if (visible.has(candidate.id)) {
            attempts += 1;
            continue;
          }
          return candidate;
        }

        return state.photos.find((p) => p.id !== current) || state.photos[0] || null;
      }

      function ensureCurrentPhotos() {
        if (!state.photos.length) {
          state.frames.forEach((frame) => {
            frame.currentPhotoId = null;
            frame.previousPhotoId = null;
            frame.pinnedPhotoId = null;
          });
          return;
        }

        if (!state.frames.every((frame) => Array.isArray(frame.queue) && frame.queue.length)) {
          rebuildFrameQueues();
        }

        state.frames.forEach((frame) => {
          if (frame.pinnedPhotoId && !photoById(frame.pinnedPhotoId)) frame.pinnedPhotoId = null;
          if (frame.currentPhotoId && !photoById(frame.currentPhotoId)) frame.currentPhotoId = null;
          if (frame.previousPhotoId && !photoById(frame.previousPhotoId)) frame.previousPhotoId = null;
        });

        state.frames.forEach((frame) => {
          if (!frame.currentPhotoId) {
            const next = nextPhotoForFrame(frame);
            frame.currentPhotoId = next ? next.id : null;
          }
        });
      }

      function scheduleSwitch(frame) {
        clearTimer(frame);
        if (state.mode !== "display") return;
        if (frame.pinnedPhotoId) return;
        if (state.photos.length <= 1) return;

        frame.timer = setTimeout(() => {
          rotateFrame(frame.id);
        }, randomMs(SWITCH_MIN_MS, SWITCH_MAX_MS));
      }

      function startDisplayTimers() {
        clearAllTimers();
        if (state.mode !== "display") return;
        ensureCurrentPhotos();
        state.frames.forEach(scheduleSwitch);
      }

      function rotateFrame(frameId) {
        const frame = state.frames.find((item) => item.id === frameId);
        if (!frame) return;

        const next = nextPhotoForFrame(frame);
        if (!next) {
          scheduleSwitch(frame);
          return;
        }
        if (frame.currentPhotoId === next.id) {
          scheduleSwitch(frame);
          return;
        }

        frame.previousPhotoId = frame.currentPhotoId;
        frame.currentPhotoId = next.id;
        frame.activeLayer = frame.activeLayer === 0 ? 1 : 0;

        renderFrame(frame.id);

        setTimeout(() => {
          frame.previousPhotoId = null;
          renderFrame(frame.id);
          saveState();
        }, FADE_MS + 120);

        scheduleSwitch(frame);
      }

      function viewportRect() {
        return els.viewport.getBoundingClientRect();
      }

      function fitEditToScreen(resetScale = false) {
        const vp = viewportRect();
        const availableW = vp.width - 28;
        const availableH = vp.height - (12 + 62 + 20) - 28;
        const scale = Math.min(availableW / WORLD_W, availableH / WORLD_H);
        state.fitScale = clamp(scale, 0.12, 1);

        if (resetScale) {
          state.editScale = state.fitScale;
        } else {
          state.editScale = clamp(state.editScale, state.fitScale, 3.2);
        }

        const worldW = WORLD_W * state.editScale;
        const worldH = WORLD_H * state.editScale;
        const centerX = (vp.width - worldW) / 2;
        const centerY = (vp.height - worldH) / 2;
        state.panX = centerX;
        state.panY = centerY;
        updateWorldTransform();
      }

      function worldToScreen(x, y) {
        return {
          x: state.panX + x * state.editScale,
          y: state.panY + y * state.editScale
        };
      }

      function screenToWorld(x, y) {
        return {
          x: (x - state.panX) / state.editScale,
          y: (y - state.panY) / state.editScale
        };
      }

      function clampPan() {
        const vp = viewportRect();
        const worldW = WORLD_W * state.editScale;
        const worldH = WORLD_H * state.editScale;

        if (worldW <= vp.width) {
          state.panX = (vp.width - worldW) / 2;
        } else {
          const minX = vp.width - worldW;
          const maxX = 0;
          state.panX = clamp(state.panX, minX, maxX);
        }

        if (worldH <= vp.height) {
          state.panY = (vp.height - worldH) / 2;
        } else {
          const minY = vp.height - worldH;
          const maxY = 0;
          state.panY = clamp(state.panY, minY, maxY);
        }
      }

      function updateWorldTransform() {
        if (state.mode === "display") {
          const vp = viewportRect();
          const scale = Math.min(vp.width / WORLD_W, vp.height / WORLD_H);
          const x = (vp.width - WORLD_W * scale) / 2;
          const y = (vp.height - WORLD_H * scale) / 2;
          els.world.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        } else {
          clampPan();
          els.world.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.editScale})`;
        }
      }

      function setMode(mode) {
        state.mode = mode;
        document.body.classList.toggle("display-mode", mode === "display");

        if (mode === "display") {
          togglePhotoSheet(false);
          showDisplayHint();
        } else {
          fitEditToScreen(true);
        }

        renderAll();
        startDisplayTimers();
        saveState();
      }

      function showDisplayHint() {
        els.displayHint.classList.add("show");
        setTimeout(() => {
          els.displayHint.classList.remove("show");
        }, 1800);
      }

      function buildFramesMenu() {
        els.framesMenu.innerHTML = "";
        Object.entries(FRAME_SET_LABELS).forEach(([key, label]) => {
          const btn = document.createElement("button");
          btn.className = `menu-item${state.layout === key ? " active" : ""}`;
          btn.textContent = label;
          btn.addEventListener("click", () => {
            closeMenus();
            applyLayout(key);
          });
          els.framesMenu.appendChild(btn);
        });
      }

      function buildSelectionBar() {
        const frame = getCurrentFrame();
        if (state.mode !== "edit" || !frame || state.sheetOpen) {
          els.selectionBar.classList.add("hidden");
          return;
        }

        els.selectionBar.classList.remove("hidden");
        els.toggleStyleBtn.textContent = frame.kind.includes("simple") ? "装飾に戻す" : "シンプルにする";
        els.toggleOvalBtn.textContent = frame.kind === "oval" ? "四角に戻す" : "楕円にする";
        els.pinPhotoBtn.textContent = frame.pinnedPhotoId ? "写真固定中" : "写真固定";
        els.unpinPhotoBtn.textContent = frame.pinnedPhotoId ? "固定解除" : "固定なし";
        els.selectionMeta.textContent =
          `${FRAME_SET_LABELS[state.layout]} / #${frame.slot} / ${frame.kind}` +
          (frame.pinnedPhotoId ? " / 固定中" : "");
      }

      function buildPhotoSheet() {
        els.sheetMeta.textContent = `${state.photos.length}枚`;
        els.thumbGrid.innerHTML = "";

        state.photos.forEach((photo) => {
          const card = document.createElement("div");
          card.className = `thumb-card${state.selectedPhotoId === photo.id ? " selected" : ""}`;

          const preview = document.createElement("button");
          preview.className = "preview";
          preview.type = "button";
          preview.innerHTML = `<img src="${photo.dataUrl}" alt="">`;

          preview.addEventListener("click", () => {
            const frame = getCurrentFrame();
            if (frame) {
              state.selectedPhotoId = photo.id;
              frame.pinnedPhotoId = photo.id;
              frame.previousPhotoId = frame.currentPhotoId;
              frame.currentPhotoId = photo.id;
              frame.activeLayer = frame.activeLayer === 0 ? 1 : 0;
              renderAll();
              startDisplayTimers();
              saveState();
              showToast("写真を固定しました");
            } else {
              openViewer(photo.dataUrl);
            }
          });

          const badge = document.createElement("div");
          badge.className = "thumb-badge";
          badge.textContent = photo.bucket === "vertical" ? "縦" : photo.bucket === "horizontal" ? "横" : "正";

          const del = document.createElement("button");
          del.className = "thumb-delete";
          del.type = "button";
          del.textContent = "×";
          del.addEventListener("click", async (e) => {
            e.stopPropagation();
            await removePhoto(photo.id);
          });

          card.appendChild(preview);
          card.appendChild(badge);
          card.appendChild(del);
          els.thumbGrid.appendChild(card);
        });
      }

      function togglePhotoSheet(force) {
        state.sheetOpen = typeof force === "boolean" ? force : !state.sheetOpen;
        els.photoSheet.classList.toggle("open", state.sheetOpen && state.mode === "edit");
        buildSelectionBar();
      }

      function openViewer(src) {
        state.viewerOpen = true;
        els.viewerImage.src = src;
        els.viewer.classList.add("open");
      }

      function closeViewer() {
        state.viewerOpen = false;
        els.viewer.classList.remove("open");
        els.viewerImage.src = "";
      }

      function renderToolbar() {
        if (!state.isUploading) {
          els.statusMini.textContent = `写真 ${state.photos.length}枚`;
        }
        els.displayBtn.textContent = state.mode === "edit" ? "▶ 表示" : "編集";
      }

      function applyPhotoFit(layerEl, photo, frame) {
        const box = layerEl.querySelector(".photo-box");
        box.innerHTML = "";

        if (!photo) return;

        const spec = FRAME_SPECS[frame.kind];
        const inner = document.createElement("div");
        inner.className = "photo-inner";

        const img = document.createElement("img");
        img.src = photo.dataUrl;
        img.alt = "";

        inner.appendChild(img);
        box.appendChild(inner);

        const rect = box.getBoundingClientRect();
        const vw = rect.width || (frame.w * (1 - (spec.inset.left + spec.inset.right) / 100));
        const vh = rect.height || (frameHeight(frame) * (1 - (spec.inset.top + spec.inset.bottom) / 100));

        const pw = photo.width;
        const ph = photo.height;
        const isSquareFamily = familyForKind(frame.kind) === "square";

        let drawW;
        let drawH;

        if (isSquareFamily) {
          const scale = Math.min(vw / pw, vh / ph);
          drawW = pw * scale;
          drawH = ph * scale;
        } else {
          const scale = Math.max(vw / pw, vh / ph);
          drawW = pw * scale;
          drawH = ph * scale;
        }

        const maxX = Math.max(0, drawW - vw);
        const maxY = Math.max(0, drawH - vh);
        const offsetX = -maxX * (frame.focusX / 100);
        const offsetY = -maxY * (frame.focusY / 100);

        inner.style.width = `${drawW}px`;
        inner.style.height = `${drawH}px`;
        inner.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
      }

      function renderFrame(frameId) {
        const frame = state.frames.find((f) => f.id === frameId);
        const node = els.stage.querySelector(`.frame[data-id="${frameId}"]`);
        if (!frame || !node) return;

        const spec = FRAME_SPECS[frame.kind];
        const h = frameHeight(frame);

        node.style.left = `${frame.x}px`;
        node.style.top = `${frame.y}px`;
        node.style.width = `${frame.w}px`;
        node.style.height = `${h}px`;
        node.classList.toggle("selected", state.selectedFrameId === frame.id && state.mode === "edit");
        node.classList.toggle("locked", !!frame.pinnedPhotoId);

        const viewport = node.querySelector(".photo-viewport");
        viewport.style.setProperty("--pv-top", `${spec.inset.top}%`);
        viewport.style.setProperty("--pv-right", `${spec.inset.right}%`);
        viewport.style.setProperty("--pv-bottom", `${spec.inset.bottom}%`);
        viewport.style.setProperty("--pv-left", `${spec.inset.left}%`);
        viewport.classList.toggle("oval", !!spec.oval);

        const art = node.querySelector(".frame-art");
        art.src = spec.art;
        art.onerror = () => {
          art.onerror = null;
          art.src = spec.fallback;
        };

        const current = photoById(frame.currentPhotoId);
        const previous = photoById(frame.previousPhotoId);
        const layer0 = node.querySelector(".layer-0");
        const layer1 = node.querySelector(".layer-1");

        if (frame.activeLayer === 0) {
          applyPhotoFit(layer0, current, frame);
          applyPhotoFit(layer1, previous, frame);
          layer0.classList.add("active");
          layer1.classList.remove("active");
        } else {
          applyPhotoFit(layer1, current, frame);
          applyPhotoFit(layer0, previous, frame);
          layer1.classList.add("active");
          layer0.classList.remove("active");
        }

        node.querySelector(".empty-state").classList.toggle("hidden", !!current);
      }

      function bindFrameNode(node, frameId) {
        const badge = node.querySelector(".frame-badge");
        const handle = node.querySelector(".resize-handle");
        const viewport = node.querySelector(".photo-viewport");

        node.addEventListener("click", (e) => {
          if (e.target === badge || e.target === handle) return;
          if (state.mode !== "edit") return;
          state.selectedFrameId = frameId;
          renderAll();
        });

        badge.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          e.preventDefault();
          e.stopPropagation();

          const frame = state.frames.find((item) => item.id === frameId);
          if (!frame) return;

          state.selectedFrameId = frameId;
          renderAll();

          const startX = e.clientX;
          const startY = e.clientY;
          const before = { x: frame.x, y: frame.y };

          const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / state.editScale;
            const dy = (moveEvent.clientY - startY) / state.editScale;

            const next = {
              ...frame,
              x: before.x + dx,
              y: before.y + dy
            };
            fitFrameInside(next);

            if (!collides(next, frame.id)) {
              frame.x = next.x;
              frame.y = next.y;
              renderFrame(frame.id);
            }
          };

          const onUp = () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            saveState();
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });
        });

        handle.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          e.preventDefault();
          e.stopPropagation();

          const frame = state.frames.find((item) => item.id === frameId);
          if (!frame) return;

          state.selectedFrameId = frameId;
          renderAll();

          const startX = e.clientX;
          const before = { w: frame.w };

          const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / state.editScale;
            const next = {
              ...frame,
              w: clamp(before.w + dx, MIN_WIDTH, MAX_WIDTH)
            };
            fitFrameInside(next);

            if (!collides(next, frame.id)) {
              frame.w = next.w;
              frame.x = next.x;
              frame.y = next.y;
              renderFrame(frame.id);
            }
          };

          const onUp = () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            saveState();
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });
        });

        viewport.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          e.stopPropagation();

          const frame = state.frames.find((item) => item.id === frameId);
          if (!frame || !frame.currentPhotoId) return;

          const startX = e.clientX;
          const startY = e.clientY;
          const beforeX = frame.focusX;
          const beforeY = frame.focusY;
          let adjusting = false;

          clearTimeout(state.holdTimer);
          state.holdTimer = setTimeout(() => {
            adjusting = true;
            state.selectedFrameId = frameId;
            renderAll();
            showToast("写真位置を調整中");
          }, HOLD_MS);

          const onMove = (moveEvent) => {
            if (!adjusting) return;
            const dx = moveEvent.clientX - startX;
            const dy = moveEvent.clientY - startY;
            frame.focusX = clamp(beforeX - dx * 0.12, 0, 100);
            frame.focusY = clamp(beforeY - dy * 0.12, 0, 100);
            renderFrame(frame.id);
          };

          const onUp = () => {
            clearTimeout(state.holdTimer);
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            if (adjusting) saveState();
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });
        });
      }

      function createFrameNode(frame) {
        const node = document.createElement("div");
        node.className = "frame";
        node.dataset.id = frame.id;
        node.innerHTML = `
          <div class="frame-outline"></div>
          <div class="photo-viewport">
            <div class="photo-layer layer-0"><div class="photo-box"></div></div>
            <div class="photo-layer layer-1"><div class="photo-box"></div></div>
            <div class="empty-state"><span>＋ 写真追加</span></div>
          </div>
          <div class="frame-art-wrap">
            <img class="frame-art" alt="">
          </div>
          <button class="frame-badge" type="button">${frame.slot}</button>
          <div class="frame-pin">固定</div>
          <div class="resize-handle"></div>
        `;
        bindFrameNode(node, frame.id);
        return node;
      }

      function renderStage() {
        els.stage.innerHTML = "";
        state.frames.forEach((frame) => {
          const node = createFrameNode(frame);
          els.stage.appendChild(node);
          renderFrame(frame.id);
        });
      }

      function renderAll() {
        buildFramesMenu();
        buildSelectionBar();
        buildPhotoSheet();
        renderToolbar();
        renderStage();
        els.photoSheet.classList.toggle("open", state.sheetOpen && state.mode === "edit");
        updateWorldTransform();
      }

      function applyLayout(layoutKey) {
        clearAllTimers();
        state.layout = layoutKey;
        state.selectedFrameId = null;
        state.selectedPhotoId = null;
        state.frames = createLayoutFrames(layoutKey);
        rebuildFrameQueues();
        ensureCurrentPhotos();
        fitEditToScreen(true);
        renderAll();
        startDisplayTimers();
        saveState();
      }

      function toggleStyle() {
        const frame = getCurrentFrame();
        if (!frame) return;
        if (frame.kind === "oval") {
          showToast("楕円中は装飾切替できません");
          return;
        }

        const map = {
          vertical: "vertical_simple",
          vertical_simple: "vertical",
          horizontal: "horizontal_simple",
          horizontal_simple: "horizontal",
          square: "square_simple",
          square_simple: "square"
        };

        const nextKind = map[frame.kind];
        if (!nextKind) return;

        const beforeKind = frame.kind;
        frame.kind = nextKind;
        frame.baseKind = nextKind;
        fitFrameInside(frame);

        if (collides(frame, frame.id)) {
          frame.kind = beforeKind;
          frame.baseKind = beforeKind;
          showToast("その切替だと重なります");
          return;
        }

        saveState();
        renderAll();
      }

      function toggleOval() {
        const frame = getCurrentFrame();
        if (!frame) return;

        if (frame.kind === "oval") {
          frame.kind = frame.baseKind || "vertical";
        } else {
          frame.baseKind = frame.kind;
          frame.kind = "oval";
        }

        fitFrameInside(frame);

        if (collides(frame, frame.id)) {
          frame.kind = frame.baseKind || "vertical";
          showToast("その形だと重なります");
          return;
        }

        saveState();
        renderAll();
      }

      function pinCurrentPhoto() {
        const frame = getCurrentFrame();
        if (!frame) return;

        if (state.selectedPhotoId) {
          frame.pinnedPhotoId = state.selectedPhotoId;
          frame.previousPhotoId = frame.currentPhotoId;
          frame.currentPhotoId = state.selectedPhotoId;
          frame.activeLayer = frame.activeLayer === 0 ? 1 : 0;
        } else if (frame.currentPhotoId) {
          frame.pinnedPhotoId = frame.currentPhotoId;
        } else {
          showToast("固定する写真がありません");
          return;
        }

        saveState();
        renderAll();
        startDisplayTimers();
        showToast("写真を固定しました");
      }

      function unpinCurrentPhoto() {
        const frame = getCurrentFrame();
        if (!frame) return;
        if (!frame.pinnedPhotoId) {
          showToast("固定されていません");
          return;
        }
        frame.pinnedPhotoId = null;
        state.selectedPhotoId = null;
        saveState();
        renderAll();
        startDisplayTimers();
        showToast("固定を解除しました");
      }

      async function addPhotos(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length || state.isUploading) return;

        setUploading(true, 0, files.length);

        try {
          for (let i = 0; i < files.length; i += 1) {
            setUploading(true, i + 1, files.length);
            const photo = await compressImage(files[i]);
            state.photos.push(photo);
            await dbPut(photo);
          }

          state.photos.sort((a, b) => a.createdAt - b.createdAt);
          rebuildFrameQueues();
          ensureCurrentPhotos();
          saveState();
          renderAll();
          startDisplayTimers();
          showToast(`${files.length}枚追加しました`);
        } finally {
          setUploading(false);
        }
      }

      async function removePhoto(photoId) {
        await dbDelete(photoId);
        state.photos = state.photos.filter((photo) => photo.id !== photoId);
        if (state.selectedPhotoId === photoId) state.selectedPhotoId = null;

        state.frames.forEach((frame) => {
          if (frame.pinnedPhotoId === photoId) frame.pinnedPhotoId = null;
          if (frame.currentPhotoId === photoId) frame.currentPhotoId = null;
          if (frame.previousPhotoId === photoId) frame.previousPhotoId = null;
          frame.queue = (frame.queue || []).filter((id) => id !== photoId);
          if (frame.queueIndex > frame.queue.length) frame.queueIndex = 0;
        });

        rebuildFrameQueues();
        ensureCurrentPhotos();
        saveState();
        renderAll();
        startDisplayTimers();
        showToast("写真を削除しました");
      }

      function resetCurrentLayout() {
        applyLayout(state.layout);
        showToast("現在のセットを初期配置に戻しました");
      }

      function bindBackgroundPanAndZoom() {
        let dragging = false;
        let startX = 0;
        let startY = 0;
        let startPanX = 0;
        let startPanY = 0;

        els.viewport.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          if (e.target.closest(".frame")) return;
          dragging = true;
          startX = e.clientX;
          startY = e.clientY;
          startPanX = state.panX;
          startPanY = state.panY;
        });

        window.addEventListener("pointermove", (e) => {
          if (!dragging || state.mode !== "edit") return;
          state.panX = startPanX + (e.clientX - startX);
          state.panY = startPanY + (e.clientY - startY);
          updateWorldTransform();
        });

        window.addEventListener("pointerup", () => {
          if (!dragging) return;
          dragging = false;
          saveState();
        });

        els.viewport.addEventListener("touchstart", (e) => {
          if (state.mode !== "edit") return;
          if (e.touches.length !== 2) return;

          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const cx = (t1.clientX + t2.clientX) / 2;
          const cy = (t1.clientY + t2.clientY) / 2;
          const dx = t1.clientX - t2.clientX;
          const dy = t1.clientY - t2.clientY;

          state.pinchStartDistance = Math.hypot(dx, dy);
          state.pinchStartScale = state.editScale;
          state.pinchStartPanX = state.panX;
          state.pinchStartPanY = state.panY;

          const worldX = (cx - state.panX) / state.editScale;
          const worldY = (cy - state.panY) / state.editScale;
          state.pinchWorldX = worldX;
          state.pinchWorldY = worldY;
        }, { passive: true });

        els.viewport.addEventListener("touchmove", (e) => {
          if (state.mode !== "edit") return;
          if (e.touches.length !== 2 || state.pinchStartDistance <= 0) return;

          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const cx = (t1.clientX + t2.clientX) / 2;
          const cy = (t1.clientY + t2.clientY) / 2;
          const dx = t1.clientX - t2.clientX;
          const dy = t1.clientY - t2.clientY;
          const dist = Math.hypot(dx, dy);

          const nextScale = clamp(
            state.pinchStartScale * (dist / state.pinchStartDistance),
            state.fitScale,
            3.2
          );

          state.editScale = nextScale;
          state.panX = cx - state.pinchWorldX * state.editScale;
          state.panY = cy - state.pinchWorldY * state.editScale;
          updateWorldTransform();
        }, { passive: true });

        els.viewport.addEventListener("touchend", () => {
          if (state.mode !== "edit") return;
          state.pinchStartDistance = 0;
          state.pinchStartScale = state.editScale;
          saveState();
        }, { passive: true });
      }

      function bindUI() {
        els.addPhotosBtn.addEventListener("click", () => {
          els.photoInput.click();
        });

        els.photoInput.addEventListener("change", async (e) => {
          await addPhotos(e.target.files);
          e.target.value = "";
        });

        els.framesBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.moreMenu.classList.remove("open");
          els.framesMenu.classList.toggle("open");
        });

        els.photosBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          togglePhotoSheet();
        });

        els.openPhotosBtn.addEventListener("click", () => {
          togglePhotoSheet(true);
        });

        els.closeSheetBtn.addEventListener("click", () => {
          togglePhotoSheet(false);
        });

        els.moreBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.framesMenu.classList.remove("open");
          els.moreMenu.classList.toggle("open");
        });

        els.displayBtn.addEventListener("click", () => {
          setMode(state.mode === "edit" ? "display" : "edit");
        });

        els.fitBtn.addEventListener("click", () => {
          if (state.mode !== "edit") return;
          fitEditToScreen(true);
          saveState();
        });

        els.saveBtn.addEventListener("click", () => {
          closeMenus();
          saveState();
          showToast("保存しました");
        });

        els.loadBtn.addEventListener("click", () => {
          closeMenus();
          if (!loadState()) {
            showToast("保存データがありません");
            return;
          }
          rebuildFrameQueues();
          ensureCurrentPhotos();
          fitEditToScreen(true);
          renderAll();
          startDisplayTimers();
          showToast("読み込みました");
        });

        els.resetBtn.addEventListener("click", () => {
          closeMenus();
          resetCurrentLayout();
        });

        els.toggleStyleBtn.addEventListener("click", toggleStyle);
        els.toggleOvalBtn.addEventListener("click", toggleOval);
        els.pinPhotoBtn.addEventListener("click", pinCurrentPhoto);
        els.unpinPhotoBtn.addEventListener("click", unpinCurrentPhoto);

        els.viewerClose.addEventListener("click", closeViewer);
        els.viewer.addEventListener("click", (e) => {
          if (e.target === els.viewer) closeViewer();
        });

        document.addEventListener("click", (e) => {
          const keep = e.target.closest(".toolbar") || e.target.closest(".menu");
          if (!keep) closeMenus();
        });

        els.stage.addEventListener("click", (e) => {
          if (state.mode === "display") {
            setMode("edit");
            return;
          }
          if (!e.target.closest(".frame")) {
            state.selectedFrameId = null;
            renderAll();
          }
        });

        window.addEventListener("resize", () => {
          if (state.mode === "display") {
            updateWorldTransform();
          } else {
            fitEditToScreen(true);
          }
        });

        document.addEventListener("keydown", (e) => {
          if (state.mode !== "edit") return;
          const frame = getCurrentFrame();
          if (!frame) return;

          const step = e.shiftKey ? 12 : 4;
          let changed = false;

          if (e.key === "ArrowLeft") {
            const next = { ...frame, x: frame.x - step };
            fitFrameInside(next);
            if (!collides(next, frame.id)) {
              frame.x = next.x;
              changed = true;
            }
          } else if (e.key === "ArrowRight") {
            const next = { ...frame, x: frame.x + step };
            fitFrameInside(next);
            if (!collides(next, frame.id)) {
              frame.x = next.x;
              changed = true;
            }
          } else if (e.key === "ArrowUp") {
            const next = { ...frame, y: frame.y - step };
            fitFrameInside(next);
            if (!collides(next, frame.id)) {
              frame.y = next.y;
              changed = true;
            }
          } else if (e.key === "ArrowDown") {
            const next = { ...frame, y: frame.y + step };
            fitFrameInside(next);
            if (!collides(next, frame.id)) {
              frame.y = next.y;
              changed = true;
            }
          } else if (e.key === "Escape") {
            state.selectedFrameId = null;
            renderAll();
          }

          if (changed) {
            renderFrame(frame.id);
            saveState();
          }
        });

        bindBackgroundPanAndZoom();
      }

      async function init() {
        state.db = await openDB();
        state.photos = (await dbGetAll()).sort((a, b) => a.createdAt - b.createdAt);

        if (!loadState()) {
          state.layout = "story";
          state.frames = createLayoutFrames("story");
        }

        rebuildFrameQueues();
        ensureCurrentPhotos();
        bindUI();
        fitEditToScreen(true);
        renderAll();
        startDisplayTimers();
      }

      init().catch((error) => {
        console.error(error);
        showToast("初期化に失敗しました");
      });
    })();
  </script>
</body>
</html>
