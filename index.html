<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KABEPIC</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#e9e4db;
}

#stageWrap{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
background:#e9e4db;
}

#stage{
width:900px;
height:600px;
background:#fff;
position:relative;
overflow:hidden;
border-radius:10px;
}

.frame{
position:absolute;
cursor:move;
}

.frame img.photo{
width:100%;
height:100%;
object-fit:cover;
}

.frame img.frameimg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.selected{
outline:4px solid #2f6df6;
}

.bottomBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px;
border-top:1px solid #ddd;
}

button{
padding:10px 14px;
border-radius:10px;
border:none;
background:#eee;
font-size:14px;
}

button.active{
background:#dbe6ff;
}

#editPanel{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:340px;
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:none;
}

#editPanel button{
width:100%;
margin:6px 0;
}

</style>
</head>

<body>

<div id="stageWrap">
<div id="stage"></div>
</div>

<div id="editPanel">

<button onclick="addFrame('square')">正方形を追加</button>
<button onclick="addFrame('horizontal')">横長を追加</button>
<button onclick="addFrame('vertical')">縦長を追加</button>
<button onclick="addFrame('oval')">楕円を追加</button>

<button onclick="deleteFrame()">フレーム削除</button>

</div>

<div class="bottomBar">

<button onclick="openPhoto()">Photo</button>
<button onclick="openFrames()">Frames</button>
<button onclick="toggleEdit()" id="editBtn">Edit</button>
<button onclick="displayMode()">Display</button>

</div>

<script>

const FRAME_TYPES={

square:{frame:"frame_square.png"},
square_simple:{frame:"frame_square_simple.png"},

vertical:{frame:"frame_vertical.png"},
vertical_simple:{frame:"frame_vertical_simple.png"},

horizontal:{frame:"frame_horizontal.png"},
horizontal_simple:{frame:"frame_horizontal_simple.png"},

oval:{frame:"frame_oval.png",mask:"mask_oval.png"},
oval_simple:{frame:"frame_oval_simple.png",mask:"mask_oval.png"}

};

let frames=[];
let selected=null;
let editMode=false;

const stage=document.getElementById("stage");

function addFrame(type){

let f=document.createElement("div");
f.className="frame";
f.style.left="200px";
f.style.top="200px";
f.style.width="150px";
f.style.height="150px";

let photo=document.createElement("img");
photo.className="photo";

let frameimg=document.createElement("img");
frameimg.className="frameimg";
frameimg.src=FRAME_TYPES[type].frame;

if(FRAME_TYPES[type].mask){

photo.style.maskImage="url("+FRAME_TYPES[type].mask+")";
photo.style.maskSize="cover";
}

f.appendChild(photo);
f.appendChild(frameimg);

stage.appendChild(f);

frames.push(f);

selectFrame(f);

enableDrag(f);

}

function selectFrame(f){

frames.forEach(x=>x.classList.remove("selected"));

f.classList.add("selected");

selected=f;

}

function deleteFrame(){

if(!selected)return;

selected.remove();

frames=frames.filter(x=>x!==selected);

selected=null;

}

function enableDrag(el){

let offsetX=0;
let offsetY=0;

el.addEventListener("mousedown",e=>{

if(!editMode)return;

selectFrame(el);

offsetX=e.offsetX;
offsetY=e.offsetY;

function move(ev){

el.style.left=(ev.pageX-offsetX)+"px";
el.style.top=(ev.pageY-offsetY)+"px";

}

function up(){

document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",up);

}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",up);

});

}

function toggleEdit(){

editMode=!editMode;

document.getElementById("editPanel").style.display=
editMode?"block":"none";

document.getElementById("editBtn").classList.toggle("active");

}

function openPhoto(){
alert("Photo管理 (次実装)");
}

function openFrames(){
alert("Frames管理 (次実装)");
}

function displayMode(){
editMode=false;
document.getElementById("editPanel").style.display="none";
alert("表示モード");
}

</script>

</body>
</html>
