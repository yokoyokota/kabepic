<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>KABEPIC</title>
<meta name="description" content="思い出を、暮らしの背景に。" />
<style>
  :root {
    --bg: #e8dfcf;
    --wall: #efe7da;
    --panel: rgba(255, 255, 255, 0.92);
    --panel-strong: rgba(255, 255, 255, 0.98);
    --line: rgba(0, 0, 0, 0.08);
    --text: #1c1c1c;
    --muted: #7a746c;
    --accent: #2f5bda;
    --accent-soft: rgba(47, 91, 218, 0.12);
    --danger: #c63d3d;
    --shadow-lg: 0 18px 42px rgba(0, 0, 0, 0.12);
    --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --fade-ms: 1200ms;
    --ui-gap: 12px;

    --world-w: 2400;
    --world-h: 1400;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.28), transparent 30%),
      linear-gradient(180deg, #e8dfcf 0%, #e2d8c8 100%);
    color: var(--text);
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      "Hiragino Sans",
      "Noto Sans JP",
      sans-serif;
    overflow: hidden;
  }

  body.display-mode {
    background: var(--wall);
  }

  button,
  input {
    font: inherit;
  }

  button {
    border: 0;
    background: none;
    color: inherit;
    cursor: pointer;
  }

  .hidden {
    display: none !important;
  }

  .app {
    min-height: 100vh;
    padding:
      calc(var(--safe-top) + 12px)
      12px
      calc(var(--safe-bottom) + 16px);
    display: grid;
    gap: var(--ui-gap);
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .topbar {
    padding: 12px;
    display: grid;
    gap: 12px;
  }

  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 128px;
    height: 54px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--panel-strong);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
    font-weight: 800;
    font-size: 1.16rem;
    letter-spacing: 0.03em;
  }

  .status-pill {
    min-height: 54px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--panel-strong);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .toolbar {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 12px;
  }

  .toolbar-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px;
    border-radius: 22px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--line);
  }

  .btn {
    min-height: 54px;
    min-width: 88px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--panel-strong);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
    font-weight: 700;
    transition:
      transform 140ms ease,
      background 140ms ease,
      color 140ms ease,
      border-color 140ms ease,
      box-shadow 140ms ease;
    white-space: nowrap;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn.active {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 12px 28px rgba(47,91,218,0.3);
  }

  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
  }

  .btn.soft {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: rgba(47,91,218,0.18);
    box-shadow: none;
  }

  .btn.danger {
    color: var(--danger);
  }

  .workspace {
    padding: 12px;
  }

  .wall-scroll {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 28px;
    background:
      radial-gradient(circle at 15% 12%, rgba(255,255,255,0.22), transparent 28%),
      linear-gradient(180deg, #ece4d6 0%, #e5dccd 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.42),
      inset 0 -16px 36px rgba(110,92,60,0.04);
  }

  .wall-scroll::-webkit-scrollbar {
    height: 10px;
  }

  .wall-scroll::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.12);
    border-radius: 999px;
  }

  .wall-stage-wrap {
    position: relative;
    width: calc(var(--world-w) * 1px);
    min-width: calc(var(--world-w) * 1px);
    height: calc(var(--world-h) * 1px);
    min-height: calc(var(--world-h) * 1px);
  }

  .wall-stage {
    position: relative;
    width: calc(var(--world-w) * 1px);
    height: calc(var(--world-h) * 1px);
    background: var(--wall);
    touch-action: none;
    user-select: none;
  }

  .display-mode .app {
    padding: 0;
    gap: 0;
  }

  .display-mode .topbar,
  .display-mode .controls,
  .display-mode .photo-bank,
  .display-mode .hint {
    display: none !important;
  }

  .display-mode .workspace {
    padding: 0;
    border: 0;
    box-shadow: none;
    background: transparent;
  }

  .display-mode .wall-scroll {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    background: var(--wall);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .display-mode .wall-stage-wrap {
    min-width: 0;
    min-height: 0;
    transform-origin: center center;
  }

  .frame {
    position: absolute;
    user-select: none;
    transition:
      left 260ms ease,
      top 260ms ease,
      width 260ms ease,
      height 260ms ease,
      filter 140ms ease;
    will-change: left, top, width, height;
  }

  .frame.selected {
    z-index: 40 !important;
    filter: drop-shadow(0 18px 28px rgba(0,0,0,0.18));
  }

  .frame.adjusting {
    z-index: 45 !important;
  }

  .frame-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .photo-viewport {
    position: absolute;
    top: var(--pv-top);
    right: var(--pv-right);
    bottom: var(--pv-bottom);
    left: var(--pv-left);
    overflow: hidden;
    z-index: 1;
    background: transparent;
  }

  .photo-viewport.oval {
    -webkit-mask-image: url("mask_oval.png");
    mask-image: url("mask_oval.png");
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
  }

  .photo-layer {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity var(--fade-ms) ease;
  }

  .photo-layer.active {
    opacity: 1;
  }

  .photo-box {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: var(--photo-x, 50%) var(--photo-y, 50%);
    background-size: cover;
  }

  .photo-box.contain {
    background-size: contain;
    background-color: transparent;
  }

  .frame-art-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 3;
    pointer-events: none;
  }

  .frame-art {
    position: absolute;
    pointer-events: none;
    user-select: none;
  }

  .frame-number {
    position: absolute;
    top: -18px;
    left: -18px;
    width: 58px;
    height: 58px;
    border-radius: 999px;
    background: rgba(24, 31, 51, 0.96);
    color: #fff;
    box-shadow: 0 10px 22px rgba(0,0,0,0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.7rem;
    z-index: 6;
    cursor: grab;
    border: 3px solid rgba(255,255,255,0.18);
  }

  .frame-number:active {
    cursor: grabbing;
  }

  .resize-handle {
    position: absolute;
    right: -14px;
    bottom: -14px;
    width: 34px;
    height: 34px;
    border-radius: 999px;
    background: rgba(255,255,255,0.96);
    border: 3px solid rgba(47,91,218,0.92);
    box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    z-index: 6;
  }

  .frame-lock {
    position: absolute;
    right: -8px;
    top: -12px;
    min-width: 42px;
    height: 30px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--line);
    box-shadow: 0 8px 16px rgba(0,0,0,0.10);
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 800;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 6;
  }

  .frame.locked .frame-lock {
    display: inline-flex;
  }

  .selection-outline {
    position: absolute;
    inset: -8px;
    border-radius: 18px;
    border: 3px solid rgba(47,91,218,0.26);
    pointer-events: none;
    opacity: 0;
    z-index: 2;
  }

  .frame.selected .selection-outline {
    opacity: 1;
  }

  .controls {
    padding: 12px;
    display: grid;
    gap: 12px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .selection-info {
    color: var(--muted);
    font-weight: 700;
  }

  .controls-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .photo-bank {
    padding: 12px;
    display: grid;
    gap: 12px;
  }

  .photo-bank-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .photo-bank-title {
    font-weight: 800;
  }

  .thumb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 10px;
  }

  .thumb {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.65);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
  }

  .thumb.active {
    outline: 3px solid rgba(47,91,218,0.35);
    outline-offset: 2px;
  }

  .thumb button {
    width: 100%;
    height: 100%;
    padding: 0;
    display: block;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb-meta {
    position: absolute;
    left: 6px;
    bottom: 6px;
    min-width: 24px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    background: rgba(17,17,17,0.74);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 800;
  }

  .thumb-delete {
    position: absolute;
    right: 6px;
    top: 6px;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--line);
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    color: var(--danger);
    font-weight: 900;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .hint {
    padding: 14px 16px;
    color: var(--muted);
    font-size: 0.94rem;
    line-height: 1.6;
  }

  .hint strong {
    color: var(--text);
  }

  .toast {
    position: fixed;
    left: 50%;
    top: calc(var(--safe-top) + 14px);
    transform: translateX(-50%) translateY(-10px);
    opacity: 0;
    pointer-events: none;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.97);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    font-weight: 800;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 9999;
    max-width: min(92vw, 520px);
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 980px) {
    .toolbar {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    .brand {
      min-width: 112px;
      font-size: 1.06rem;
    }

    .btn {
      min-width: 78px;
      min-height: 50px;
      padding: 0 14px;
    }

    .frame-number {
      width: 52px;
      height: 52px;
      font-size: 1.45rem;
    }
  }
</style>
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <input id="photoInput" class="hidden" type="file" accept="image/*" multiple />

  <div class="app">
    <section id="topbar" class="card topbar">
      <div class="topbar-row">
        <div class="brand">KABEPIC</div>
        <div id="statusPill" class="status-pill">写真を追加してください</div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn frame-set-btn" data-layout="calm">Calm 3</button>
          <button class="btn frame-set-btn" data-layout="flow">Flow 5</button>
          <button class="btn frame-set-btn active" data-layout="story">Story 8</button>
          <button class="btn frame-set-btn" data-layout="scene">Scene 11</button>
        </div>

        <div class="toolbar-group">
          <button id="addPhotosBtn" class="btn primary">写真を追加</button>
          <button id="toggleDisplayBtn" class="btn">表示モード</button>
          <button id="saveBtn" class="btn soft">保存</button>
          <button id="loadBtn" class="btn soft">読込</button>
          <button id="resetBtn" class="btn danger">リセット</button>
        </div>
      </div>
    </section>

    <section class="card workspace">
      <div id="wallScroll" class="wall-scroll">
        <div id="wallStageWrap" class="wall-stage-wrap">
          <div id="wallStage" class="wall-stage"></div>
        </div>
      </div>
    </section>

    <section id="controls" class="card controls">
      <div class="controls-row">
        <div id="selectionInfo" class="selection-info">選択中：なし</div>
        <div class="controls-actions">
          <button id="shapeBtn" class="btn">形変更</button>
          <button id="lockBtn" class="btn">写真固定</button>
          <button id="unlockBtn" class="btn soft">固定解除</button>
          <button id="frontBtn" class="btn soft">前面</button>
          <button id="deleteFrameBtn" class="btn danger">削除</button>
          <button id="addFrameBtn" class="btn soft">フレーム追加</button>
        </div>
      </div>
    </section>

    <section id="photoBank" class="card photo-bank">
      <div class="photo-bank-head">
        <div class="photo-bank-title">写真一覧</div>
        <div style="color: var(--muted); font-weight: 700; font-size: 0.92rem;">
          サムネイルを押すと選択中フレームに固定
        </div>
      </div>
      <div id="thumbGrid" class="thumb-grid"></div>
    </section>

    <section id="hint" class="card hint">
      <strong>操作</strong><br />
      移動は左上の番号バッジをドラッグ。サイズ変更は右下の青ハンドルだけ。<br />
      写真位置調整は写真部分を長押し。編集モードは横スクロールで全体を確認できます。
    </section>
  </div>

<script>
(() => {

      { shape: "square",     x: 1970, y: 170,  w: 220, z: 2 },
      { shape: "horizontal", x: 300,  y: 700,  w: 360, z: 1 },
      { shape: "square",     x: 840,  y: 640,  w: 240, z: 2 },
      { shape: "horizontal", x: 1180, y: 710,  w: 350, z: 1 },
      { shape: "square",     x: 1650, y: 640,  w: 220, z: 2 },
      { shape: "horizontal", x: 1930, y: 700,  w: 320, z: 1 },
      { shape: "vertical",   x: 2140, y: 320,  w: 200, z: 3 }
    ]
  };

  const state = {
    db: null,
    mode: "edit",
    layout: "story",
    photos: [],
    frames: [],
    selectedFrameId: null,
    selectedPhotoId: null,
    pointerAction: null,
    holdTimer: null,
    toastTimer: null
  };

  function uid(prefix = "id") {
    return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function showToast(message) {
    clearTimeout(state.toastTimer);
    els.toast.textContent = message;
    els.toast.classList.add("show");
    state.toastTimer = setTimeout(() => {
      els.toast.classList.remove("show");
    }, 2200);
  }

  function randomDelay() {
    return SWITCH_MIN + Math.floor(Math.random() * (SWITCH_MAX - SWITCH_MIN + 1));
  }

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE, { keyPath: "id" });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  function dbPut(photo) {
    return new Promise((resolve, reject) => {
      const tx = state.db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).put(photo);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = state.db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = state.db.transaction(DB_STORE, "readonly");
      const req = tx.objectStore(DB_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result));
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function fitWithin(width, height, maxLongEdge) {
    const long = Math.max(width, height);
    if (long <= maxLongEdge) return { width, height };
    const scale = maxLongEdge / long;
    return {
      width: Math.round(width * scale),
      height: Math.round(height * scale)
    };
  }

  function bucketFromAspect(width, height) {
    const ratio = width / height;
    if (ratio > 1.05) return "horizontal";
    if (ratio < 0.95) return "vertical";
    return "square";
  }

  async function compressPhoto(file) {
    const dataUrl = await fileToDataUrl(file);
    const img = await loadImage(dataUrl);
    const fitted = fitWithin(img.width, img.height, MAX_LONG_EDGE);
    const canvas = document.createElement("canvas");
    canvas.width = fitted.width;
    canvas.height = fitted.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, fitted.width, fitted.height);
    const compressed = canvas.toDataURL("image/jpeg", JPEG_QUALITY);

    return {
      id: uid("photo"),
      name: file.name,
      width: fitted.width,
      height: fitted.height,
      dataUrl: compressed,
      bucket: bucketFromAspect(fitted.width, fitted.height),
      createdAt: Date.now()
    };
  }

  function selectedFrame() {
    return state.frames.find(frame => frame.id === state.selectedFrameId) || null;
  }

  function photoById(id) {
    return state.photos.find(photo => photo.id === id) || null;
  }

  function frameHeight(frame) {
    return frame.width / FRAME_SPECS[frame.shape].ratio;
  }

  function makeFrame(shape, x, y, width, z) {
    return {
      id: uid("frame"),
      shape,
      x,
      y,
      width,
      z,
      focusX: 50,
      focusY: 50,
      lockedPhotoId: null,
      runtime: {
        currentPhotoId: null,
        previousPhotoId: null,
        activeLayer: 0,
        timer: null
      }
    };
  }

  function normalizeFrame(frame) {
    const next = makeFrame(
      frame.shape || "square",
      Number(frame.x ?? 100),
      Number(frame.y ?? 100),
      Number(frame.width ?? frame.w ?? 260),
      Number(frame.z ?? 1)
    );
    next.id = frame.id || uid("frame");
    next.focusX = Number.isFinite(frame.focusX) ? frame.focusX : 50;
    next.focusY = Number.isFinite(frame.focusY) ? frame.focusY : 50;
    next.lockedPhotoId = frame.lockedPhotoId || null;
    keepFrameInside(next);
    return next;
  }

  function rectFor(frame) {
    return {
      left: frame.x,
      top: frame.y,
      right: frame.x + frame.width,
      bottom: frame.y + frameHeight(frame)
    };
  }

  function overlaps(a, b) {
    return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
  }

  function keepFrameInside(frame) {
    const h = frameHeight(frame);
    frame.width = clamp(frame.width, MIN_FRAME_W, MAX_FRAME_W);
    frame.x = clamp(frame.x, 60, WORLD_W - frame.width - 60);
    frame.y = clamp(frame.y, 60, WORLD_H - h - 60);
  }

  function collides(candidate, ignoreId = null) {
    const rect = rectFor(candidate);
    return state.frames.some(frame => {
      if (frame.id === ignoreId || frame.id === candidate.id) return false;
      return overlaps(rect, rectFor(frame));
    });
  }

  function getPoolForShape(shape) {
    if (shape === "oval") {
      const verticals = state.photos.filter(photo => photo.bucket === "vertical");
      if (verticals.length) return verticals;
      const squares = state.photos.filter(photo => photo.bucket === "square");
      if (squares.length) return squares;
      return state.photos.slice();
    }

    if (shape === "square") {
      const squares = state.photos.filter(photo => photo.bucket === "square");
      return squares.length ? squares : state.photos.slice();
    }

    const exact = state.photos.filter(photo => photo.bucket === FRAME_SPECS[shape].bucket);
    return exact.length ? exact : state.photos.slice();
  }

  function chooseNextPhoto(frame) {
    if (frame.lockedPhotoId) {
      return photoById(frame.lockedPhotoId) || null;
    }

    const pool = getPoolForShape(frame.shape);
    if (!pool.length) return null;
    if (pool.length === 1) return pool[0];

    const current = frame.runtime.currentPhotoId;
    const previous = frame.runtime.previousPhotoId;

    let filtered = pool.filter(photo => photo.id !== current && photo.id !== previous);
    if (!filtered.length) filtered = pool.filter(photo => photo.id !== current);
    if (!filtered.length) filtered = pool.slice();

    return filtered[Math.floor(Math.random() * filtered.length)] || null;
  }

  function clearFrameTimer(frame) {
    if (frame.runtime?.timer) clearTimeout(frame.runtime.timer);
    frame.runtime.timer = null;
  }

  function clearAllTimers() {
    state.frames.forEach(clearFrameTimer);
  }

  function ensureRuntimePhotos() {
    state.frames.forEach(frame => {
      if (frame.lockedPhotoId && !photoById(frame.lockedPhotoId)) {
        frame.lockedPhotoId = null;
      }
      if (frame.runtime.currentPhotoId && !photoById(frame.runtime.currentPhotoId)) {
        frame.runtime.currentPhotoId = null;
      }
      if (frame.runtime.previousPhotoId && !photoById(frame.runtime.previousPhotoId)) {
        frame.runtime.previousPhotoId = null;
      }
      if (!frame.runtime.currentPhotoId) {
        const next = chooseNextPhoto(frame);
        frame.runtime.currentPhotoId = next ? next.id : null;
      }
    });
  }

  function scheduleFrame(frame) {
    clearFrameTimer(frame);
    if (state.mode !== "display") return;

    const pool = frame.lockedPhotoId ? [] : getPoolForShape(frame.shape);
    if (!pool.length || pool.length <= 1) return;

    frame.runtime.timer = setTimeout(() => {
      rotateFrame(frame.id);
    }, randomDelay());
  }

  function rotateFrame(frameId) {
    const frame = state.frames.find(item => item.id === frameId);
    if (!frame) return;

    const next = chooseNextPhoto(frame);
    if (!next) {
      scheduleFrame(frame);
      return;
    }

    if (frame.runtime.currentPhotoId === next.id) {
      scheduleFrame(frame);
      return;
    }

    frame.runtime.previousPhotoId = frame.runtime.currentPhotoId;
    frame.runtime.currentPhotoId = next.id;
    frame.runtime.activeLayer = frame.runtime.activeLayer === 0 ? 1 : 0;
    renderFrame(frame.id);

    setTimeout(() => {
      frame.runtime.previousPhotoId = null;
      renderFrame(frame.id);
      saveState();
    }, 1300);

    scheduleFrame(frame);
  }

  function saveState() {
    const payload = {
      mode: state.mode,
      layout: state.layout,
      frames: state.frames.map(frame => ({
        id: frame.id,
        shape: frame.shape,
        x: frame.x,
        y: frame.y,
        width: frame.width,
        z: frame.z,
        focusX: frame.focusX,
        focusY: frame.focusY,
        lockedPhotoId: frame.lockedPhotoId || null
      }))
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;

    try {
      const parsed = JSON.parse(raw);
      state.mode = parsed.mode === "display" ? "display" : "edit";
      state.layout = parsed.layout || "story";
      state.frames = (parsed.frames || []).map(normalizeFrame);
      return !!state.frames.length;
    } catch {
      return false;
    }
  }

  function maxZ() {
    return state.frames.reduce((max, frame) => Math.max(max, frame.z), 0);
  }

  function applyLayout(layoutKey) {
    clearAllTimers();
    state.layout = layoutKey;
    state.frames = (LAYOUTS[layoutKey] || LAYOUTS.story).map((item, index) => {
      return normalizeFrame({
        shape: item.shape,
        x: item.x,
        y: item.y,
        width: item.w,
        z: item.z ?? (index + 1)
      });
    });
    state.selectedFrameId = null;
    ensureRuntimePhotos();
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
  }

  function resetCurrentLayout() {
    applyLayout(state.layout);
    showToast("現在セットを初期配置に戻しました");
  }

  function updateLayoutButtons() {
    document.querySelectorAll(".frame-set-btn").forEach(button => {
      button.classList.toggle("active", button.dataset.layout === state.layout);
    });
  }

  function updateStatus() {
    els.statusPill.textContent = state.photos.length
      ? `写真 ${state.photos.length}枚`
      : "写真を追加してください";

    els.toggleDisplayBtn.textContent = state.mode === "edit" ? "表示モード" : "編集モード";

    const frame = selectedFrame();
    if (!frame) {
      els.selectionInfo.textContent = "選択中：なし";
    } else {
      els.selectionInfo.textContent =
        `選択中：${FRAME_SPECS[frame.shape].label} / ${Math.round(frame.width)}px / ` +
        (frame.lockedPhotoId ? "写真固定" : "自動");
    }
  }

  function updateDisplayScale() {
    if (state.mode !== "display") {
      els.wallStageWrap.style.transform = "";
      els.wallScroll.scrollLeft = EDIT_SCROLL_LEFT;
      return;
    }

    const scale = Math.min(window.innerWidth / WORLD_W, window.innerHeight / WORLD_H);
    els.wallStageWrap.style.transform = `scale(${scale})`;
  }

  function updateModeUI() {
    document.body.classList.toggle("display-mode", state.mode === "display");
    updateDisplayScale();
  }

  function renderThumbs() {
    els.thumbGrid.innerHTML = "";

    state.photos.forEach(photo => {
      const isSelected = state.selectedPhotoId === photo.id;
      const thumb = document.createElement("div");
      thumb.className = `thumb${isSelected ? " active" : ""}`;
      thumb.innerHTML = `
        <button type="button" data-photo-id="${photo.id}">
          <img src="${photo.dataUrl}" alt="">
          <div class="thumb-meta">${photo.bucket === "horizontal" ? "横" : photo.bucket === "vertical" ? "縦" : "正"}</div>
        </button>
        <button type="button" class="thumb-delete" data-remove-id="${photo.id}">×</button>
      `;

      thumb.querySelector("[data-photo-id]").addEventListener("click", () => {
        state.selectedPhotoId = photo.id;
        const frame = selectedFrame();
        if (frame) {
          frame.lockedPhotoId = photo.id;
          frame.runtime.previousPhotoId = frame.runtime.currentPhotoId;
          frame.runtime.currentPhotoId = photo.id;
          renderAll();
          saveState();
          startDisplayTimersIfNeeded();
          showToast("写真を固定しました");
        } else {
          renderThumbs();
        }
      });

      thumb.querySelector("[data-remove-id]").addEventListener("click", async (event) => {
        event.stopPropagation();
        await removePhoto(photo.id);
      });

      els.thumbGrid.appendChild(thumb);
    });
  }

  function renderFrame(frameId) {
    const node = els.wallStage.querySelector(`.frame[data-id="${frameId}"]`);
    const frame = state.frames.find(item => item.id === frameId);
    if (!node || !frame) return;

    const spec = FRAME_SPECS[frame.shape];
    const h = frameHeight(frame);

    node.style.left = `${frame.x}px`;
    node.style.top = `${frame.y}px`;
    node.style.width = `${frame.width}px`;
    node.style.height = `${h}px`;
    node.style.zIndex = String(frame.z);
    node.dataset.shape = frame.shape;
    node.classList.toggle("selected", state.mode === "edit" && state.selectedFrameId === frame.id);
    node.classList.toggle("locked", !!frame.lockedPhotoId);

    const viewport = node.querySelector(".photo-viewport");
    viewport.style.setProperty("--pv-top", `${spec.viewport.top}%`);
    viewport.style.setProperty("--pv-right", `${spec.viewport.right}%`);
    viewport.style.setProperty("--pv-bottom", `${spec.viewport.bottom}%`);
    viewport.style.setProperty("--pv-left", `${spec.viewport.left}%`);
    viewport.classList.toggle("oval", !!spec.oval);

    const art = node.querySelector(".frame-art");
    art.src = spec.artSrc;
    art.style.width = `${spec.artWidthPct}%`;
    art.style.height = `${spec.artHeightPct}%`;
    art.style.left = `${spec.artLeftPct}%`;
    art.style.top = `${spec.artTopPct}%`;

    const number = node.querySelector(".frame-number");
    number.textContent = String(
      [...state.frames].sort((a, b) => a.z - b.z).findIndex(item => item.id === frame.id) + 1
    );

    const lock = node.querySelector(".frame-lock");
    lock.textContent = "固定";

    const currentPhoto = photoById(frame.runtime.currentPhotoId);
    const previousPhoto = photoById(frame.runtime.previousPhotoId);

    const layer0 = node.querySelector(".layer-0");
    const layer1 = node.querySelector(".layer-1");
    const box0 = node.querySelector(".layer-0 .photo-box");
    const box1 = node.querySelector(".layer-1 .photo-box");

    box0.classList.toggle("contain", spec.fit === "contain");
    box1.classList.toggle("contain", spec.fit === "contain");

    if (frame.runtime.activeLayer === 0) {
      box0.style.backgroundImage = currentPhoto ? `url("${currentPhoto.dataUrl}")` : "none";
      box1.style.backgroundImage = previousPhoto ? `url("${previousPhoto.dataUrl}")` : "none";
      box0.style.setProperty("--photo-x", `${frame.focusX}%`);
      box0.style.setProperty("--photo-y", `${frame.focusY}%`);
      box1.style.setProperty("--photo-x", `${frame.focusX}%`);
      box1.style.setProperty("--photo-y", `${frame.focusY}%`);
      layer0.classList.add("active");
      layer1.classList.remove("active");
    } else {
      box1.style.backgroundImage = currentPhoto ? `url("${currentPhoto.dataUrl}")` : "none";
      box0.style.backgroundImage = previousPhoto ? `url("${previousPhoto.dataUrl}")` : "none";
      box0.style.setProperty("--photo-x", `${frame.focusX}%`);
      box0.style.setProperty("--photo-y", `${frame.focusY}%`);
      box1.style.setProperty("--photo-x", `${frame.focusX}%`);
      box1.style.setProperty("--photo-y", `${frame.focusY}%`);
      layer1.classList.add("active");
      layer0.classList.remove("active");
    }
  }

  function createFrameNode(frame) {
    const node = document.createElement("div");
    node.className = "frame";
    node.dataset.id = frame.id;
    node.innerHTML = `
      <div class="frame-inner">
        <div class="selection-outline"></div>
        <div class="photo-viewport">
          <div class="photo-layer layer-0"><div class="photo-box"></div></div>
          <div class="photo-layer layer-1"><div class="photo-box"></div></div>
        </div>
        <div class="frame-art-wrap">
          <img class="frame-art" alt="">
        </div>
        <div class="frame-number" title="移動">1</div>
        <div class="frame-lock">固定</div>
        <div class="resize-handle" title="サイズ変更"></div>
      </div>
    `;
    bindFrameEvents(node, frame.id);
    return node;
  }

  function renderWall() {
    els.wallStage.innerHTML = "";
    const frames = [...state.frames].sort((a, b) => a.z - b.z);
    frames.forEach(frame => {
      const node = createFrameNode(frame);
      els.wallStage.appendChild(node);
      renderFrame(frame.id);
    });
  }

  function renderAll() {
    updateLayoutButtons();
    updateStatus();
    updateModeUI();
    renderWall();
    renderThumbs();
  }

  function startDisplayTimersIfNeeded() {
    clearAllTimers();
    if (state.mode !== "display") return;
    ensureRuntimePhotos();
    state.frames.forEach(frame => scheduleFrame(frame));
  }

  async function addPhotos(files) {
    const list = Array.from(files || []);
    if (!list.length) return;

    showToast("写真を準備しています…");

    for (const file of list) {
      const photo = await compressPhoto(file);
      state.photos.push(photo);
      await dbPut(photo);
    }

    state.photos.sort((a, b) => a.createdAt - b.createdAt);
    ensureRuntimePhotos();
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast(`${list.length}枚追加しました`);
  }

  async function removePhoto(photoId) {
    await dbDelete(photoId);
    state.photos = state.photos.filter(photo => photo.id !== photoId);
    state.selectedPhotoId = state.selectedPhotoId === photoId ? null : state.selectedPhotoId;

    state.frames.forEach(frame => {
      if (frame.lockedPhotoId === photoId) frame.lockedPhotoId = null;
      if (frame.runtime.currentPhotoId === photoId) frame.runtime.currentPhotoId = null;
      if (frame.runtime.previousPhotoId === photoId) frame.runtime.previousPhotoId = null;
    });

    ensureRuntimePhotos();
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast("写真を削除しました");
  }

  function toggleDisplayMode() {
    state.mode = state.mode === "edit" ? "display" : "edit";
    renderAll();
    startDisplayTimersIfNeeded();
  }

  function addFrame() {
    const frame = normalizeFrame({
      shape: "square",
      x: 1100,
      y: 520,
      width: 220,
      z: maxZ() + 1
    });

    let found = false;
    for (let i = 0; i < 50; i += 1) {
      frame.x = 120 + i * 28;
      frame.y = 120 + i * 18;
      keepFrameInside(frame);
      if (!collides(frame, frame.id)) {
        found = true;
        break;
      }
    }

    if (!found) {
      showToast("置ける場所がありません");
      return;
    }

    state.frames.push(frame);
    state.selectedFrameId = frame.id;
    ensureRuntimePhotos();
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
  }

  function cycleShape() {
    const frame = selectedFrame();
    if (!frame) {
      showToast("先にフレームを選択してください");
      return;
    }

    const backup = { x: frame.x, y: frame.y, width: frame.width, shape: frame.shape };
    const nextShape = SHAPE_ORDER[(SHAPE_ORDER.indexOf(frame.shape) + 1) % SHAPE_ORDER.length];
    frame.shape = nextShape;
    keepFrameInside(frame);

    if (collides(frame, frame.id)) {
      frame.x = backup.x;
      frame.y = backup.y;
      frame.width = backup.width;
      frame.shape = backup.shape;
      showToast("その形だと重なります");
      return;
    }

    if (frame.shape === "oval" && !frame.lockedPhotoId) {
      frame.lockedPhotoId = null;
    }

    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
  }

  function lockSelectedPhoto() {
    const frame = selectedFrame();
    if (!frame) {
      showToast("先にフレームを選択してください");
      return;
    }

    if (state.selectedPhotoId) {
      frame.lockedPhotoId = state.selectedPhotoId;
      frame.runtime.previousPhotoId = frame.runtime.currentPhotoId;
      frame.runtime.currentPhotoId = state.selectedPhotoId;
    } else if (frame.runtime.currentPhotoId) {
      frame.lockedPhotoId = frame.runtime.currentPhotoId;
    } else {
      showToast("固定する写真がありません");
      return;
    }

    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast("写真を固定しました");
  }

  function unlockSelectedPhoto() {
    const frame = selectedFrame();
    if (!frame) {
      showToast("先にフレームを選択してください");
      return;
    }

    frame.lockedPhotoId = null;
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast("固定を解除しました");
  }

  function bringSelectedToFront() {
    const frame = selectedFrame();
    if (!frame) {
      showToast("先にフレームを選択してください");
      return;
    }

    frame.z = maxZ() + 1;
    saveState();
    renderAll();
  }

  function deleteSelectedFrame() {
    const frame = selectedFrame();
    if (!frame) {
      showToast("先にフレームを選択してください");
      return;
    }

    state.frames = state.frames.filter(item => item.id !== frame.id);
    state.selectedFrameId = null;
    saveState();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast("フレームを削除しました");
  }

  function loadSavedState() {
    if (!loadState()) {
      showToast("保存データがありません");
      return;
    }
    ensureRuntimePhotos();
    renderAll();
    startDisplayTimersIfNeeded();
    showToast("保存データを読み込みました");
  }

  function bindFrameEvents(node, frameId) {
    if (state.mode !== "edit") return;

    const frameNumber = node.querySelector(".frame-number");
    const resizeHandle = node.querySelector(".resize-handle");
    const photoViewport = node.querySelector(".photo-viewport");

    node.addEventListener("click", () => {
      state.selectedFrameId = frameId;
      updateStatus();
      renderWall();
    });

    frameNumber.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();

      const frame = state.frames.find(item => item.id === frameId);
      if (!frame) return;

      state.selectedFrameId = frameId;
      renderAll();

      const startX = event.clientX;
      const startY = event.clientY;
      const before = { x: frame.x, y: frame.y };
      frameNumber.setPointerCapture(event.pointerId);

      const onMove = (moveEvent) => {
        const dx = moveEvent.clientX - startX;
        const dy = moveEvent.clientY - startY;
        frame.x = before.x + dx;
        frame.y = before.y + dy;
        keepFrameInside(frame);
        if (!collides(frame, frame.id)) {
          renderFrame(frame.id);
        }
      };

      const onUp = () => {
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);

        if (collides(frame, frame.id)) {
          frame.x = before.x;
          frame.y = before.y;
          renderFrame(frame.id);
          showToast("重なる位置には置けません");
        }
        saveState();
      };

      window.addEventListener("pointermove", onMove, { passive: true });
      window.addEventListener("pointerup", onUp, { passive: true });
    });

    resizeHandle.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();

      const frame = state.frames.find(item => item.id === frameId);
      if (!frame) return;

      state.selectedFrameId = frameId;
      renderAll();

      const startX = event.clientX;
      const before = { width: frame.width, x: frame.x, y: frame.y };
      resizeHandle.setPointerCapture(event.pointerId);

      const onMove = (moveEvent) => {
        const dx = moveEvent.clientX - startX;
        frame.width = clamp(before.width + dx, MIN_FRAME_W, MAX_FRAME_W);
        keepFrameInside(frame);
        if (!collides(frame, frame.id)) {
          renderFrame(frame.id);
        }
      };

      const onUp = () => {
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);

        if (collides(frame, frame.id)) {
          frame.width = before.width;
          frame.x = before.x;
          frame.y = before.y;
          renderFrame(frame.id);
          showToast("その大きさにはできません");
        }
        saveState();
      };

      window.addEventListener("pointermove", onMove, { passive: true });
      window.addEventListener("pointerup", onUp, { passive: true });
    });

    photoViewport.addEventListener("pointerdown", (event) => {
      event.stopPropagation();

      const frame = state.frames.find(item => item.id === frameId);
      if (!frame) return;

      const startX = event.clientX;
      const startY = event.clientY;
      const beforeX = frame.focusX;
      const beforeY = frame.focusY;
      let adjusting = false;

      clearTimeout(state.holdTimer);
      state.holdTimer = setTimeout(() => {
        adjusting = true;
        node.classList.add("adjusting");
        photoViewport.setPointerCapture(event.pointerId);
        showToast("写真位置を調整中");
      }, HOLD_MS);

      const onMove = (moveEvent) => {
        if (!adjusting) return;
        const dx = moveEvent.clientX - startX;
        const dy = moveEvent.clientY - startY;
        frame.focusX = clamp(beforeX - dx * 0.12, 0, 100);
        frame.focusY = clamp(beforeY - dy * 0.12, 0, 100);
        renderFrame(frame.id);
      };

      const onUp = () => {
        clearTimeout(state.holdTimer);
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        if (adjusting) {
          node.classList.remove("adjusting");
          saveState();
        }
      };

      window.addEventListener("pointermove", onMove, { passive: true });
      window.addEventListener("pointerup", onUp, { passive: true });
    });
  }

  function bindUI() {
    document.querySelectorAll(".frame-set-btn").forEach(button => {
      button.addEventListener("click", () => {
        applyLayout(button.dataset.layout);
      });
    });

    els.addPhotosBtn.addEventListener("click", () => {
      els.photoInput.click();
    });

    els.photoInput.addEventListener("change", async (event) => {
      await addPhotos(event.target.files);
      event.target.value = "";
    });

    els.toggleDisplayBtn.addEventListener("click", toggleDisplayMode);
    els.saveBtn.addEventListener("click", () => {
      saveState();
      showToast("配置を保存しました");
    });
    els.loadBtn.addEventListener("click", loadSavedState);
    els.resetBtn.addEventListener("click", resetCurrentLayout);

    els.shapeBtn.addEventListener("click", cycleShape);
    els.lockBtn.addEventListener("click", lockSelectedPhoto);
    els.unlockBtn.addEventListener("click", unlockSelectedPhoto);
    els.frontBtn.addEventListener("click", bringSelectedToFront);
    els.deleteFrameBtn.addEventListener("click", deleteSelectedFrame);
    els.addFrameBtn.addEventListener("click", addFrame);

    window.addEventListener("resize", () => {
      updateDisplayScale();
    });

    document.addEventListener("keydown", (event) => {
      if (state.mode !== "edit") return;

      const frame = selectedFrame();
      if (!frame) return;

      const step = event.shiftKey ? 12 : 4;
      let changed = false;

      if (event.key === "ArrowLeft") {
        const next = { ...frame, x: frame.x - step };
        keepFrameInside(next);
        if (!collides(next, frame.id)) {
          frame.x = next.x;
          changed = true;
        }
      } else if (event.key === "ArrowRight") {
        const next = { ...frame, x: frame.x + step };
        keepFrameInside(next);
        if (!collides(next, frame.id)) {
          frame.x = next.x;
          changed = true;
        }
      } else if (event.key === "ArrowUp") {
        const next = { ...frame, y: frame.y - step };
        keepFrameInside(next);
        if (!collides(next, frame.id)) {
          frame.y = next.y;
          changed = true;
        }
      } else if (event.key === "ArrowDown") {
        const next = { ...frame, y: frame.y + step };
        keepFrameInside(next);
        if (!collides(next, frame.id)) {
          frame.y = next.y;
          changed = true;
        }
      } else if (event.key === "Escape") {
        state.selectedFrameId = null;
        renderAll();
      }

      if (changed) {
        saveState();
        renderFrame(frame.id);
      }
    });
  }

  async function init() {
    state.db = await openDB();
    state.photos = (await dbGetAll()).sort((a, b) => a.createdAt - b.createdAt);

    if (!loadState()) {
      state.frames = (LAYOUTS.story || []).map((item, index) => normalizeFrame({
        shape: item.shape,
        x: item.x,
        y: item.y,
        width: item.w,
        z: item.z ?? index + 1
      }));
      state.layout = "story";
      state.mode = "edit";
    }

    ensureRuntimePhotos();
    bindUI();
    renderAll();
    startDisplayTimersIfNeeded();

    els.wallScroll.scrollLeft = EDIT_SCROLL_LEFT;
  }

  init().catch((error) => {
    console.error(error);
    showToast("初期化に失敗しました");
  });
})();
</script>
</body>
</html>
