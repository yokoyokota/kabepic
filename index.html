<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:#e9e4d8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.wall{
width:min(92vw,1100px);
aspect-ratio:16/10;
background:#d5d0c7;
border-radius:18px;
position:relative;
}

/* 共通 */

.frame{
position:absolute;
background-repeat:no-repeat;
background-position:center;
background-size:100% 100%;
}

/* ----- 確定比率 ----- */

/* 縦 894 × 1063 */
.vertical{
aspect-ratio:894 / 1063;
}

/* 正方形 1053 × 1052 */
.square{
aspect-ratio:1053 / 1052;
}

/* 横 1063 × 894 */
.horizontal{
aspect-ratio:1063 / 894;
}

/* 楕円 694 × 982 */
.oval{
aspect-ratio:694 / 982;
}

/* サイズ（確認用） */

.v1{ width:120px; left:5%; top:45%; }
.v2{ width:130px; left:70%; top:55%; }

.s1{ width:150px; left:20%; top:25%; }
.s2{ width:160px; left:45%; top:60%; }

.h1{ width:170px; left:55%; top:25%; }
.h2{ width:180px; left:10%; top:70%; }

.v3{ width:150px; left:40%; top:10%; }

</style>
</head>

<body>

<div class="wall">

<div class="frame vertical v1" style="background-image:url(frame_vertical.png)"></div>
<div class="frame square s1" style="background-image:url(frame_square.png)"></div>
<div class="frame vertical v3" style="background-image:url(frame_vertical.png)"></div>
<div class="frame horizontal h1" style="background-image:url(frame_horizontal.png)"></div>
<div class="frame horizontal h2" style="background-image:url(frame_horizontal.png)"></div>
<div class="frame square s2" style="background-image:url(frame_square.png)"></div>
<div class="frame vertical v2" style="background-image:url(frame_vertical.png)"></div>

</div>

</body>
</html>
