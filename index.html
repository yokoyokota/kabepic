<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KABEPIC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-touch-callout:none;
}

body{
font-family:sans-serif;
background:#111;
color:#fff;
overflow:hidden;
}

#toolbar{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#222;
display:flex;
gap:10px;
align-items:center;
padding:10px;
z-index:100;
}

button{
padding:10px 14px;
border:none;
background:#444;
color:white;
border-radius:8px;
font-size:14px;
}

#stageWrapper{
position:absolute;
top:60px;
left:0;
right:0;
bottom:0;
overflow:auto;
display:flex;
justify-content:center;
align-items:center;
}

#stage{
position:relative;
background:#000;
width:1200px;
height:800px;
transform-origin:center;
}

.frame{
position:absolute;
touch-action:none;
}

.frame img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.frameMask{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

#photoInput{
display:none;
}

#progress{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px 20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="toolbar">

<button id="addBtn">写真追加</button>
<button id="layoutBtn">配置編集</button>
<button id="viewBtn">表示</button>
<button id="editBtn">編集</button>

</div>

<div id="stageWrapper">
<div id="stage"></div>
</div>

<input id="photoInput" type="file" accept="image/*" multiple>

<div id="progress">アップロード中...</div>

<script>

const state={
photos:[],
frames:[],
mode:"edit",
layoutEdit:false
}

const stage=document.getElementById("stage")
const input=document.getElementById("photoInput")
const progress=document.getElementById("progress")

const addBtn=document.getElementById("addBtn")
const layoutBtn=document.getElementById("layoutBtn")
const viewBtn=document.getElementById("viewBtn")
const editBtn=document.getElementById("editBtn")

addBtn.onclick=()=>input.click()

layoutBtn.onclick=()=>{
state.layoutEdit=!state.layoutEdit
alert(state.layoutEdit?"配置編集ON":"配置編集OFF")
}

viewBtn.onclick=()=>{
state.mode="view"
}

editBtn.onclick=()=>{
state.mode="edit"
}

input.addEventListener("change",async e=>{

const files=[...e.target.files]

progress.style.display="block"

for(const file of files){

const data=await fileToData(file)

if(state.photos.includes(data)) continue

state.photos.push(data)

}

progress.style.display="none"

render()

})

function fileToData(file){

return new Promise(res=>{
const r=new FileReader()
r.onload=()=>res(r.result)
r.readAsDataURL(file)
})

}

function render(){

stage.innerHTML=""

state.frames.forEach((f,i)=>{

const div=document.createElement("div")
div.className="frame"
div.style.left=f.x+"px"
div.style.top=f.y+"px"
div.style.width=f.w+"px"
div.style.height=f.h+"px"

const img=document.createElement("img")

const photo=state.photos[i%state.photos.length]

if(photo) img.src=photo

div.appendChild(img)

stage.appendChild(div)

enableMove(div,f)

})

}

function enableMove(el,f){

let startX,startY

el.addEventListener("pointerdown",e=>{

if(state.mode!=="edit") return
if(!state.layoutEdit) return

startX=e.clientX
startY=e.clientY

const move=e2=>{

const dx=e2.clientX-startX
const dy=e2.clientY-startY

f.x+=dx
f.y+=dy

el.style.left=f.x+"px"
el.style.top=f.y+"px"

startX=e2.clientX
startY=e2.clientY

}

const up=()=>{

window.removeEventListener("pointermove",move)
window.removeEventListener("pointerup",up)

}

window.addEventListener("pointermove",move)
window.addEventListener("pointerup",up)

})

}

function fitStage(){

const w=window.innerWidth
const h=window.innerHeight-60

const scale=Math.min(w/1200,h/800)

stage.style.transform=`scale(${scale})`

}

window.addEventListener("resize",fitStage)

fitStage()

state.frames=[
{x:0,y:0,w:300,h:400},
{x:320,y:0,w:300,h:300},
{x:640,y:0,w:400,h:300}
]

render()

</script>

</body>
</html>
