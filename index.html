<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KABEPIC Layout Test</title>

<style>

body{
margin:0;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

#stage{
position:relative;
width:900px;
height:600px;
background:white;
box-shadow:0 0 20px rgba(0,0,0,0.1);
overflow:hidden;
}

/* フレーム */

.frame{
position:absolute;
background-size:cover;
background-position:center;
}

/* 内側写真 */

.photo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="stage"></div>

<script>

/* Story8 配置（配置図ベース） */

const frames = [

{
type:"vertical",
x:40,
y:40,
w:140,
h:220
},

{
type:"square",
x:200,
y:40,
w:160,
h:160
},

{
type:"horizontal",
x:380,
y:40,
w:220,
h:140
},

{
type:"vertical",
x:640,
y:40,
w:140,
h:220
},

{
type:"square",
x:40,
y:300,
w:160,
h:160
},

{
type:"horizontal",
x:220,
y:300,
w:220,
h:140
},

{
type:"vertical",
x:480,
y:260,
w:140,
h:220
},

{
type:"horizontal",
x:640,
y:300,
w:220,
h:140
}

]

const stage = document.getElementById("stage")

frames.forEach(f=>{

const frame = document.createElement("div")

frame.className="frame"

frame.style.left=f.x+"px"
frame.style.top=f.y+"px"
frame.style.width=f.w+"px"
frame.style.height=f.h+"px"

frame.style.backgroundImage=`url(images/frame_${f.type}.png)`

const img=document.createElement("img")

img.src="https://picsum.photos/400?random="+Math.random()
img.className="photo"

frame.appendChild(img)

stage.appendChild(frame)

})

</script>

</body>
</html>
