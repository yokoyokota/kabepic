<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
  />
  <title>KABEPIC</title>
  <meta name="description" content="思い出を、暮らしの背景に。" />
  <style>
    :root {
      --wall-bg: #f2ede3;
      --panel-bg: rgba(255, 255, 255, 0.94);
      --panel-line: rgba(0, 0, 0, 0.08);
      --text: #1d1d1d;
      --muted: #6f685f;
      --accent: #2f5bda;
      --accent-soft: rgba(47, 91, 218, 0.10);
      --danger: #c84a4a;
      --shadow-lg: 0 18px 36px rgba(0, 0, 0, 0.12);
      --shadow-md: 0 10px 18px rgba(0, 0, 0, 0.10);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --fade-ms: 1200ms;
      --wall-w: 1600;
      --wall-h: 900;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--wall-bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body.display-mode {
      background: var(--wall-bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--wall-bg);
    }

    .toolbar {
      position: fixed;
      top: calc(var(--safe-top) + 12px);
      left: 12px;
      right: 12px;
      z-index: 3000;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      padding: 8px 10px;
      border-radius: 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand {
      flex-shrink: 0;
      font-weight: 900;
      font-size: 1.04rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding: 0 4px 0 2px;
    }

    .toolbar-scroll {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    .toolbar-scroll::-webkit-scrollbar {
      display: none;
    }

    .toolbar-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-mini {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-md);
      font-weight: 900;
      white-space: nowrap;
      transition:
        transform 140ms ease,
        background 140ms ease,
        color 140ms ease,
        opacity 140ms ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.soft {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(47, 91, 218, 0.12);
      box-shadow: none;
    }

    .btn.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .btn.danger {
      color: var(--danger);
    }

    .btn[disabled] {
      opacity: 0.55;
      pointer-events: none;
    }

    .menu {
      position: fixed;
      top: calc(var(--safe-top) + 78px);
      right: 12px;
      z-index: 2900;
      min-width: 220px;
      padding: 8px;
      border-radius: 18px;
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .menu.open {
      display: flex;
    }

    .menu.frames {
      right: auto;
      left: 120px;
      min-width: 220px;
    }

    .menu-item {
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
    }

    .menu-item.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .viewport {
      position: absolute;
      inset: 0;
      padding-top: calc(var(--safe-top) + 84px);
      padding-bottom: calc(var(--safe-bottom) + 16px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    body.display-mode .viewport {
      padding: 0;
      overflow: hidden;
      touch-action: none;
    }

    .world {
      position: relative;
      width: calc(var(--wall-w) * 1px);
      height: calc(var(--wall-h) * 1px);
      transform-origin: top left;
      will-change: transform;
    }

    .stage {
      position: relative;
      width: calc(var(--wall-w) * 1px);
      height: calc(var(--wall-h) * 1px);
      background: var(--wall-bg);
      overflow: visible;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,0.18), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.02));
    }

    body.display-mode .toolbar,
    body.display-mode .menu,
    body.display-mode .selection-bar,
    body.display-mode .photo-sheet {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .frame {
      position: absolute;
      z-index: 1;
      user-select: none;
      transition:
        left 220ms ease,
        top 220ms ease,
        width 220ms ease,
        height 220ms ease,
        filter 180ms ease;
    }

    .frame.selected {
      z-index: 50 !important;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,0.18));
    }

    .frame-outline {
      position: absolute;
      inset: -8px;
      border-radius: 18px;
      border: 3px solid rgba(47, 91, 218, 0.18);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .frame.selected .frame-outline {
      opacity: 1;
    }

    .photo-viewport {
      position: absolute;
      top: var(--pv-top);
      right: var(--pv-right);
      bottom: var(--pv-bottom);
      left: var(--pv-left);
      z-index: 2;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    .photo-viewport.oval {
      clip-path: ellipse(50% 50% at 50% 50%);
      border-radius: 999px;
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--fade-ms) ease;
    }

    .photo-layer.active {
      opacity: 1;
    }

    .photo-box {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-image: none;
      background-position: 50% 50%;
      background-size: cover;
    }

    .frame-art-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .frame-art {
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      display: block;
    }

    .frame-badge {
      position: absolute;
      top: -16px;
      left: -16px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(16, 24, 44, 0.96);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.16);
      font-size: 0.92rem;
      font-weight: 900;
      box-shadow: 0 10px 18px rgba(0,0,0,0.20);
      z-index: 7;
      cursor: grab;
      touch-action: none;
    }

    .frame-badge:active {
      cursor: grabbing;
    }

    .resize-handle {
      position: absolute;
      right: -12px;
      bottom: -12px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.98);
      border: 3px solid rgba(47, 91, 218, 0.92);
      box-shadow: 0 8px 16px rgba(0,0,0,0.14);
      z-index: 7;
      touch-action: none;
    }

    .frame-pin {
      position: absolute;
      top: -10px;
      right: -10px;
      min-width: 40px;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 7;
    }

    .frame.locked .frame-pin {
      display: inline-flex;
    }

    body.display-mode .frame-outline,
    body.display-mode .frame-badge,
    body.display-mode .resize-handle,
    body.display-mode .frame-pin {
      display: none !important;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: rgba(0,0,0,0.38);
      font-weight: 900;
      text-align: center;
      padding: 14px;
    }

    .empty-state > span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1px dashed rgba(0,0,0,0.14);
      box-shadow: 0 6px 14px rgba(0,0,0,0.06);
      font-size: 12px;
    }

    body.display-mode .empty-state {
      display: none !important;
    }

    .selection-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(var(--safe-bottom) + 12px);
      z-index: 2600;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 12px;
      border-radius: 22px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      scrollbar-width: none;
    }

    .selection-bar::-webkit-scrollbar {
      display: none;
    }

    .photo-sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(var(--safe-bottom) + 12px);
      z-index: 2700;
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform: translateY(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
      transition: transform 220ms ease, opacity 220ms ease;
      overflow: hidden;
    }

    .photo-sheet.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-line);
    }

    .sheet-title {
      font-size: 1.1rem;
      font-weight: 900;
    }

    .sheet-meta {
      color: var(--muted);
      font-weight: 800;
      margin-top: 2px;
      font-size: 0.9rem;
    }

    .sheet-body {
      padding: 14px;
      max-height: min(56vh, 520px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 12px;
      overflow: visible;
    }

    .thumb-card {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--panel-line);
      background: #f7f4ee;
      box-shadow: var(--shadow-md);
    }

    .thumb-card.selected {
      outline: 3px solid rgba(47, 91, 218, 0.22);
      outline-offset: 2px;
    }

    .thumb-card > button.preview {
      width: 100%;
      height: 100%;
      padding: 0;
      display: block;
    }

    .thumb-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-badge {
      position: absolute;
      left: 6px;
      bottom: 6px;
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(20,20,20,0.78);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-delete {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--panel-line);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
      color: var(--danger);
      font-weight: 900;
      z-index: 2;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 4000;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .viewer.open {
      display: flex;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 18px 30px rgba(0,0,0,0.28);
    }

    .viewer-close {
      position: absolute;
      top: calc(var(--safe-top) + 14px);
      right: 14px;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 1.2rem;
      font-weight: 900;
    }

    #displayHint {
      position: fixed;
      top: calc(var(--safe-top) + 14px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 4200;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(20, 28, 48, 0.80);
      color: #fff;
      font-weight: 900;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }

    body.display-mode #displayHint.show {
      opacity: 1;
    }

    #toast {
      position: fixed;
      top: calc(var(--safe-top) + 86px);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 5000;
      max-width: min(92vw, 560px);
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
      text-align: center;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #progressOverlay {
      position: fixed;
      inset: 0;
      z-index: 5500;
      background: rgba(0,0,0,0.28);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #progressOverlay.open {
      display: flex;
    }

    .progress-card {
      width: min(92vw, 360px);
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.98);
      border: 1px solid var(--panel-line);
      box-shadow: var(--shadow-lg);
    }

    .progress-title {
      font-size: 1.04rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .progress-meta {
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 160ms ease;
    }

    @media (max-width: 760px) {
      .brand {
        display: none;
      }

      .menu.frames {
        left: 12px;
        right: 12px;
        min-width: auto;
      }

      .thumb-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .sheet-body {
        max-height: min(58vh, 560px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <input id="photoInput" class="hidden" type="file" accept="image/*" multiple />

    <div id="toolbar" class="toolbar">
      <div class="brand">KABEPIC</div>

      <div class="toolbar-scroll">
        <button id="addPhotosBtn" class="btn primary">＋写真追加</button>
        <button id="framesBtn" class="btn">Frames</button>
        <button id="photosBtn" class="btn">写真一覧</button>
        <button id="displayBtn" class="btn">▶ 表示</button>
        <button id="zoomOutBtn" class="btn soft">−</button>
        <button id="fitBtn" class="btn soft">全体</button>
        <button id="zoomInBtn" class="btn soft">＋</button>
      </div>

      <div class="toolbar-right">
        <div id="statusMini" class="status-mini">写真 0枚</div>
        <button id="moreBtn" class="btn">⋯</button>
      </div>
    </div>

    <div id="framesMenu" class="menu frames"></div>

    <div id="moreMenu" class="menu">
      <button id="saveBtn" class="menu-item">保存</button>
      <button id="loadBtn" class="menu-item">読込</button>
      <button id="resetBtn" class="menu-item danger">現在セットを初期位置に戻す</button>
    </div>

    <div id="viewport" class="viewport">
      <div id="world" class="world">
        <div id="stage" class="stage"></div>
      </div>
    </div>

    <div id="selectionBar" class="selection-bar hidden">
      <button id="toggleStyleBtn" class="btn">装飾切替</button>
      <button id="toggleOvalBtn" class="btn">楕円にする</button>
      <button id="pinPhotoBtn" class="btn soft">写真固定</button>
      <button id="openPhotosBtn" class="btn soft">写真一覧を開く</button>
      <div id="selectionMeta" class="status-mini">選択なし</div>
    </div>

    <div id="photoSheet" class="photo-sheet">
      <div class="sheet-head">
        <div>
          <div class="sheet-title">写真一覧</div>
          <div id="sheetMeta" class="sheet-meta">0枚</div>
        </div>
        <button id="closeSheetBtn" class="btn">閉じる</button>
      </div>
      <div class="sheet-body">
        <div id="thumbGrid" class="thumb-grid"></div>
      </div>
    </div>

    <div id="viewer" class="viewer">
      <button id="viewerClose" class="viewer-close">×</button>
      <img id="viewerImage" alt="" />
    </div>

    <div id="displayHint">タップで編集に戻る</div>
    <div id="toast"></div>

    <div id="progressOverlay">
      <div class="progress-card">
        <div class="progress-title">写真を追加中</div>
        <div id="progressMeta" class="progress-meta">0 / 0</div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "kabepic_html_static_v10";
      const DB_NAME = "kabepic_photo_db_v10";
      const STORE_NAME = "photos";

      const WALL_W = 1600;
      const WALL_H = 900;
      const GRID = 10;

      const MIN_WIDTH = 120;
      const MAX_WIDTH = 700;
      const SWITCH_MIN_MS = 25000;
      const SWITCH_MAX_MS = 35000;
      const FADE_MS = 1200;
      const JPEG_QUALITY = 0.84;
      const MAX_LONG_EDGE = 1600;

      const $ = (id) => document.getElementById(id);

      const els = {
        viewport: $("viewport"),
        world: $("world"),
        stage: $("stage"),
        photoInput: $("photoInput"),
        addPhotosBtn: $("addPhotosBtn"),
        framesBtn: $("framesBtn"),
        photosBtn: $("photosBtn"),
        displayBtn: $("displayBtn"),
        zoomOutBtn: $("zoomOutBtn"),
        fitBtn: $("fitBtn"),
        zoomInBtn: $("zoomInBtn"),
        moreBtn: $("moreBtn"),
        saveBtn: $("saveBtn"),
        loadBtn: $("loadBtn"),
        resetBtn: $("resetBtn"),
        framesMenu: $("framesMenu"),
        moreMenu: $("moreMenu"),
        statusMini: $("statusMini"),
        selectionBar: $("selectionBar"),
        toggleStyleBtn: $("toggleStyleBtn"),
        toggleOvalBtn: $("toggleOvalBtn"),
        pinPhotoBtn: $("pinPhotoBtn"),
        openPhotosBtn: $("openPhotosBtn"),
        selectionMeta: $("selectionMeta"),
        photoSheet: $("photoSheet"),
        closeSheetBtn: $("closeSheetBtn"),
        thumbGrid: $("thumbGrid"),
        sheetMeta: $("sheetMeta"),
        viewer: $("viewer"),
        viewerImage: $("viewerImage"),
        viewerClose: $("viewerClose"),
        displayHint: $("displayHint"),
        toast: $("toast"),
        progressOverlay: $("progressOverlay"),
        progressMeta: $("progressMeta"),
        progressFill: $("progressFill")
      };

      const SET_LABELS = {
        calm: "Calm 3",
        flow: "Flow 5",
        story: "Story 8",
        scene: "Scene 11"
      };

      const FRAME_SPECS = {
        vertical: {
          family: "vertical",
          ratio: 0.72,
          art: "frame_vertical.png",
          fallback: "frame_vertical.png",
          inset: { top: 10, right: 14, bottom: 13, left: 14 }
        },
        vertical_simple: {
          family: "vertical",
          ratio: 0.72,
          art: "frame_vertical_simple.png",
          fallback: "frame_vertical.png",
          inset: { top: 10, right: 14, bottom: 13, left: 14 }
        },
        horizontal: {
          family: "horizontal",
          ratio: 1.24,
          art: "frame_horizontal.png",
          fallback: "frame_horizontal.png",
          inset: { top: 14, right: 10, bottom: 14, left: 10 }
        },
        horizontal_simple: {
          family: "horizontal",
          ratio: 1.24,
          art: "frame_horizontal_simple.png",
          fallback: "frame_horizontal.png",
          inset: { top: 14, right: 10, bottom: 14, left: 10 }
        },
        square: {
          family: "square",
          ratio: 1,
          art: "frame_square.png",
          fallback: "frame_square.png",
          inset: { top: 16, right: 16, bottom: 16, left: 16 }
        },
        square_simple: {
          family: "square",
          ratio: 1,
          art: "frame_square_simple.png",
          fallback: "frame_square.png",
          inset: { top: 14, right: 14, bottom: 14, left: 14 }
        },
        oval: {
          family: "vertical",
          ratio: 0.82,
          art: "frame_oval.png",
          fallback: "frame_oval.png",
          inset: { top: 8, right: 8, bottom: 8, left: 8 },
          oval: true
        }
      };

      /*
        配置は 10px グリッド基準。
        x/y/w はグリッド数。
        高さは frame kind の ratio から算出。
        ここは白キャンバスだけを基準にしています。
      */
      const LAYOUTS = {
        calm: [
          { id: 1, kind: "vertical", x: 32, y: 2,  w: 38 },
          { id: 2, kind: "square",   x: 76, y: 10, w: 31 },
          { id: 3, kind: "horizontal", x: 53, y: 53, w: 41 }
        ],
        flow: [
          { id: 1, kind: "vertical", x: 2,   y: 26, w: 24 },
          { id: 2, kind: "vertical", x: 34,  y: 5,  w: 34 },
          { id: 3, kind: "square",   x: 78,  y: 13, w: 26 },
          { id: 4, kind: "square_simple", x: 112, y: 28, w: 24 },
          { id: 5, kind: "horizontal", x: 49, y: 47, w: 40 }
        ],
        story: [
          { id: 1, kind: "vertical", x: 2,   y: 23, w: 21 },
          { id: 2, kind: "square",   x: 29,  y: 12, w: 29 },
          { id: 3, kind: "vertical_simple", x: 61, y: 2,  w: 34 },
          { id: 4, kind: "square_simple", x: 98, y: 15, w: 24 },
          { id: 5, kind: "horizontal", x: 126, y: 21, w: 34 },
          { id: 6, kind: "square", x: 28, y: 50, w: 28 },
          { id: 7, kind: "vertical_simple", x: 57, y: 52, w: 18 },
          { id: 8, kind: "horizontal", x: 103, y: 50, w: 38 }
        ],
        scene: [
          { id: 1, kind: "square_simple", x: 1,   y: 14, w: 24 },
          { id: 2, kind: "square", x: 28,  y: 9,  w: 29 },
          { id: 3, kind: "vertical_simple", x: 70, y: 0,  w: 21 },
          { id: 4, kind: "vertical", x: 62, y: 28, w: 33 },
          { id: 5, kind: "vertical", x: 97, y: 15, w: 21 },
          { id: 6, kind: "square_simple", x: 121, y: 18, w: 17 },
          { id: 7, kind: "square_simple", x: 18, y: 50, w: 16 },
          { id: 8, kind: "vertical", x: 38, y: 49, w: 18 },
          { id: 9, kind: "vertical_simple", x: 69, y: 65, w: 21 },
          { id: 10, kind: "horizontal", x: 103, y: 49, w: 36 },
          { id: 11, kind: "square_simple", x: 143, y: 50, w: 18 }
        ]
      };

      const state = {
        db: null,
        mode: "edit",
        layoutKey: "story",
        photos: [],
        frames: [],
        selectedFrameUid: null,
        selectedPhotoId: null,
        zoom: 1,
        fitZoom: 1,
        sheetOpen: false,
        toastTimer: null,
        isUploading: false
      };

      function uid(prefix = "id") {
        return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomMs(min, max) {
        return Math.floor(min + Math.random() * (max - min));
      }

      function showToast(message, ms = 1800) {
        clearTimeout(state.toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        state.toastTimer = setTimeout(() => {
          els.toast.classList.remove("show");
        }, ms);
      }

      function setProgress(open, current = 0, total = 0) {
        state.isUploading = open;
        els.addPhotosBtn.disabled = open;
        els.photoInput.disabled = open;
        els.progressOverlay.classList.toggle("open", open);
        if (open) {
          els.progressMeta.textContent = `${current} / ${total}`;
          const percent = total ? Math.round((current / total) * 100) : 0;
          els.progressFill.style.width = `${percent}%`;
        } else {
          els.progressMeta.textContent = "0 / 0";
          els.progressFill.style.width = "0%";
        }
        renderToolbar();
      }

      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      function dbPut(photo) {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).put(photo);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      function dbDelete(photoId) {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).delete(photoId);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      function dbGetAll() {
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(STORE_NAME, "readonly");
          const req = tx.objectStore(STORE_NAME).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      function saveState() {
        const payload = {
          layoutKey: state.layoutKey,
          mode: state.mode,
          zoom: state.zoom,
          frames: state.frames.map((frame) => ({
            uid: frame.uid,
            fixedId: frame.fixedId,
            kind: frame.kind,
            fallbackKind: frame.fallbackKind,
            x: frame.x,
            y: frame.y,
            w: frame.w,
            pinnedPhotoId: frame.pinnedPhotoId || null,
            currentPhotoId: frame.currentPhotoId || null,
            queue: frame.queue || [],
            queueIndex: frame.queueIndex || 0
          }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
          const parsed = JSON.parse(raw);
          state.layoutKey = parsed.layoutKey || "story";
          state.mode = parsed.mode === "display" ? "display" : "edit";
          state.zoom = Number(parsed.zoom || 1);
          state.frames = (parsed.frames || []).map(normalizeFrame);
          return state.frames.length > 0;
        } catch {
          return false;
        }
      }

      function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      function fitWithin(width, height, maxLongEdge) {
        const longEdge = Math.max(width, height);
        if (longEdge <= maxLongEdge) return { width, height };
        const scale = maxLongEdge / longEdge;
        return {
          width: Math.round(width * scale),
          height: Math.round(height * scale)
        };
      }

      function bucketFor(width, height) {
        const ratio = width / height;
        if (ratio > 1.05) return "horizontal";
        if (ratio < 0.95) return "vertical";
        return "square";
      }

      async function compressImage(file) {
        const src = await fileToDataURL(file);
        const img = await loadImage(src);
        const fitted = fitWithin(img.width, img.height, MAX_LONG_EDGE);

        const canvas = document.createElement("canvas");
        canvas.width = fitted.width;
        canvas.height = fitted.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, fitted.width, fitted.height);

        return {
          id: uid("photo"),
          name: file.name,
          width: fitted.width,
          height: fitted.height,
          bucket: bucketFor(fitted.width, fitted.height),
          dataUrl: canvas.toDataURL("image/jpeg", JPEG_QUALITY),
          createdAt: Date.now()
        };
      }

      function frameHeight(frame) {
        return Math.round(frame.w / FRAME_SPECS[frame.kind].ratio);
      }

      function frameRect(frame) {
        return {
          left: frame.x,
          top: frame.y,
          right: frame.x + frame.w,
          bottom: frame.y + frameHeight(frame)
        };
      }

      function overlaps(a, b) {
        return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
      }

      function collides(candidate, ignoreUid = null) {
        const rect = frameRect(candidate);
        return state.frames.some((frame) => {
          if (frame.uid === ignoreUid) return false;
          return overlaps(rect, frameRect(frame));
        });
      }

      function photoById(id) {
        return state.photos.find((photo) => photo.id === id) || null;
      }

      function getSelectedFrame() {
        return state.frames.find((frame) => frame.uid === state.selectedFrameUid) || null;
      }

      function familyForKind(kind) {
        return FRAME_SPECS[kind].family;
      }

      function poolForFamily(family) {
        if (family === "vertical") {
          const list = state.photos.filter((p) => p.bucket === "vertical");
          return list.length ? list : state.photos.slice();
        }
        if (family === "horizontal") {
          const list = state.photos.filter((p) => p.bucket === "horizontal");
          return list.length ? list : state.photos.slice();
        }
        const list = state.photos.filter((p) => p.bucket === "square");
        return list.length ? list : state.photos.slice();
      }

      function shuffle(arr) {
        const copy = arr.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function rebuildQueues() {
        const familyPools = {
          vertical: shuffle(poolForFamily("vertical").map((p) => p.id)),
          horizontal: shuffle(poolForFamily("horizontal").map((p) => p.id)),
          square: shuffle(poolForFamily("square").map((p) => p.id))
        };

        state.frames.forEach((frame) => {
          const family = familyForKind(frame.kind);
          frame.queue = familyPools[family].slice();
          frame.queueIndex = 0;
        });
      }

      function visiblePhotoIds(exceptUid = null) {
        return new Set(
          state.frames
            .filter((frame) => frame.uid !== exceptUid)
            .map((frame) => frame.currentPhotoId)
            .filter(Boolean)
        );
      }

      function nextPhotoForFrame(frame) {
        if (frame.pinnedPhotoId) {
          return photoById(frame.pinnedPhotoId);
        }

        const family = familyForKind(frame.kind);
        let pool = frame.queue && frame.queue.length
          ? frame.queue.slice()
          : poolForFamily(family).map((p) => p.id);

        if (!pool.length) pool = state.photos.map((p) => p.id);
        if (!pool.length) return null;

        const visible = visiblePhotoIds(frame.uid);
        const current = frame.currentPhotoId;
        let attempts = 0;

        while (attempts < pool.length * 3) {
          if (frame.queueIndex >= pool.length) {
            frame.queue = shuffle(pool);
            frame.queueIndex = 0;
          }

          const candidateId = frame.queue[frame.queueIndex];
          frame.queueIndex += 1;
          const candidate = photoById(candidateId);

          if (!candidate) {
            attempts += 1;
            continue;
          }
          if (candidate.id === current) {
            attempts += 1;
            continue;
          }
          if (visible.has(candidate.id)) {
            attempts += 1;
            continue;
          }
          return candidate;
        }

        return state.photos.find((p) => p.id !== current) || state.photos[0] || null;
      }

      function ensureCurrentPhotos() {
        if (!state.photos.length) {
          state.frames.forEach((frame) => {
            frame.currentPhotoId = null;
            frame.previousPhotoId = null;
            frame.pinnedPhotoId = null;
          });
          return;
        }

        if (!state.frames.every((frame) => Array.isArray(frame.queue) && frame.queue.length)) {
          rebuildQueues();
        }

        state.frames.forEach((frame) => {
          if (frame.pinnedPhotoId && !photoById(frame.pinnedPhotoId)) frame.pinnedPhotoId = null;
          if (frame.currentPhotoId && !photoById(frame.currentPhotoId)) frame.currentPhotoId = null;
          if (frame.previousPhotoId && !photoById(frame.previousPhotoId)) frame.previousPhotoId = null;
        });

        state.frames.forEach((frame) => {
          if (!frame.currentPhotoId) {
            const next = nextPhotoForFrame(frame);
            frame.currentPhotoId = next ? next.id : null;
          }
        });
      }

      function clearTimer(frame) {
        if (frame.timer) clearTimeout(frame.timer);
        frame.timer = null;
      }

      function clearAllTimers() {
        state.frames.forEach(clearTimer);
      }

      function scheduleSwitch(frame) {
        clearTimer(frame);
        if (state.mode !== "display") return;
        if (frame.pinnedPhotoId) return;
        if (state.photos.length <= 1) return;

        frame.timer = setTimeout(() => {
          rotateFrame(frame.uid);
        }, randomMs(SWITCH_MIN_MS, SWITCH_MAX_MS));
      }

      function startDisplayTimers() {
        clearAllTimers();
        if (state.mode !== "display") return;
        ensureCurrentPhotos();
        state.frames.forEach(scheduleSwitch);
      }

      function rotateFrame(frameUid) {
        const frame = state.frames.find((item) => item.uid === frameUid);
        if (!frame) return;

        const next = nextPhotoForFrame(frame);
        if (!next) {
          scheduleSwitch(frame);
          return;
        }
        if (frame.currentPhotoId === next.id) {
          scheduleSwitch(frame);
          return;
        }

        frame.previousPhotoId = frame.currentPhotoId;
        frame.currentPhotoId = next.id;
        frame.activeLayer = frame.activeLayer === 0 ? 1 : 0;

        renderFrame(frame.uid);

        setTimeout(() => {
          frame.previousPhotoId = null;
          renderFrame(frame.uid);
          saveState();
        }, FADE_MS + 120);

        scheduleSwitch(frame);
      }

      function normalizeFrame(frame) {
        return {
          uid: frame.uid || uid("frame"),
          fixedId: frame.fixedId,
          kind: frame.kind,
          fallbackKind: frame.fallbackKind || frame.kind,
          x: Number(frame.x),
          y: Number(frame.y),
          w: Number(frame.w),
          pinnedPhotoId: frame.pinnedPhotoId || null,
          currentPhotoId: frame.currentPhotoId || null,
          previousPhotoId: null,
          activeLayer: 0,
          timer: null,
          queue: Array.isArray(frame.queue) ? frame.queue.slice() : [],
          queueIndex: Number(frame.queueIndex || 0)
        };
      }

      function createLayout(layoutKey) {
        return LAYOUTS[layoutKey].map((item) => normalizeFrame({
          uid: uid("frame"),
          fixedId: item.id,
          kind: item.kind,
          fallbackKind: item.kind,
          x: item.x * GRID,
          y: item.y * GRID,
          w: item.w * GRID,
          pinnedPhotoId: null,
          currentPhotoId: null,
          queue: [],
          queueIndex: 0
        }));
      }

      function renderToolbar() {
        if (!state.isUploading) {
          els.statusMini.textContent = `写真 ${state.photos.length}枚`;
        }
        els.displayBtn.textContent = state.mode === "edit" ? "▶ 表示" : "編集";
      }

      function buildFramesMenu() {
        els.framesMenu.innerHTML = "";
        Object.entries(SET_LABELS).forEach(([key, label]) => {
          const btn = document.createElement("button");
          btn.className = `menu-item${state.layoutKey === key ? " active" : ""}`;
          btn.textContent = label;
          btn.addEventListener("click", () => {
            closeMenus();
            applyLayout(key);
          });
          els.framesMenu.appendChild(btn);
        });
      }

      function buildSelectionBar() {
        const frame = getSelectedFrame();
        if (state.mode !== "edit" || !frame || state.sheetOpen) {
          els.selectionBar.classList.add("hidden");
          return;
        }

        els.selectionBar.classList.remove("hidden");

        const isSimple = frame.kind.includes("simple");
        const isOval = frame.kind === "oval";
        const isPinned = !!frame.pinnedPhotoId;

        els.toggleStyleBtn.textContent = isSimple ? "装飾に戻す" : "シンプルにする";
        els.toggleStyleBtn.disabled = isOval;

        els.toggleOvalBtn.textContent = isOval ? "四角に戻す" : "楕円にする";
        els.pinPhotoBtn.textContent = isPinned ? "固定解除" : "写真固定";

        els.selectionMeta.textContent =
          `${SET_LABELS[state.layoutKey]} / #${frame.fixedId} / ${frame.kind}${isPinned ? " / 固定中" : ""}`;
      }

      function buildPhotoSheet() {
        els.sheetMeta.textContent = `${state.photos.length}枚`;
        els.thumbGrid.innerHTML = "";

        state.photos.forEach((photo) => {
          const card = document.createElement("div");
          card.className = `thumb-card${state.selectedPhotoId === photo.id ? " selected" : ""}`;

          const preview = document.createElement("button");
          preview.className = "preview";
          preview.type = "button";
          preview.innerHTML = `<img src="${photo.dataUrl}" alt="">`;

          preview.addEventListener("click", () => {
            const frame = getSelectedFrame();
            if (frame) {
              state.selectedPhotoId = photo.id;
              frame.currentPhotoId = photo.id;
              frame.pinnedPhotoId = photo.id;
              renderAll();
              startDisplayTimers();
              saveState();
              showToast("写真を固定しました");
            } else {
              openViewer(photo.dataUrl);
            }
          });

          const badge = document.createElement("div");
          badge.className = "thumb-badge";
          badge.textContent =
            photo.bucket === "vertical" ? "縦" :
            photo.bucket === "horizontal" ? "横" : "正";

          const del = document.createElement("button");
          del.className = "thumb-delete";
          del.type = "button";
          del.textContent = "×";
          del.addEventListener("click", async (e) => {
            e.stopPropagation();
            await removePhoto(photo.id);
          });

          card.appendChild(preview);
          card.appendChild(badge);
          card.appendChild(del);
          els.thumbGrid.appendChild(card);
        });
      }

      function togglePhotoSheet(force) {
        state.sheetOpen = typeof force === "boolean" ? force : !state.sheetOpen;
        els.photoSheet.classList.toggle("open", state.sheetOpen && state.mode === "edit");
        buildSelectionBar();
      }

      function openViewer(src) {
        els.viewerImage.src = src;
        els.viewer.classList.add("open");
      }

      function closeViewer() {
        els.viewer.classList.remove("open");
        els.viewerImage.src = "";
      }

      function closeMenus() {
        els.moreMenu.classList.remove("open");
        els.framesMenu.classList.remove("open");
      }

      function fitZoomToViewport() {
        const vp = els.viewport.getBoundingClientRect();
        const scale = Math.min(
          (vp.width - 20) / WALL_W,
          (vp.height - 20) / WALL_H
        );
        state.fitZoom = clamp(scale, 0.1, 1);
        state.zoom = state.fitZoom;
        updateWorldTransform();
        centerWorld();
      }

      function updateWorldTransform() {
        if (state.mode === "display") {
          const vp = els.viewport.getBoundingClientRect();
          const scale = Math.min(vp.width / WALL_W, vp.height / WALL_H);
          const x = (vp.width - WALL_W * scale) / 2;
          const y = (vp.height - WALL_H * scale) / 2;
          els.world.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        } else {
          els.world.style.transform = `scale(${state.zoom})`;
        }
      }

      function centerWorld() {
        if (state.mode !== "edit") return;
        const vp = els.viewport.getBoundingClientRect();
        const scaledW = WALL_W * state.zoom;
        const scaledH = WALL_H * state.zoom;
        els.viewport.scrollLeft = Math.max(0, (scaledW - vp.width) / 2);
        els.viewport.scrollTop = Math.max(0, (scaledH - vp.height) / 2);
      }

      function applyEditZoom(nextZoom) {
        state.zoom = clamp(nextZoom, state.fitZoom, 3.2);
        updateWorldTransform();
        centerWorld();
        saveState();
      }

      function setMode(mode) {
        state.mode = mode;
        document.body.classList.toggle("display-mode", mode === "display");

        if (mode === "display") {
          togglePhotoSheet(false);
          updateWorldTransform();
          showDisplayHint();
        } else {
          fitZoomToViewport();
        }

        renderAll();
        startDisplayTimers();
        saveState();
      }

      function showDisplayHint() {
        els.displayHint.classList.add("show");
        setTimeout(() => {
          els.displayHint.classList.remove("show");
        }, 1800);
      }

      function currentPhoto(frame) {
        return photoById(frame.currentPhotoId);
      }

      function renderFrame(frameUid) {
        const frame = state.frames.find((f) => f.uid === frameUid);
        const node = els.stage.querySelector(`.frame[data-uid="${frameUid}"]`);
        if (!frame || !node) return;

        const spec = FRAME_SPECS[frame.kind];
        const h = frameHeight(frame);

        node.style.left = `${frame.x}px`;
        node.style.top = `${frame.y}px`;
        node.style.width = `${frame.w}px`;
        node.style.height = `${h}px`;

        node.classList.toggle("selected", state.selectedFrameUid === frame.uid && state.mode === "edit");
        node.classList.toggle("locked", !!frame.pinnedPhotoId);

        const viewport = node.querySelector(".photo-viewport");
        viewport.style.setProperty("--pv-top", `${spec.inset.top}%`);
        viewport.style.setProperty("--pv-right", `${spec.inset.right}%`);
        viewport.style.setProperty("--pv-bottom", `${spec.inset.bottom}%`);
        viewport.style.setProperty("--pv-left", `${spec.inset.left}%`);
        viewport.classList.toggle("oval", !!spec.oval);

        const art = node.querySelector(".frame-art");
        art.src = spec.art;
        art.onerror = () => {
          art.onerror = null;
          art.src = spec.fallback;
        };

        const current = photoById(frame.currentPhotoId);
        const previous = photoById(frame.previousPhotoId);

        const layer0 = node.querySelector(".layer-0");
        const layer1 = node.querySelector(".layer-1");
        const box0 = node.querySelector(".layer-0 .photo-box");
        const box1 = node.querySelector(".layer-1 .photo-box");

        if (frame.activeLayer === 0) {
          box0.style.backgroundImage = current ? `url("${current.dataUrl}")` : "none";
          box1.style.backgroundImage = previous ? `url("${previous.dataUrl}")` : "none";
          layer0.classList.add("active");
          layer1.classList.remove("active");
        } else {
          box1.style.backgroundImage = current ? `url("${current.dataUrl}")` : "none";
          box0.style.backgroundImage = previous ? `url("${previous.dataUrl}")` : "none";
          layer1.classList.add("active");
          layer0.classList.remove("active");
        }

        node.querySelector(".empty-state").classList.toggle("hidden", !!current);
      }

      function bindFrameNode(node, frameUid) {
        const badge = node.querySelector(".frame-badge");
        const handle = node.querySelector(".resize-handle");

        node.addEventListener("click", (e) => {
          if (e.target === badge || e.target === handle) return;
          if (state.mode !== "edit") return;
          state.selectedFrameUid = frameUid;
          renderAll();
        });

        badge.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          e.preventDefault();
          e.stopPropagation();

          const frame = state.frames.find((item) => item.uid === frameUid);
          if (!frame) return;

          state.selectedFrameUid = frameUid;
          renderAll();

          const startX = e.clientX;
          const startY = e.clientY;
          const before = { x: frame.x, y: frame.y };
          badge.setPointerCapture(e.pointerId);

          const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / state.zoom;
            const dy = (moveEvent.clientY - startY) / state.zoom;
            const next = {
              ...frame,
              x: clamp(Math.round(before.x + dx), 0, WALL_W - frame.w),
              y: clamp(Math.round(before.y + dy), 0, WALL_H - frameHeight(frame))
            };

            if (!collides(next, frame.uid)) {
              frame.x = next.x;
              frame.y = next.y;
              renderFrame(frame.uid);
            }
          };

          const onUp = () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            saveState();
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });
        });

        handle.addEventListener("pointerdown", (e) => {
          if (state.mode !== "edit") return;
          e.preventDefault();
          e.stopPropagation();

          const frame = state.frames.find((item) => item.uid === frameUid);
          if (!frame) return;

          state.selectedFrameUid = frameUid;
          renderAll();

          const startX = e.clientX;
          const beforeW = frame.w;
          handle.setPointerCapture(e.pointerId);

          const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / state.zoom;
            const next = {
              ...frame,
              w: clamp(Math.round(beforeW + dx), MIN_WIDTH, MAX_WIDTH)
            };

            if (frame.x + next.w > WALL_W) return;
            if (frame.y + frameHeight(next) > WALL_H) return;

            if (!collides(next, frame.uid)) {
              frame.w = next.w;
              renderFrame(frame.uid);
            }
          };

          const onUp = () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            saveState();
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });
        });
      }

      function createFrameNode(frame) {
        const node = document.createElement("div");
        node.className = "frame";
        node.dataset.uid = frame.uid;
        node.innerHTML = `
          <div class="frame-outline"></div>
          <div class="photo-viewport">
            <div class="photo-layer layer-0"><div class="photo-box"></div></div>
            <div class="photo-layer layer-1"><div class="photo-box"></div></div>
            <div class="empty-state"><span>＋ 写真追加</span></div>
          </div>
          <div class="frame-art-wrap">
            <img class="frame-art" alt="">
          </div>
          <button class="frame-badge" type="button">${frame.fixedId}</button>
          <div class="frame-pin">固定</div>
          <div class="resize-handle"></div>
        `;
        bindFrameNode(node, frame.uid);
        return node;
      }

      function renderStage() {
        els.stage.innerHTML = "";
        state.frames.forEach((frame) => {
          const node = createFrameNode(frame);
          els.stage.appendChild(node);
          renderFrame(frame.uid);
        });
      }

      function renderAll() {
        renderToolbar();
        buildFramesMenu();
        buildSelectionBar();
        buildPhotoSheet();
        renderStage();
        togglePhotoSheet(state.sheetOpen);
        updateWorldTransform();
      }

      function applyLayout(layoutKey) {
        clearAllTimers();
        state.layoutKey = layoutKey;
        state.selectedFrameUid = null;
        state.selectedPhotoId = null;
        state.frames = createLayout(layoutKey);
        rebuildQueues();
        ensureCurrentPhotos();
        fitZoomToViewport();
        renderAll();
        startDisplayTimers();
        saveState();
      }

      function toggleStyle() {
        const frame = getSelectedFrame();
        if (!frame) return;
        if (frame.kind === "oval") return;

        const map = {
          vertical: "vertical_simple",
          vertical_simple: "vertical",
          horizontal: "horizontal_simple",
          horizontal_simple: "horizontal",
          square: "square_simple",
          square_simple: "square"
        };

        const nextKind = map[frame.kind];
        if (!nextKind) return;

        const before = frame.kind;
        frame.kind = nextKind;
        frame.fallbackKind = nextKind;

        if (collides(frame, frame.uid)) {
          frame.kind = before;
          frame.fallbackKind = before;
          showToast("その切替だと重なります");
          return;
        }

        saveState();
        renderAll();
      }

      function toggleOval() {
        const frame = getSelectedFrame();
        if (!frame) return;

        if (frame.kind === "oval") {
          frame.kind = frame.fallbackKind || "vertical";
        } else {
          frame.fallbackKind = frame.kind;
          frame.kind = "oval";
        }

        if (frame.x + frame.w > WALL_W || frame.y + frameHeight(frame) > WALL_H || collides(frame, frame.uid)) {
          frame.kind = frame.fallbackKind || "vertical";
          showToast("その形では置けません");
          return;
        }

        saveState();
        renderAll();
      }

      function togglePin() {
        const frame = getSelectedFrame();
        if (!frame) return;

        if (frame.pinnedPhotoId) {
          frame.pinnedPhotoId = null;
          state.selectedPhotoId = null;
          showToast("固定を解除しました");
        } else {
          if (!frame.currentPhotoId) {
            showToast("固定する写真がありません");
            return;
          }
          frame.pinnedPhotoId = frame.currentPhotoId;
          state.selectedPhotoId = frame.currentPhotoId;
          showToast("写真を固定しました");
        }

        saveState();
        renderAll();
        startDisplayTimers();
      }

      async function addPhotos(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length || state.isUploading) return;

        setProgress(true, 0, files.length);

        try {
          for (let i = 0; i < files.length; i += 1) {
            setProgress(true, i + 1, files.length);
            const photo = await compressImage(files[i]);
            state.photos.push(photo);
            await dbPut(photo);
          }

          state.photos.sort((a, b) => a.createdAt - b.createdAt);
          rebuildQueues();
          ensureCurrentPhotos();
          renderAll();
          startDisplayTimers();
          saveState();
          showToast(`${files.length}枚追加しました`);
        } finally {
          setProgress(false);
        }
      }

      async function removePhoto(photoId) {
        await dbDelete(photoId);
        state.photos = state.photos.filter((photo) => photo.id !== photoId);
        if (state.selectedPhotoId === photoId) state.selectedPhotoId = null;

        state.frames.forEach((frame) => {
          if (frame.pinnedPhotoId === photoId) frame.pinnedPhotoId = null;
          if (frame.currentPhotoId === photoId) frame.currentPhotoId = null;
          if (frame.previousPhotoId === photoId) frame.previousPhotoId = null;
          frame.queue = (frame.queue || []).filter((id) => id !== photoId);
          if (frame.queueIndex > frame.queue.length) frame.queueIndex = 0;
        });

        rebuildQueues();
        ensureCurrentPhotos();
        renderAll();
        startDisplayTimers();
        saveState();
        showToast("写真を削除しました");
      }

      function openCurrentPhotoList() {
        togglePhotoSheet(true);
      }

      function renderToolbarState() {
        renderToolbar();
      }

      function resetCurrentLayout() {
        const currentPhotosByFixedId = new Map(
          state.frames.map((f) => [
            f.fixedId,
            {
              currentPhotoId: f.currentPhotoId || null,
              pinnedPhotoId: f.pinnedPhotoId || null
            }
          ])
        );

        state.frames = createLayout(state.layoutKey).map((frame) => {
          const prev = currentPhotosByFixedId.get(frame.fixedId);
          if (prev) {
            frame.currentPhotoId = prev.currentPhotoId;
            frame.pinnedPhotoId = prev.pinnedPhotoId;
          }
          return frame;
        });

        rebuildQueues();
        ensureCurrentPhotos();
        fitZoomToViewport();
        renderAll();
        startDisplayTimers();
        saveState();
        showToast("現在のセットを初期配置に戻しました");
      }

      function bindUI() {
        els.addPhotosBtn.addEventListener("click", () => {
          els.photoInput.click();
        });

        els.photoInput.addEventListener("change", async (e) => {
          await addPhotos(e.target.files);
          e.target.value = "";
        });

        els.framesBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.moreMenu.classList.remove("open");
          els.framesMenu.classList.toggle("open");
        });

        els.photosBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          togglePhotoSheet();
        });

        els.openPhotosBtn.addEventListener("click", () => {
          openCurrentPhotoList();
        });

        els.closeSheetBtn.addEventListener("click", () => {
          togglePhotoSheet(false);
        });

        els.moreBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.framesMenu.classList.remove("open");
          els.moreMenu.classList.toggle("open");
        });

        els.displayBtn.addEventListener("click", () => {
          setMode(state.mode === "edit" ? "display" : "edit");
        });

        els.fitBtn.addEventListener("click", () => {
          if (state.mode !== "edit") return;
          fitZoomToViewport();
          saveState();
        });

        els.zoomInBtn.addEventListener("click", () => {
          if (state.mode !== "edit") return;
          applyEditZoom(state.zoom + 0.2);
        });

        els.zoomOutBtn.addEventListener("click", () => {
          if (state.mode !== "edit") return;
          applyEditZoom(state.zoom - 0.2);
        });

        els.saveBtn.addEventListener("click", () => {
          closeMenus();
          saveState();
          showToast("保存しました");
        });

        els.loadBtn.addEventListener("click", () => {
          closeMenus();
          if (!loadState()) {
            showToast("保存データがありません");
            return;
          }
          rebuildQueues();
          ensureCurrentPhotos();
          if (state.mode === "edit") {
            fitZoomToViewport();
          }
          renderAll();
          startDisplayTimers();
          showToast("読み込みました");
        });

        els.resetBtn.addEventListener("click", () => {
          closeMenus();
          resetCurrentLayout();
        });

        els.toggleStyleBtn.addEventListener("click", toggleStyle);
        els.toggleOvalBtn.addEventListener("click", toggleOval);
        els.pinPhotoBtn.addEventListener("click", togglePin);

        els.viewerClose.addEventListener("click", closeViewer);
        els.viewer.addEventListener("click", (e) => {
          if (e.target === els.viewer) closeViewer();
        });

        document.addEventListener("click", (e) => {
          const keep = e.target.closest(".toolbar") || e.target.closest(".menu");
          if (!keep) closeMenus();
        });

        els.stage.addEventListener("click", (e) => {
          if (state.mode === "display") {
            setMode("edit");
            return;
          }
          if (!e.target.closest(".frame")) {
            state.selectedFrameUid = null;
            renderAll();
          }
        });

        window.addEventListener("resize", () => {
          if (state.mode === "display") {
            updateWorldTransform();
          } else {
            fitZoomToViewport();
          }
        });
      }

      async function init() {
        state.db = await openDB();
        state.photos = (await dbGetAll()).sort((a, b) => a.createdAt - b.createdAt);

        if (!loadState()) {
          state.layoutKey = "story";
          state.frames = createLayout("story");
        }

        rebuildQueues();
        ensureCurrentPhotos();
        bindUI();
        fitZoomToViewport();
        renderAll();
        if (state.mode === "display") {
          updateWorldTransform();
        }
        startDisplayTimers();
      }

      init().catch((error) => {
        console.error(error);
        showToast("初期化に失敗しました");
      });
    })();
  </script>
</body>
</html>
