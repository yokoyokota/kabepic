<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<title>KABEPIC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{color:#2a2520;font-family:"DM Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;background:#f7f4ef;-webkit-font-smoothing:antialiased}
button{border:0;background:none;color:inherit;cursor:pointer;font:inherit;-webkit-user-select:none;user-select:none}
img{display:block;max-width:100%;-webkit-user-drag:none;user-select:none}
input[type=file]{display:none}
.hid{display:none!important}

/* APP */
#app{position:fixed;inset:0;background:#f7f4ef}

/* EDIT BAR - always rendered, hidden via transform */
#editBar{
position:fixed;bottom:72px;left:10px;right:10px;z-index:3500;
display:flex;align-items:center;justify-content:center;gap:10px;
height:44px;padding:0 10px;border-radius:20px;
background:rgba(255,253,249,.97);border:1px solid rgba(130,118,96,.10);box-shadow:0 6px 20px rgba(50,40,20,.07);
transform:translateY(200px);pointer-events:none;opacity:0;
transition:transform .25s cubic-bezier(.22,1,.36,1),opacity .2s ease;
}
#editBar.vis{transform:translateY(0);pointer-events:auto;opacity:1}
.ebb{height:34px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;color:#b5a898;background:#fffdf9;border:1px solid rgba(130,118,96,.10);white-space:nowrap;transition:transform 80ms,background 80ms}
.ebb:active{transform:scale(.93);background:rgba(0,0,0,.04)}
.ebb.dis{opacity:.22;pointer-events:none}
.ebb.enb{color:#3a3530;border-color:rgba(130,118,96,.22);background:#fff}
.ebd{height:34px;padding:0 16px;border-radius:999px;background:#4a6a8a;color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;transition:transform 80ms,background 80ms}
.ebd:active{transform:scale(.93);background:#3a5a7a}

/* CANVAS */
#cvArea{position:absolute;top:0;left:0;right:0;bottom:72px;z-index:1;overflow:hidden;touch-action:manipulation}
body.em #cvArea{bottom:124px}
body.dm #cvArea{top:0;bottom:0}
#cvScale{position:absolute;top:0;left:0;width:2400px;height:1500px;transform-origin:top left}
#cv{position:relative;width:2400px;height:1500px;background:#f3eee6;overflow:hidden;touch-action:none;border-radius:3px;border:1px solid rgba(130,118,96,.08)}
body.dm #cv{background:#f4f2ee;border-color:rgba(0,0,0,.06);box-shadow:0 0 0 9999px #d2cec6;border-radius:0}

/* FRAMES */
.fr{position:absolute;overflow:visible;touch-action:none;pointer-events:none;z-index:1;user-select:none;transition:left .12s,top .12s,width .12s,height .12s}
.fr.ed{pointer-events:auto;cursor:grab}.fr.ed:active{cursor:grabbing}
.fr.dg,.fr.rz{transition:none;z-index:80!important}
.fr-ring{position:absolute;inset:-10px;border-radius:20px;border:5px solid transparent;opacity:0;pointer-events:none;z-index:1}
.fr.sel .fr-ring{opacity:1;border-color:#7a9ab4;box-shadow:0 0 0 3px rgba(122,154,180,.14)}
.fr.dg .fr-ring,.fr.rz .fr-ring{opacity:1;border-color:#6d90aa;box-shadow:0 0 0 5px rgba(122,154,180,.2)}
.fr.sel{z-index:150!important;filter:drop-shadow(0 10px 18px rgba(40,30,16,.12))}
.pw{position:absolute;inset:0;overflow:hidden}
.pm{position:absolute;overflow:visible;background:transparent}
.pm img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;pointer-events:none}
/* ── FIX 3: crossfade transition on photo images ── */
.pm img.cf{position:absolute;inset:0;transition:opacity 1.4s ease-in-out}
.ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}

/* ── FIX 1: bigger resize handle (42→56px) ── */
.rh{position:absolute;right:-26px;bottom:-26px;width:56px;height:56px;border-radius:50%;background:#fff;border:3px solid #7a9ab4;box-shadow:0 4px 14px rgba(40,30,16,.16);z-index:200;touch-action:none;display:none;pointer-events:auto}
.fr.sel .rh{display:block}
body:not(.em) .fr.sel .rh{display:none}
.fr-n{position:absolute;top:-10px;left:-10px;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;background:#2a2520;color:#fff;font-size:10px;font-weight:600;box-shadow:0 3px 8px rgba(0,0,0,.14);z-index:7;pointer-events:none}
.fr.sel .fr-n{background:#4a6a8a}
body.em .fr-n{display:flex}
.fr-p{position:absolute;top:-7px;right:-7px;height:18px;padding:0 7px;border-radius:999px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);color:#87796a;font-size:9px;font-weight:600;display:none;align-items:center;z-index:7}
.fr.lk .fr-p{display:inline-flex}

/* NAV */
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:3300;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:6px 10px 8px;background:rgba(255,253,249,.97);border-top:1px solid rgba(130,118,96,.10);box-shadow:0 -4px 20px rgba(50,40,20,.06)}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:52px;border-radius:14px;font-size:10px;font-weight:500;letter-spacing:.04em;color:#87796a;border:1px solid transparent}
.nb:active{transform:scale(.96)}
.nb .ni{font-size:17px;line-height:1}
.nb.on{background:rgba(74,106,138,.07);color:#4a6a8a;border-color:rgba(74,106,138,.06)}
body.dm .bnav,body.dm .sht,body.dm #editBar{display:none!important}

/* SHEETS */
.sht{position:fixed;left:8px;right:8px;bottom:72px;z-index:3250;background:rgba(255,253,249,.97);border:1px solid rgba(130,118,96,.10);box-shadow:0 -6px 32px rgba(50,40,20,.08);border-radius:20px;max-height:50vh;overflow:hidden;display:none}
body.em .sht.opn{bottom:122px}
.sht.opn{display:block}
.shd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid rgba(130,118,96,.10)}
.sht-t{font-size:13px;font-weight:600}.sht-s{font-size:11px;color:#87796a;margin-top:1px}
.sha{display:flex;gap:5px;align-items:center}
.shb{padding:10px 12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(50vh - 56px)}
.pl{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 12px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid rgba(130,118,96,.10);background:#fffdf9;color:#2a2520}
.pl:active{transform:scale(.97);opacity:.85}
.pl.ac{background:#4a6a8a;color:#fff;border-color:transparent}
.pl.gh{background:transparent;border-color:transparent;color:#87796a}

/* PHOTO GRID */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.pc{position:relative;aspect-ratio:1;overflow:hidden;border-radius:8px;cursor:pointer;background:#f3eee6}
.pc img{width:100%;height:100%;object-fit:cover}
.pc .dx{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;font-size:9px;color:#b04e46;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.pc.fx{outline:2px solid #4a6a8a;outline-offset:-2px}
.pc .ft{position:absolute;left:3px;bottom:3px;background:rgba(42,37,32,.75);color:#fff;font-size:9px;border-radius:999px;padding:1px 7px}
.pem{text-align:center;color:#b5a898;font-size:12px;padding:24px 0}

/* MENUS */
.ml{display:grid;gap:5px}
.mi{min-height:44px;padding:0 12px;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:500;font-size:12px;border:1px solid rgba(130,118,96,.10);background:#fffdf9}
.mi:active{transform:scale(.99)}
.mi.on{background:rgba(74,106,138,.07);color:#4a6a8a;border-color:rgba(74,106,138,.1)}
.mi.dis{opacity:.32;pointer-events:none}
.mir{font-size:11px;color:#87796a;font-weight:400}
.mi.on .mir{color:#4a6a8a}
.sl{font-size:9px;font-weight:600;color:#b5a898;letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sc{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 4px 8px;border-radius:14px;border:1.5px solid rgba(130,118,96,.10);background:#fffdf9;cursor:pointer}
.sc:active{transform:scale(.95)}
.si{border:1.5px solid #2a2520;border-radius:2px}
.si.sq{width:28px;height:28px}.si.ls{width:34px;height:24px}.si.pt{width:22px;height:32px}.si.ov{width:24px;height:32px;border-radius:50%}
.sll{font-size:9px;font-weight:500;color:#87796a}
.sc.se{border-color:#4a6a8a;background:rgba(74,106,138,.07)}.sc.se .si{border-color:#4a6a8a}.sc.se .sll{color:#4a6a8a}
.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.dc{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px 10px;border-radius:14px;border:1.5px solid rgba(130,118,96,.10);background:#fffdf9;cursor:pointer}
.dc:active{transform:scale(.97)}
.dp{width:48px;height:48px;display:flex;align-items:center;justify-content:center}.dp img{max-width:100%;max-height:100%;object-fit:contain}
.dl{font-size:10px;font-weight:500;color:#87796a}
.sb{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;color:#87796a;cursor:pointer;padding:3px 0;margin-bottom:6px}
.sb:active{color:#2a2520}
#chgA{margin-top:6px}
.ca-on #addA,.ca-on #pinB,.ca-on #delB{opacity:.25;pointer-events:none}

/* VIEWER */
.vw{position:fixed;inset:0;z-index:4000;background:rgba(42,37,32,.82);display:none;align-items:center;justify-content:center;padding:20px}
.vw.opn{display:flex}
.vw img{max-width:100%;max-height:100%;object-fit:contain;border-radius:14px;box-shadow:0 14px 36px rgba(0,0,0,.28)}
.vwx{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.1);font-size:15px;display:flex;align-items:center;justify-content:center}

#dHint{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:4200;padding:7px 14px;border-radius:999px;background:rgba(42,37,32,.72);color:#fff;font-size:11px;font-weight:500;opacity:0;transition:opacity .18s;pointer-events:none}
body.dm #dHint.sh{opacity:1}
#tst{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-5px);z-index:5000;max-width:min(88vw,360px);padding:7px 14px;border-radius:999px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);box-shadow:0 6px 20px rgba(50,40,20,.07);text-align:center;font-size:11px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .1s,transform .1s}
#tst.sh{opacity:1;transform:translateX(-50%) translateY(0)}
#pgO{position:fixed;inset:0;z-index:5500;background:rgba(42,37,32,.22);display:none;align-items:center;justify-content:center;padding:20px}
#pgO.opn{display:flex}
.pgc{width:min(86vw,300px);padding:18px;border-radius:20px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);box-shadow:0 12px 36px rgba(50,40,20,.09)}
.pgc-t{font-size:13px;font-weight:600;margin-bottom:6px}
.pgc-m{color:#87796a;font-size:11px;margin-bottom:8px}
.pgb{height:5px;border-radius:999px;background:rgba(0,0,0,.05);overflow:hidden}
.pgf{height:100%;width:0%;background:#4a6a8a;border-radius:999px;transition:width .12s}
</style>

</head>
<body>
<div id="editBar">
  <button id="ebU" class="ebb dis">↶ 戻す</button>
  <button id="ebR" class="ebb dis">↷ やり直す</button>
  <button id="ebD" class="ebd">編集終了</button>
</div>
<div id="app">
  <input id="fIn" type="file" accept="image/*" multiple>
  <div id="cvArea"><div id="cvScale"><div id="cv"></div></div></div>
  <div class="bnav">
    <button id="nP" class="nb"><span class="ni">◻</span>Photo</button>
    <button id="nF" class="nb"><span class="ni">▦</span>Frames</button>
    <button id="nE" class="nb"><span class="ni">✎</span>Edit</button>
    <button id="nD" class="nb"><span class="ni">▶</span>Display</button>
  </div>

  <div id="shP" class="sht">
    <div class="shd"><div><div class="sht-t">写真一覧</div><div id="shPm" class="sht-s">写真 0/100</div></div><div class="sha"><button id="addP" class="pl ac">追加</button><button id="clP" class="pl gh">閉じる</button></div></div>
    <div class="shb"><div id="pGr" class="pg"></div><div id="pEm" class="pem">写真を追加して壁に飾りましょう</div></div>
  </div>

  <div id="shF" class="sht">
    <div class="shd"><div class="sht-t">Frames</div><button id="clF" class="pl gh">閉じる</button></div>
    <div class="shb"><div id="fLst" class="ml"></div></div>
  </div>

  <div id="shE" class="sht">
    <div class="shd"><div class="sht-t">Edit</div><button id="clE" class="pl gh">閉じる</button></div>
    <div class="shb" id="shEb">
      <div class="sl">フレーム追加</div>
      <div id="addA">
        <div id="aS1"><div class="sg"><button class="sc" data-s="square"><div class="si sq"></div><div class="sll">正方形</div></button><button class="sc" data-s="landscape"><div class="si ls"></div><div class="sll">横</div></button><button class="sc" data-s="portrait"><div class="si pt"></div><div class="sll">縦</div></button><button class="sc" data-s="oval"><div class="si ov"></div><div class="sll">楕円</div></button></div></div>
        <div id="aS2" class="hid"><button id="aBk" class="sb">← 形を選び直す</button><div id="aDg" class="dg"></div></div>
      </div>
      <div class="sl">選択中フレーム</div>
      <div class="ml">
        <button id="chgB" class="mi dis"><span>フレーム変更</span><span id="chgR" class="mir">未選択</span></button>
        <div id="chgA" class="hid"><div id="cS1"><div class="sg" id="cSg"></div></div><div id="cS2" class="hid"><button id="cBk" class="sb">← 形を選び直す</button><div id="cDg" class="dg"></div></div></div>
        <button id="pinB" class="mi dis"><span id="pinT">写真固定</span><span id="pinS" class="mir">未選択</span></button>
        <button id="delB" class="mi dis"><span style="color:#b04e46">削除</span><span class="mir"></span></button>
      </div>
    </div>
  </div>

  <div id="vw" class="vw"><button id="vwC" class="vwx">×</button><img id="vwI" alt=""></div>
  <div id="dHint">タップで編集に戻る</div>
  <div id="tst"></div>
  <div id="pgO"><div class="pgc"><div class="pgc-t">写真を追加中</div><div id="pgM" class="pgc-m"></div><div class="pgb"><div id="pgF" class="pgf"></div></div></div></div>
</div>
<script>
(function(){
"use strict";
var GRID={W:240,H:150},MAX_P=100,SW0=25000,SW1=35000,JQ=.84,MXE=1600,UL=40;
var $=function(id){return document.getElementById(id)};

/* FRAME META - FIXED */
var FM={
portrait:{src:"frame_vertical.png",maskPng:"mask_vertical.png",inset:"16.0% 23.6% 15.3% 24.4%",ar:874/1044},
portrait_simple:{src:"frame_vertical_simple.png",maskPng:"mask_vertical.png",inset:"16.0% 23.6% 15.3% 24.4%",ar:874/1044},
square:{src:"frame_square.png",maskPng:"mask_square.png",inset:"20.28% 21.02% 21.02% 20.19%",ar:1033/1033},
landscape:{src:"frame_horizontal.png",maskPng:"mask_horizontal.png",inset:"23.5% 15.2% 24.5% 16.0%",ar:1044/874},
landscape_simple:{src:"frame_horizontal_simple.png",maskPng:"mask_horizontal.png",inset:"23.5% 15.2% 24.5% 16.0%",ar:1044/874},
oval:{src:"frame_oval.png",maskPng:"mask_oval.png",inset:"12.0% 24.0% 10.5% 26.0%",ar:675/963}
};
var SD={square:[{k:"square",l:"クラシック"}],landscape:[{k:"landscape",l:"クラシック"},{k:"landscape_simple",l:"シンプル"}],portrait:[{k:"portrait",l:"クラシック"},{k:"portrait_simple",l:"シンプル"}],oval:[{k:"oval",l:"楕円"}]};
var LO={
calm:[["portrait",43.9,0,84.5],["square",126,27.6,56.8],["landscape",88,82.6,71]],
flow:[["portrait",-.6,53.8,59.5],["portrait",52.7,8.7,72],["square",123.3,30.7,49.9],["landscape_simple",177.2,53.3,60.8],["landscape",79.2,79.3,68.6]],
story:[["portrait",-.2,57.8,38],["square",42.9,32.2,41],["portrait",87.4,16.5,56.25],["landscape_simple",144.7,38.1,38],["landscape",187.5,48.4,51],["landscape",39.5,73.1,47],["square",91.7,76.4,47],["portrait",142.7,77,41.5]],
scene:[["landscape_simple",1.5,42.3,39],["square",42.75,33.5,45],["portrait_simple",96.15,3,39],["portrait",141,38.7,39],["landscape",180,47.4,33],["square",21.3,81.5,31.5],["portrait",54.6,81.5,36.6],["portrait",85.5,43.55,60],["landscape",142.5,77,53.4],["landscape_simple",198.75,78.5,39],["square",94.8,106.2,42]]
};

/* STATE */
var mode="view",tab=null,lk="story",ps=[],fs=[],sel=null,dt=[],tt=null,uploading=false,masksOk=false;
var undoS=[],redoS=[];
var zScale=1,zOx=0,zOy=0;

/* UTIL */
function uid(){return Math.random().toString(36).slice(2,10)+"_"+Date.now().toString(36)}
function toast(m,ms){ms=ms||1200;clearTimeout(tt);$("tst").textContent=m;$("tst").classList.add("sh");tt=setTimeout(function(){$("tst").classList.remove("sh")},ms)}
function prog(on,c,t){$("pgO").classList.toggle("opn",on);$("pgM").textContent=on?(c+"/"+t):"";$("pgF").style.width=on&&t?Math.round(c/t*100)+"%":"0%"}

/* PLACEHOLDER */
var PH=(function(){var c=document.createElement("canvas");c.width=800;c.height=800;var g=c.getContext("2d");g.fillStyle="#f3eee6";g.fillRect(0,0,800,800);return c.toDataURL("image/png")})();

function fp(id){for(var i=0;i<ps.length;i++)if(ps[i].id===id)return ps[i];return null}
function gsf(){for(var i=0;i<fs.length;i++)if(fs[i].id===sel)return fs[i];return null}
function dor(r){return r>1.05?"landscape":r<.95?"portrait":"square"}
function rp(){return ps.filter(function(p){return p.name!=="placeholder"})}
function fbu(k){if(k==="square")return"square";if(k==="oval"||k.indexOf("portrait")>=0)return"portrait";if(k.indexOf("landscape")>=0)return"landscape";return"square"}
function cpool(k){var r=rp(),b=fbu(k),pt=r.filter(function(p){return p.orient==="portrait"}),ls=r.filter(function(p){return p.orient==="landscape"}),sq=r.filter(function(p){return p.orient==="square"});if(b==="portrait")return pt.length?pt:sq.length?sq:r;if(b==="landscape")return ls.length?ls:sq.length?sq:r;if(b==="square"){if(sq.length)return sq;var m=pt.concat(ls);return m.length?m:r}return r}
function gpc(f){var m=FM[f.kind],h=f.w/m.ar;return{left:f.gx/GRID.W*100+"%",top:f.gy/GRID.H*100+"%",width:f.w/GRID.W*100+"%",height:h/GRID.H*100+"%"}}
function autoA(){var r=rp();if(!r.length){fs.forEach(function(f){if(!f.fp){f.pi=[];f.cp=null}});return}var ix={portrait:0,landscape:0,square:0};fs.forEach(function(f){if(f.fp){var x=fp(f.fp);if(x){f.pi=[x.id];f.cp=x.id;return}f.fp=null}var b=fbu(f.kind),pool=cpool(f.kind);if(!pool.length){f.pi=[];f.cp=null;return}var ni=ix[b]%pool.length;f.pi=[pool[ni].id];f.cp=pool[ni].id;ix[b]++})}
function curP(f){if(f.fp){var x=fp(f.fp);if(x)return x}if(f.cp){var x2=fp(f.cp);if(x2)return x2}if(f.pi&&f.pi.length){var x3=fp(f.pi[0]);if(x3)return x3}return null}

/* UNDO */
function snap(){return JSON.parse(JSON.stringify(fs))}
function pushU(){undoS.push(snap());if(undoS.length>UL)undoS.shift();redoS=[];updU()}
function undo(){if(!undoS.length)return;redoS.push(snap());fs=undoS.pop();sel=null;autoA();ra();updU();toast("戻しました",800)}
function redo(){if(!redoS.length)return;undoS.push(snap());fs=redoS.pop();sel=null;autoA();ra();updU();toast("やり直しました",800)}

/* ── FIX 2 & 3: CROSSFADE with duplicate prevention + smooth transition ── */
function nextP(f){

if(!c)return pool[0];
/* filter out current photo to prevent duplicate */
var avail=pool.filter(function(p){return p.id!==c.id});
if(!avail.length)return null;
/* pick random from remaining to feel natural */
return avail[Math.floor(Math.random()*avail.length)];

function startCF(){stopCF();if(rp().length<2)return;fs.forEach(function(f){if(f.fp)return;

var slot=0;

var n=nextP(f);if(!n)return;
f.cp=n.id;f.pi=[n.id];
var el=$("cv").querySelector(’[data-id="’+f.id+’"]’);
if(!el)return;
var imgs=el.querySelectorAll(".pm img.cf");
if(imgs.length<2)return;
/* load new photo into the hidden slot, then crossfade */
var showIdx=slot;
var hideIdx=1-slot;
imgs[hideIdx].src=n.dataUrl;
/* small delay to ensure image is decoded before fading */
requestAnimationFrame(function(){requestAnimationFrame(function(){
imgs[hideIdx].style.opacity="1";
imgs[showIdx].style.opacity="0";
})});
slot=hideIdx;
},SW0+Math.random()*(SW1-SW0));dt.push(t)})}
