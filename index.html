<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>KABEPIC Story8 Frame Check</title>
  <style>
    :root{
      --bg:#ece6da;
      --board:#d8d3ca;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.08);
      --text:#1a1a1a;
      --muted:#7b756c;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,#ece6da,#f4efe7);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",Roboto,sans-serif;
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .board-wrap{
      transform-origin:center center;
      will-change:transform;
    }

    .board{
      position:relative;
      width:2400px;
      height:1500px;
      background:var(--board);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:visible;
    }

    .frame{
      position:absolute;
      background-repeat:no-repeat;
      background-position:center;
      background-size:100% 100%;
    }

    .label{
      position:absolute;
      left:50%;
      top:calc(100% + 14px);
      transform:translateX(-50%);
      min-width:34px;
      height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(20,20,20,.82);
      color:#fff;
      font-size:20px;
      font-weight:800;
      line-height:34px;
      text-align:center;
      white-space:nowrap;
      box-shadow:0 6px 14px rgba(0,0,0,.16);
    }

    .hud{
      position:fixed;
      top:14px;
      left:14px;
      z-index:10;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.9);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      font-size:13px;
      line-height:1.55;
    }

    .hud strong{
      display:block;
      margin-bottom:4px;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story(8) / フレーム確認用</strong>
    1,3,8 = 縦 / 2,7 = 正方形 / 4,5,6 = 横<br>
    今回は前回より「短すぎる」を補正した版
  </div>

  <div class="wrap">
    <div id="boardWrap" class="board-wrap">
      <div id="board" class="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      // 実測比率ベース
      const AR = {
        portrait: 894 / 1063,
        square: 1053 / 1052,
        landscape: 1063 / 894,
        oval: 694 / 982
      };

      // 短すぎた前回版を補正
      // x, y, w は 2400x1500 基準
      const frames = [
        { id: 1, kind: "portrait",  x:  70, y: 510, w: 350, src: "frame_vertical.png"   },
        { id: 2, kind: "square",    x: 500, y: 300, w: 410, src: "frame_square.png"     },
        { id: 3, kind: "portrait",  x: 930, y:  40, w: 500, src: "frame_vertical.png"   },
        { id: 4, kind: "landscape", x:1490, y: 420, w: 360, src: "frame_horizontal.png" },
        { id: 5, kind: "landscape", x:1890, y: 430, w: 500, src: "frame_horizontal.png" },
        { id: 6, kind: "landscape", x: 430, y: 860, w: 480, src: "frame_horizontal.png" },
        { id: 7, kind: "square",    x: 970, y: 820, w: 430, src: "frame_square.png"     },
        { id: 8, kind: "portrait",  x:1510, y: 790, w: 350, src: "frame_vertical.png"   }
      ];

      function render() {
        board.innerHTML = "";

        frames.forEach((f) => {
          const h = Math.round(f.w / AR[f.kind]);

          const el = document.createElement("div");
          el.className = "frame";
          el.style.left = `${f.x}px`;
          el.style.top = `${f.y}px`;
          el.style.width = `${f.w}px`;
          el.style.height = `${h}px`;
          el.style.backgroundImage = `url("${f.src}")`;

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = String(f.id);

          el.appendChild(label);
          board.appendChild(el);
        });
      }

      function fit() {
        const vw = window.innerWidth - 24;
        const vh = window.innerHeight - 24;
        const scale = Math.min(vw / 2400, vh / 1500) * 0.96;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fit();
      window.addEventListener("resize", fit);
    })();
  </script>
</body>
</html>
