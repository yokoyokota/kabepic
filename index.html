<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>KABEPIC Story8 Ratio Check</title>
  <style>
    :root {
      --canvas-w: 2400;
      --canvas-h: 1500;
      --cell: 10px;
      --page-bg: #1f1f1f;
      --board-bg: #ffffff;
      --grid-line: rgba(0, 0, 0, 0.12);
      --grid-line-bold: rgba(0, 0, 0, 0.22);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      --label-bg: rgba(35, 35, 35, 0.85);
      --label-fg: #fff;
      --hole-stroke: rgba(70, 70, 70, 0.42);
      --hole-fill: rgba(255,255,255,0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    #boardWrap {
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    #board {
      position: relative;
      width: calc(var(--canvas-w) * 1px);
      height: calc(var(--canvas-h) * 1px);
      background:
        linear-gradient(to right, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to bottom, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-color: var(--board-bg);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .frame {
      position: absolute;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center center;
    }

    .hole {
      position: absolute;
      border: 2px solid var(--hole-stroke);
      background: var(--hole-fill);
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translateX(-50%);
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--label-bg);
      color: var(--label-fg);
      font-size: 20px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      color: #111;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      font-size: 13px;
      line-height: 1.55;
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story8 / 縦横共通比率版</strong>
    縦: 1, 3, 8 / 正方形: 2, 7 / 横: 4, 5, 6<br>
    縦と横は同じ設計を回転して作成
  </div>

  <div id="app">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CANVAS_W = 2400;
      const CANVAS_H = 1500;
      const CELL = 10;

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      // 共通フレーム設計
      // 縦は 32 x 44 マス、横はその回転で 44 x 32 マス
      const OUTER = {
        vertical: { gw: 32, gh: 44, asset: "frame_vertical.png" },
        horizontal: { gw: 44, gh: 32, asset: "frame_horizontal.png" },
        square: { gw: 38, gh: 38, asset: "frame_square.png" }
      };

      // 内枠も縦横で回転関係になるよう固定
      // 縦: 左右4 / 上下4
      // 横: 左右4 / 上下4
      // ただし外枠形状が回転関係なので、結果の比率も回転関係になる
      const INSET = {
        vertical: { top: 4, right: 4, bottom: 4, left: 4 },
        horizontal: { top: 4, right: 4, bottom: 4, left: 4 },
        square: { top: 4, right: 4, bottom: 4, left: 4 }
      };

      // 配置図に合わせた位置とスケール
      // scale は共通比率のまま大小だけ変える
      const layout = [
        { id: 1, kind: "vertical",   gx: 4,   gy: 52, scale: 0.86 },
        { id: 2, kind: "square",     gx: 43,  gy: 31, scale: 1.00 },
        { id: 3, kind: "vertical",   gx: 95,  gy: 3,  scale: 1.22 },
        { id: 4, kind: "horizontal", gx: 146, gy: 43, scale: 0.72 },
        { id: 5, kind: "horizontal", gx: 190, gy: 46, scale: 1.00 },
        { id: 6, kind: "horizontal", gx: 39,  gy: 75, scale: 1.02 },
        { id: 7, kind: "square",     gx: 93,  gy: 75, scale: 1.12 },
        { id: 8, kind: "vertical",   gx: 149, gy: 74, scale: 0.86 }
      ];

      function px(v) {
        return `${v}px`;
      }

      function makeFrame(item) {
        const spec = OUTER[item.kind];
        const inset = INSET[item.kind];

        const gw = Math.round(spec.gw * item.scale);
        const gh = Math.round(spec.gh * item.scale);

        const x = item.gx * CELL;
        const y = item.gy * CELL;
        const w = gw * CELL;
        const h = gh * CELL;

        const el = document.createElement("div");
        el.className = "frame";
        el.style.left = px(x);
        el.style.top = px(y);
        el.style.width = px(w);
        el.style.height = px(h);
        el.style.backgroundImage = `url("${spec.asset}")`;

        const hole = document.createElement("div");
        hole.className = "hole";
        hole.style.left = px(inset.left * CELL);
        hole.style.top = px(inset.top * CELL);
        hole.style.width = px(w - (inset.left + inset.right) * CELL);
        hole.style.height = px(h - (inset.top + inset.bottom) * CELL);

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = String(item.id);

        el.appendChild(hole);
        el.appendChild(label);
        return el;
      }

      function render() {
        board.innerHTML = "";
        layout.forEach((item) => {
          board.appendChild(makeFrame(item));
        });
      }

      function fitBoard() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / CANVAS_W, vh / CANVAS_H) * 0.94;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fitBoard();
      window.addEventListener("resize", fitBoard);
    })();
  </script>
</body>
</html>
