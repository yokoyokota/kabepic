  --text: #2c2620;
  --text-secondary: #8a7e6f;
  --text-tertiary: #b0a491;

  --accent: #3d5a80;
  --accent-soft: rgba(61,90,128,0.08);
  --accent-ring: rgba(61,90,128,0.22);
  --accent-text: #3d5a80;

  --danger: #b5524a;
  --success: #5a8a6a;

  --display-bg: #f5f3ef;
  --display-outside: #d4d0c8;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-pill: 999px;

  --shadow-soft: 0 2px 12px rgba(60,50,30,0.06);
  --shadow-md: 0 8px 24px rgba(60,50,30,0.08), 0 2px 6px rgba(60,50,30,0.04);
  --shadow-lg: 0 16px 40px rgba(60,50,30,0.10), 0 4px 12px rgba(60,50,30,0.05);
  --shadow-sheet: 0 -8px 40px rgba(60,50,30,0.12), 0 -2px 10px rgba(60,50,30,0.04);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 68px;

  --font-display: "DM Sans", "Noto Sans JP", sans-serif;
  --font-body: "Noto Sans JP", "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
body {
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
body.display-mode { background: var(--display-outside); }
button, input { font: inherit; }
button { border: 0; background: none; color: inherit; cursor: pointer; -webkit-user-select: none; user-select: none; }
img { display: block; max-width: 100%; -webkit-user-drag: none; user-select: none; }
.hidden { display: none !important; }
input[type="file"] { display: none; }

/* ===== APP SHELL ===== */
#app { position: fixed; inset: 0; overflow: hidden; background: var(--bg); }
body.display-mode #app { background: var(--display-outside); }

/* ===== TOP BAR ===== */
.topbar {
  position: fixed;
  top: calc(var(--safe-top) + 10px);
  left: 14px; right: 14px;
  z-index: 3200;
  display: flex; align-items: center; justify-content: space-between;
  height: 50px; padding: 0 6px 0 16px;
  border-radius: var(--radius-lg);
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.topbar-brand {
  font-family: var(--font-display);
  font-weight: 700; font-size: 15px;
  letter-spacing: 0.12em;
  color: var(--text);
}
.topbar-right { display: flex; align-items: center; gap: 6px; }
.topbar-status {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
  padding: 0 8px;
  white-space: nowrap;
}

/* ===== PILL BUTTONS ===== */
.pill {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 14px;
  border-radius: var(--radius-pill);
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.02em;
  white-space: nowrap;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  transition: all 100ms ease;
}
.pill:active { transform: scale(0.97); opacity: 0.85; }
.pill.accent { background: var(--accent); color: #fff; border-color: transparent; }
.pill.accent:active { opacity: 0.8; }
.pill.soft { background: var(--accent-soft); color: var(--accent-text); border-color: rgba(61,90,128,0.10); }
.pill.ghost { background: transparent; border-color: transparent; color: var(--text-secondary); }
.pill.sm { height: 30px; padding: 0 10px; font-size: 11px; }

/* ===== CANVAS AREA ===== */
#canvasArea {
  position: absolute; inset: 0;
  padding-top: calc(var(--safe-top) + 70px);
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  overflow: hidden;
}
body.display-mode #canvasArea { padding: 0; }
#canvasScaler { position: absolute; top: 0; left: 0; width: 2400px; height: 1500px; transform-origin: top left; }
#canvas {
  position: relative; width: 2400px; height: 1500px;
  background: var(--canvas-fill);
  overflow: hidden; touch-action: none;
  border-radius: 4px;
  border: 1.5px solid rgba(140,125,100,0.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}
body.display-mode #canvas {
  background: var(--display-bg);
  border-color: rgba(0,0,0,0.08);
  box-shadow: 0 0 0 9999px var(--display-outside);
  border-radius: 0;
}

/* ===== FRAME ELEMENTS [layout logic FIXED] ===== */
.frame {
  position: absolute; overflow: visible; touch-action: none; pointer-events: none;
  z-index: 1; user-select: none;
  transition: left 120ms ease, top 120ms ease, width 120ms ease, height 120ms ease, filter 100ms ease;
}
.frame.editable { pointer-events: auto; cursor: grab; }
.frame.editable:active { cursor: grabbing; }
.frame.dragging, .frame.resizing { transition: none; z-index: 80 !important; }

.frame-ring {
  position: absolute; inset: -8px;
  border-radius: var(--radius-lg);
  border: 2.5px solid transparent;
  opacity: 0; pointer-events: none; z-index: 1;
  transition: opacity 100ms ease, border-color 100ms ease, box-shadow 100ms ease;
}
.frame.selected .frame-ring { opacity: 1; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
.frame.dragging .frame-ring, .frame.resizing .frame-ring { opacity: 1; border-color: var(--accent); box-shadow: 0 0 0 5px rgba(61,90,128,0.25); }
.frame.selected { z-index: 50 !important; filter: drop-shadow(0 12px 20px rgba(50,40,20,0.14)); }

.photoWrap { position: absolute; inset: 0; overflow: hidden; }
.photoMask { position: absolute; overflow: visible; background: transparent; }
.photoMask img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; pointer-events: none; user-select: none; }
.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; user-select: none; z-index: 3; }

.resize-handle {
  position: absolute; right: -14px; bottom: -14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #fff; border: 2.5px solid var(--accent);
  box-shadow: 0 4px 12px rgba(50,40,20,0.14);
  z-index: 9; touch-action: none; display: none; pointer-events: auto;
}
.frame.selected .resize-handle { display: block; }
body:not(.edit-enabled) .frame.selected .resize-handle { display: none; }
body.edit-enabled .frame.selected .resize-handle { display: block; }

.frame-num {
  position: absolute; top: -12px; left: -12px;
  width: 28px; height: 28px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  background: var(--text); color: #fff;
  font-family: var(--font-display);
  font-size: 11px; font-weight: 700;
  box-shadow: 0 4px 10px rgba(0,0,0,0.16);
  z-index: 7; pointer-events: none;
}
.frame.selected .frame-num { background: var(--accent); }
body.edit-enabled .frame-num { display: flex; }

.frame-pin {
  position: absolute; top: -8px; right: -8px;
  height: 20px; padding: 0 8px;
  border-radius: var(--radius-pill);
  background: var(--surface); border: 1px solid var(--line);
  box-shadow: var(--shadow-soft);
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 10px; font-weight: 500;
  display: none; align-items: center; z-index: 7;
}
.frame.locked .frame-pin { display: inline-flex; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  left: 14px; right: 14px;
  bottom: calc(var(--safe-bottom) + 10px);
  z-index: 3300;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 4px; padding: 5px;
  height: var(--nav-h);
  border-radius: var(--radius-lg);
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid transparent;
  transition: all 100ms ease;
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn .nav-icon { font-size: 18px; line-height: 1; }
.nav-btn.active {
  background: var(--accent-soft);
  color: var(--accent-text);
  border-color: rgba(61,90,128,0.08);
}
body.display-mode .topbar, body.display-mode .bottom-nav,
body.display-mode .sheet { opacity: 0; visibility: hidden; pointer-events: none; }

/* ===== SHEETS & PANELS ===== */
.sheet {
  position: fixed;
  left: 10px; right: 10px;
  bottom: calc(var(--safe-bottom) + var(--nav-h) + 18px);
  z-index: 3250;
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sheet);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  max-height: 70vh;
  overflow: hidden;
  transform: translateY(12px);
  opacity: 0; pointer-events: none;
  transition: transform 180ms ease, opacity 160ms ease;
}
.sheet.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--line);
}
.sheet-title {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.02em;
}
.sheet-subtitle {
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary);
  margin-top: 2px; line-height: 1.4;
}
.sheet-actions { display: flex; gap: 6px; align-items: center; }
.sheet-body { padding: 12px 14px 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: calc(70vh - 70px); }

/* ===== PHOTO GRID ===== */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}
.photo-cell {
  position: relative; aspect-ratio: 1;
  overflow: hidden; border-radius: var(--radius-sm);
  cursor: pointer; background: var(--bg-warm);
}
.photo-cell img { width: 100%; height: 100%; object-fit: cover; }
.photo-cell .del-x {
  position: absolute; top: 4px; right: 4px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(255,255,255,0.92); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--danger);
  box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  cursor: pointer;
}
.photo-cell.fixed-cell { outline: 2px solid var(--accent); outline-offset: -2px; }
.photo-cell .fixed-tag {
  position: absolute; left: 4px; bottom: 4px;
  background: rgba(44,38,32,0.78); color: #fff;
  font-size: 10px; border-radius: var(--radius-pill);
  padding: 2px 8px;
  font-family: var(--font-display);
}
.photo-empty-msg {
  text-align: center; color: var(--text-tertiary);
  font-size: 13px; padding: 30px 0;
}

/* ===== MENU ITEMS ===== */
.menu-list { display: grid; gap: 6px; }
.menu-item {
  min-height: 48px; padding: 0 14px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-weight: 500; font-size: 13px;
  border: 1px solid var(--line);
  background: var(--surface);
  transition: all 100ms ease;
}
.menu-item:active { transform: scale(0.99); }
.menu-item.active { background: var(--accent-soft); color: var(--accent-text); border-color: rgba(61,90,128,0.12); }
.menu-item.disabled { opacity: 0.4; pointer-events: none; }
.menu-item-right { font-size: 12px; color: var(--text-secondary); font-weight: 400; }
.menu-item.active .menu-item-right { color: var(--accent-text); }

.section-label {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 700;
  color: var(--text-tertiary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 14px 0 8px;
}

/* ===== FRAME ADD: SHAPE PICKER ===== */
.shape-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.shape-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  padding: 14px 6px 10px;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--line);
  background: var(--surface);
  cursor: pointer;
  transition: all 120ms ease;
}
.shape-card:active { transform: scale(0.96); }
.shape-card .shape-icon {
  width: 36px; height: 36px;
  border: 2px solid var(--text);
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
}
.shape-card .shape-icon.oval { border-radius: 50%; width: 30px; height: 38px; }
.shape-card .shape-icon.landscape { width: 40px; height: 30px; }
.shape-card .shape-icon.portrait { width: 28px; height: 38px; }
.shape-card .shape-label {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}
.shape-card.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.shape-card.selected .shape-icon { border-color: var(--accent); }
.shape-card.selected .shape-label { color: var(--accent-text); }

/* ===== FRAME ADD: DESIGN PICKER ===== */
.design-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-top: 10px;
}
.design-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 16px 8px 12px;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--line);
  background: var(--surface);
  cursor: pointer;
  transition: all 120ms ease;
}
.design-card:active { transform: scale(0.97); }
.design-card .design-preview {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.design-card .design-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.design-card .design-label {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary);
}
.design-card.selected { border-color: var(--accent); background: var(--accent-soft); }

.step-back {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer; padding: 4px 0;
  margin-bottom: 8px;
}
.step-back:hover { color: var(--text); }

/* ===== VIEWER ===== */
.viewer {
  position: fixed; inset: 0; z-index: 4000;
  background: rgba(44,38,32,0.85);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.viewer.open { display: flex; }
.viewer img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-md); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
.viewer-close {
  position: absolute; top: calc(var(--safe-top) + 14px); right: 14px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.12); color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}

/* ===== DISPLAY HINT ===== */
#displayHint {
  position: fixed;
  top: calc(var(--safe-top) + 14px);
  left: 50%; transform: translateX(-50%);
  z-index: 4200;
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  background: rgba(44,38,32,0.75);
  color: #fff;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 200ms ease;
  pointer-events: none;
}
body.display-mode #displayHint.show { opacity: 1; }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  top: calc(var(--safe-top) + 72px);
  left: 50%; transform: translateX(-50%) translateY(-6px);
  z-index: 5000;
  max-width: min(90vw, 400px);
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-md);
  text-align: center;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity 120ms ease, transform 120ms ease;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== PROGRESS ===== */
#progressOverlay {
  position: fixed; inset: 0; z-index: 5500;
  background: rgba(44,38,32,0.25);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#progressOverlay.open { display: flex; }
.progress-card {
  width: min(88vw, 320px); padding: 20px;
  border-radius: var(--radius-lg);
  background: var(--surface); border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
}
.progress-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.progress-meta { color: var(--text-secondary); font-size: 12px; margin-bottom: 10px; }
.progress-bar { height: 6px; border-radius: var(--radius-pill); background: rgba(0,0,0,0.06); overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: var(--radius-pill); transition: width 140ms ease; }

@media (max-width: 760px) {
  .topbar-brand { font-size: 13px; }
}

  function autoAssignPhotos() {

  function fileToDataURL(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); }); }

  async function compressImage(file) {

  function renderCanvas() {

  function attachDrag(el, f) {

  function seedLayout(layoutKey) {

  /* ===== RENDER PHOTO SHEET ===== */

  /* ===== FRAMES PANEL ===== */

  /* ===== DISPLAY MODE ===== */

  function nextPhotoForFrame(frame) {

    const idx = pool.findIndex(p => p.id === current.id);
    if (idx === -1) return pool[0];
    return pool[(idx + 1) % pool.length];
  }

  function renderBottomNav() {
    $("navPhoto").classList.toggle("active", state.activeTab === "photo" && state.mode === "edit");
    $("navFrames").classList.toggle("active", state.activeTab === "frames" && state.mode === "edit");
    $("navEdit").classList.toggle("active", state.activeTab === "edit" && state.mode === "edit");
    $("navDisplay").classList.toggle("active", state.mode === "display");
  }
  function renderTopBar() {
    document.body.classList.toggle("display-mode", state.mode === "display");
    document.body.classList.toggle("edit-enabled", state.mode === "edit" && state.editEnabled);
  }
  function renderAll() {
    renderTopBar(); renderBottomNav(); renderPanels();
    buildFramesPanel(); renderPhotoSheet(); updateEditPanel(); renderCanvas();
  }

  /* ===== PHOTO ADD ===== */
  async function addPhotos(files) {
    if (!files.length || state.isUploading) return;
    const remaining = MAX_PHOTOS - getRealPhotos().length;
    if (remaining <= 0) { showToast("写真上限に達しています"); return; }
    state.isUploading = true; setProgress(true, 0, files.length);
    let added = 0;
    try {
      const toProcess = files.slice(0, remaining);
      for (let i = 0; i < toProcess.length; i++) {
        setProgress(true, i + 1, toProcess.length);
        const photo = await compressImage(toProcess[i]);
        state.photos.push(photo); added++;
      }
      autoAssignPhotos(); renderAll();
      if (added > 0) showToast(`${added}枚追加しました`);
    } catch { showToast("読み込み失敗"); }
    state.isUploading = false; setProgress(false);
  }

  /* ===== FRAME OPERATIONS ===== */
  function addFrame(kind) {
    const w = kind.includes("landscape") ? 50 : kind.includes("portrait") ? 35 : kind === "oval" ? 35 : 40;
    const frame = { id: uid(), kind, gx: 24 + Math.random() * 140, gy: 15 + Math.random() * 90, w, photoIds: [], fixedPhotoId: null, currentPhotoId: null };
    state.frames.push(frame); autoAssignPhotos();
    state.selectedFrameId = frame.id; renderAll(); showToast("追加しました");
  }

  function deleteSelectedFrame() {
    const frame = getSelectedFrame();
    if (!frame) { showToast("フレームを選択してください"); return; }
    state.frames = state.frames.filter(f => f.id !== frame.id);
    state.selectedFrameId = null; renderAll(); showToast("削除しました");
  }

  function togglePin() {
    const frame = getSelectedFrame();
    if (!frame) { showToast("フレームを選択してください"); return; }
    if (frame.fixedPhotoId) { frame.fixedPhotoId = null; renderAll(); showToast("写真固定解除", 700); }
    else { if (!frame.currentPhotoId) { showToast("固定する写真がありません"); return; } frame.fixedPhotoId = frame.currentPhotoId; renderAll(); showToast("写真固定", 700); }
  }

  /* ===== BIND ALL UI ===== */
  function bindUI() {
    $("fitBtn").addEventListener("click", fitCanvas);

    // Bottom nav
    $("navPhoto").addEventListener("click", () => { if (state.mode === "display") exitDisplay(); state.activeTab = state.activeTab === "photo" ? null : "photo"; state.editEnabled = false; renderAll(); });
    $("navFrames").addEventListener("click", () => { if (state.mode === "display") exitDisplay(); state.activeTab = state.activeTab === "frames" ? null : "frames"; state.editEnabled = false; renderAll(); });
    $("navEdit").addEventListener("click", () => { if (state.mode === "display") exitDisplay(); state.activeTab = state.activeTab === "edit" ? null : "edit"; renderAll(); });
    $("navDisplay").addEventListener("click", () => { enterDisplay(); });

    // Close buttons
    $("closePhotoSheet").addEventListener("click", () => { state.activeTab = null; renderAll(); });
    $("closeFramesSheet").addEventListener("click", () => { state.activeTab = null; renderAll(); });
    $("closeEditSheet").addEventListener("click", () => { state.activeTab = null; renderAll(); });

    // Photo add
    $("addInSheetBtn").addEventListener("click", () => $("photoInput").click());
    $("photoInput").addEventListener("change", async (e) => { const files = Array.from(e.target.files || []); if (files.length) await addPhotos(files); e.target.value = ""; });

    // Edit controls
    $("toggleEditBtn").addEventListener("click", () => { state.editEnabled = !state.editEnabled; renderAll(); showToast(state.editEnabled ? "配置編集 ON" : "配置編集 OFF", 800); });

    // Shape picker
    document.querySelectorAll(".shape-card").forEach(card => {
      card.addEventListener("click", () => showDesignStep(card.dataset.shape));
    });
    $("designBack").addEventListener("click", resetAddFlow);

    // Frame actions
    $("pinPhotoBtn").addEventListener("click", togglePin);
    $("deleteFrameBtn").addEventListener("click", deleteSelectedFrame);

    // Viewer
    $("viewerClose").addEventListener("click", closeViewer);
    $("viewer").addEventListener("click", (e) => { if (e.target === $("viewer")) closeViewer(); });

    // Canvas click
    $("canvasArea").addEventListener("click", (e) => {
      if (state.mode === "display") { exitDisplay(); return; }
      if (!e.target.closest(".frame")) { state.selectedFrameId = null; renderAll(); }
    });

    window.addEventListener("resize", fitCanvas);
  }

  async function hydrateAspectRatios() {
    await Promise.all(Object.values(FRAME_META).map(m => new Promise(res => {
      const img = new Image();
      img.onload = () => { m.ar = (img.naturalWidth || 1) / (img.naturalHeight || 1); res(); };
      img.onerror = () => res();
      img.src = m.src;
    })));
  }

  async function init() {
    await checkMasks();
    await hydrateAspectRatios();
    state.photos = [{ id: uid(), name: "placeholder", dataUrl: placeholderUrl, ratio: 1, orient: "square" }];
    seedLayout("story");
    bindUI();
    fitCanvas();
  }

  init().catch(err => { console.error(err); showToast("初期化に失敗しました"); });
})();
</script>

</body>
</html>
