<!doctype html>

<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>KABEPIC Editor</title>
<style>
:root{
  --ink:#111;
  --muted:#777;
  --card:rgba(255,255,255,0.92);
  --border:rgba(17,17,17,0.14);
  --bg:#f6f6f6;
  --accent:#007aff;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:var(--ink);
  background:var(--bg);
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  min-height:100vh;
  background:#fff;
  margin:0 auto;
}
header{
  padding:12px 14px 10px;
  border-bottom:1px solid #eee;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}
@media (orientation: landscape) {
  header{padding:4px 14px 4px;}
  .tabs{margin-top:4px;}
  .tabbtn{padding:6px 12px;}
  .brand h1{font-size:14px;}
  .content{padding:6px;}
  .panel{padding:6px;}
  .hint{display:none;}
  .row{gap:6px;}
  button,select,input[type="text"]{padding:6px 10px;font-size:12px;}
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand h1{font-size:16px;margin:0;letter-spacing:.02em;}
.brand span{font-size:12px;color:var(--muted);}

.tabs{margin-top:10px;display:flex;gap:8px;}
.tabbtn{
flex:1;
padding:10px 12px;
border:1px solid var(–border);
background:#fff;
border-radius:10px;
font-size:13px;
color:var(–ink);
cursor:pointer;
}
.tabbtn.active{
border-color:rgba(17,17,17,0.5);
background:rgba(17,17,17,0.04);
font-weight:600;
}

.content{padding:14px;}
.panel{
background:var(–card);
border:1px solid var(–border);
border-radius:14px;
padding:12px;
}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

button,select,input[type=“text”]{
padding:10px 12px;
border-radius:12px;
border:1px solid var(–border);
background:#fff;
font-size:13px;
cursor:pointer;
}

.hint{
font-size:12px;
color:var(–muted);
line-height:1.55;
margin-top:8px;
}

#canvasWrap{
margin-top:10px;
border-radius:18px;
border:1px solid rgba(0,0,0,0.06);
overflow:hidden;
background:#ddd;
position:relative;
width:100%;
aspect-ratio:8/5;
}
#canvasScaler{
position:absolute;
top:0;
left:0;
width:2400px;
height:1500px;
transform-origin:top left;
}
#canvas{
position:relative;
width:2400px;
height:1500px;
background:#ddd;
overflow:hidden;
touch-action:none;
}

.frame{
position:absolute;
overflow:visible;
touch-action:none;
}
.frame.selected{
outline:3px solid var(–accent);
outline-offset:2px;
}

.mask{
position:absolute;
overflow:hidden;
background:transparent;
}
.mask img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
display:block;
pointer-events:none;
user-select:none;
-webkit-user-drag:none;
}

.overlay{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
user-select:none;
-webkit-user-drag:none;
z-index:3;
}

.handle{
position:absolute;
width:22px;
height:22px;
right:-12px;
bottom:-12px;
border-radius:50%;
background:var(–accent);
border:3px solid #fff;
display:none;
z-index:5;
cursor:nwse-resize;
}
.frame.selected .handle{display:block;}

.selectedBar{
margin-top:12px;
padding-top:12px;
border-top:1px solid rgba(0,0,0,0.06);
}
.selectedTitle{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
margin-bottom:8px;
}
.selectedTitle .left{
display:flex;
flex-direction:column;
gap:2px;
}
.selectedTitle .left strong{font-size:13px;}
.selectedTitle .left small{font-size:11px;color:var(–muted);}

.strip{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:2px;
}

.thumb{
width:86px;
flex:0 0 auto;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
overflow:hidden;
background:#fff;
}
.thumb img{
width:100%;
height:62px;
object-fit:cover;
display:block;
pointer-events:none;
}
.thumb .act{
display:flex;
gap:6px;
padding:6px;
}
.thumb button{
flex:1;
padding:6px 8px;
font-size:11px;
border-radius:10px;
border:1px solid rgba(17,17,17,0.18);
background:rgba(17,17,17,0.04);
cursor:pointer;
}
.thumb button.primary{
border-color:rgba(0,122,255,0.35);
background:rgba(0,122,255,0.10);
}

.trayTop{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}
.file{
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 12px;
border-radius:12px;
border:1px solid var(–border);
background:#fff;
font-size:13px;
cursor:pointer;
}
input[type=“file”]{display:none;}

.trayGrid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:10px;
margin-top:12px;
}

.tile{
position:relative;
aspect-ratio:1/1;
border:1px solid rgba(0,0,0,0.08);
border-radius:14px;
overflow:hidden;
background:#fff;
cursor:pointer;
user-select:none;
touch-action:none;
}
.tile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
pointer-events:none;
}
.badge{
position:absolute;
left:8px;
bottom:8px;
background:rgba(255,255,255,0.88);
border:1px solid rgba(0,0,0,0.12);
border-radius:999px;
font-size:11px;
padding:4px 8px;
}

.subnote{
margin-top:8px;
font-size:12px;
color:var(–muted);
line-height:1.5;
}

.toast{
position:fixed;
left:50%;
bottom:18px;
transform:translateX(-50%);
background:rgba(17,17,17,0.92);
color:#fff;
padding:10px 12px;
border-radius:12px;
font-size:13px;
max-width:min(520px, calc(100% - 24px));
z-index:50;
box-shadow:0 10px 30px rgba(0,0,0,0.18);
display:none;
}

/* Layout selector */
.layoutRow{
display:flex;
gap:6px;
margin-bottom:10px;
}
.layoutBtn{
padding:8px 14px;
border-radius:10px;
border:1px solid var(–border);
background:#fff;
font-size:12px;
cursor:pointer;
color:var(–ink);
}
.layoutBtn.active{
border-color:rgba(17,17,17,0.5);
background:rgba(17,17,17,0.06);
font-weight:600;
}
</style>

</head>

<script>
(() => {
  const PREFIX = "kabepic_code_v12_";
  const LONG_PRESS_MS = 650;

  const FRAME_META = {
    portrait: {
      src: "frame_vertical.png",
      inset: "15.7% 18.7% 15.5% 19.9%",
      mask: "rect",
      ar: 894 / 1063
    },
    square: {
      src: "frame_square.png",
      inset: "19.0% 19.9% 20.2% 19.2%",
      mask: "rect",
      ar: 1053 / 1052
    },
    landscape: {
      src: "frame_horizontal.png",
      inset: "18.6% 15.5% 20.0% 15.7%",
      mask: "rect",
      ar: 1063 / 894
    },
    landscape_simple: {
      src: "frame_horizontal_simple.png",
      inset: "17.8% 14.9% 19.4% 15.0%",
      mask: "rect",
      ar: 1043 / 873
    },
    oval: {
      src: "frame_oval.png",
      inset: "7.8% 11.7% 8.4% 12.4%",
      mask: "oval",
      maskPng: "mask_oval.png",
      ar: 694 / 982
    }
  };

  let photos = [];
  let frames = [];
  let selectedId = null;
  let currentLayout = "scene";

  const $ = (id) => document.getElementById(id);
  const canvas = $("canvas");
  const trayGrid = $("trayGrid");
  const toastEl = $("toast");

  const uid = () => Math.random().toString(36).slice(2, 10);
  const codeKey = (code) => PREFIX + code;

  function showToast(msg, ms = 1400) {
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => {
      toastEl.style.display = "none";
    }, ms);
  }

  function makePlaceholderDataUrl() {
    const c = document.createElement("canvas");
    c.width = 1200;
    c.height = 1200;
    const g = c.getContext("2d");
    g.fillStyle = "#f1efe8";
    g.fillRect(0, 0, c.width, c.height);
    g.strokeStyle = "rgba(0,0,0,0.12)";
    g.lineWidth = 12;
    g.strokeRect(60, 60, c.width - 120, c.height - 120);
    g.fillStyle = "rgba(0,0,0,0.35)";
    g.font = "72px sans-serif";
    g.fillText("KABEPIC", 350, 560);
    g.font = "34px sans-serif";
    g.fillText("placeholder", 430, 640);
    return c.toDataURL("image/png");
  }

  function setTab(which) {
    $("tabCanvas").classList.toggle("active", which === "canvas");
    $("tabTray").classList.toggle("active", which === "tray");
    $("panelCanvas").style.display = which === "canvas" ? "" : "none";
    $("panelTray").style.display = which === "tray" ? "" : "none";
  }

  $("tabCanvas").onclick = () => setTab("canvas");
  $("tabTray").onclick = () => setTab("tray");

  function normalizeCodeInput() {
    const v = ($("codeInput").value || "").replace(/\D/g, "").slice(0, 6);
    $("codeInput").value = v;
    return v;
  }

  $("codeInput").oninput = normalizeCodeInput;

  $("genCodeBtn").onclick = () => {
    $("codeInput").value = String(Math.floor(100000 + Math.random() * 900000));
    showToast("コードを生成しました");
  };

  function findFrame(id) {
    return frames.find(f => f.id === id) || null;
  }

  function findPhoto(id) {
    return photos.find(p => p.id === id) || null;
  }

  function detectOrient(ratio) {
    if (ratio > 1.05) return "landscape";
    if (ratio < 0.95) return "portrait";
    return "square";
  }

  async function readFile(file) {
    const dataUrl = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    const meta = await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const ratio = (img.naturalWidth || 1) / (img.naturalHeight || 1);
        resolve({ ratio, orient: detectOrient(ratio) });
      };
      img.onerror = () => resolve({ ratio: 1, orient: "square" });
      img.src = dataUrl;
    });

    return {
      id: uid(),
      name: file.name,
      dataUrl,
      ...meta
    };
  }

  async function hydrateAspectRatios() {
    await Promise.all(
      Object.values(FRAME_META).map(meta => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          meta.ar = (img.naturalWidth || 1) / (img.naturalHeight || 1);
          resolve();
        };
        img.onerror = () => resolve();
        img.src = meta.src + "?v=12";
      }))
    );
  }

  function applyOvalMask(el) {
    el.style.borderRadius = "50%";
    el.style.webkitMaskImage = `url("${FRAME_META.oval.maskPng}")`;
    el.style.webkitMaskSize = "100% 100%";
    el.style.webkitMaskRepeat = "no-repeat";
    el.style.webkitMaskPosition = "center";
    el.style.maskImage = `url("${FRAME_META.oval.maskPng}")`;
    el.style.maskSize = "100% 100%";
    el.style.maskRepeat = "no-repeat";
    el.style.maskPosition = "center";
  }

  /* グリッド: 240×150 (80×46の3倍) */
  const GRID = { W: 240, H: 150 };

  function gridToPercent(f) {
    const m = FRAME_META[f.kind];
    const hCells = f.w / m.ar;
    if (f.bottomAlign != null) {
      const bottomFromBottom = GRID.H - f.bottomAlign;
      return {
        left: (f.gx / GRID.W * 100) + "%",
        bottom: (bottomFromBottom / GRID.H * 100) + "%",
        width:  (f.w / GRID.W * 100) + "%",
        height: (hCells / GRID.H * 100) + "%",
        useBottom: true,
      };
    }
    return {
      left: (f.gx / GRID.W * 100) + "%",
      top:  (f.gy / GRID.H * 100) + "%",
      width:  (f.w / GRID.W * 100) + "%",
      height: (hCells / GRID.H * 100) + "%",
      useBottom: false,
    };
  }

  /* ========================================
     レイアウトプリセット定義
     座標は240×150グリッド（80×46の3倍）
     ======================================== */

  // Story (8枚) — 既存
  function seedStoryFrames() {
    const grid = [
      ["portrait",         -0.2, 57.8, 38,   null],
      ["square",           42.9, 32.2, 41,   null],
      ["portrait",         87.4, 16.5, 56.25,null],
      ["landscape_simple", 144.7,38.1, 38,   null],
      ["landscape",        187.5,48.4, 51,   null],
      ["landscape",        39.5, 73.1, 47,   null],
      ["square",           91.7, 76.4, 47,   null],
      ["portrait",         142.7,77.0, 41.5, null],
    ];

    frames = grid.map(g => ({
      id: uid(),
      kind: g[0],
      gx: g[1],
      gy: g[2],
      w: g[3],
      bottomAlign: g[4],
      photoIds: photos[0] ? [photos[0].id] : [],
      fixedPhotoId: null
    }));
  }

  // Scene (11枚) — グリッド画像から読み取り
  // 80×46グリッドの座標を ×3 して240×150に変換
  function seedSceneFrames() {
    const grid = [
      // [type,           gx,   gy,   w(240grid), bottomAlign]
      // --- 上段 ---
      ["portrait",         3,   15,   30,  null],   // #1  左上の縦 (80grid: ~1,5 → w~10)
      ["square",          33,   24,   33,  null],   // #2  上段左寄り正方形 (80grid: ~11,8 → w~11)
      ["portrait",        69,    3,   45,  null],   // #3  上段中央の大きい縦 (80grid: ~23,1 → w~15)
      ["landscape",      111,    9,   36,  null],   // #4  上段中央右の横 (80grid: ~37,3 → w~12)
      ["landscape",      147,    3,   48,  null],   // #5  右上の大きい横 (80grid: ~49,1 → w~16)
      // --- 中段 ---
      ["landscape",       15,   75,   48,  null],   // #6  中央左の横 (80grid: ~5,25 → w~16)
      ["square",          63,   63,   48,  null],   // #7  中央の大きい正方形 (80grid: ~21,21 → w~16)
      ["landscape",      111,   75,   48,  null],   // #8  中央右の横 (80grid: ~37,25 → w~16)
      // --- 右・下段 ---
      ["landscape",      183,   39,   48,  null],   // #9  右中段の横 (80grid: ~61,13 → w~16)
      ["square",          39,   87,   36,  null],   // #10 下中央左の正方形 (80grid: ~13,29 → w~12)
      ["portrait",       195,   75,   36,  null],   // #11 右下の縦 (80grid: ~65,25 → w~12)
    ];

    frames = grid.map(g => ({
      id: uid(),
      kind: g[0],
      gx: g[1],
      gy: g[2],
      w: g[3],
      bottomAlign: g[4],
      photoIds: photos[0] ? [photos[0].id] : [],
      fixedPhotoId: null
    }));
  }

  // Calm (3枚) — 縦×正方形×横 の三角構成
  function seedCalmFrames() {
    const grid = [
      ["portrait",   30,  20,  50,  null],
      ["square",     95,  35,  50,  null],
      ["landscape", 155,  55,  55,  null],
    ];

    frames = grid.map(g => ({
      id: uid(),
      kind: g[0],
      gx: g[1],
      gy: g[2],
      w: g[3],
      bottomAlign: g[4],
      photoIds: photos[0] ? [photos[0].id] : [],
      fixedPhotoId: null
    }));
  }

  // Flow (5枚) — 軽い物語構成
  function seedFlowFrames() {
    const grid = [
      ["portrait",    10,  25,  42,  null],
      ["landscape",   60,  15,  50,  null],
      ["square",     120,  40,  42,  null],
      ["portrait",   170,  20,  38,  null],
      ["landscape",   55,  80,  50,  null],
    ];

    frames = grid.map(g => ({
      id: uid(),
      kind: g[0],
      gx: g[1],
      gy: g[2],
      w: g[3],
      bottomAlign: g[4],
      photoIds: photos[0] ? [photos[0].id] : [],
      fixedPhotoId: null
    }));
  }

  function seedLayout(layout) {
    currentLayout = layout;
    selectedId = null;
    switch (layout) {
      case "calm":  seedCalmFrames(); break;
      case "flow":  seedFlowFrames(); break;
      case "story": seedStoryFrames(); break;
      case "scene": seedSceneFrames(); break;
      default:      seedStoryFrames(); break;
    }
    updateLayoutButtons();
    renderAll();
  }

  function updateLayoutButtons() {
    document.querySelectorAll(".layoutBtn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.layout === currentLayout);
    });
  }

  // Layout button click handlers
  document.querySelectorAll(".layoutBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      seedLayout(btn.dataset.layout);
      const names = { calm:"Calm (3)", flow:"Flow (5)", story:"Story (8)", scene:"Scene (11)" };
      showToast(names[btn.dataset.layout] + " に切り替えました");
    });
  });

  function updateSelectionUI() {
    canvas.querySelectorAll(".frame").forEach(el => {
      el.classList.toggle("selected", el.dataset.id === selectedId);
    });
  }

  function attachDrag(el, f) {
    let on = false, sx = 0, sy = 0, ogx = 0, ogy = 0;

    el.addEventListener("pointerdown", (e) => {
      if (e.target.classList.contains("handle")) return;
      e.stopPropagation();
      selectedId = f.id;
      updateSelectionUI();
      renderSelected();

      on = true;
      sx = e.clientX;
      sy = e.clientY;
      ogx = f.gx;
      ogy = f.gy;
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointermove", (e) => {
      if (!on) return;
      const r = canvas.getBoundingClientRect();
      f.gx = ogx + (e.clientX - sx) / r.width * GRID.W;
      f.gy = ogy + (e.clientY - sy) / r.height * GRID.H;
      el.style.left = (f.gx / GRID.W * 100) + "%";
      el.style.top = (f.gy / GRID.H * 100) + "%";
    });

    el.addEventListener("pointerup", () => { on = false; });
    el.addEventListener("pointercancel", () => { on = false; });
  }

  function attachResize(handle, el, f) {
    let on = false, sx = 0, sw = 0;

    handle.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      selectedId = f.id;
      updateSelectionUI();
      renderSelected();

      on = true;
      sx = e.clientX;
      sw = f.w;
      handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener("pointermove", (e) => {
      if (!on) return;
      const r = canvas.getBoundingClientRect();
      let nw = sw + (e.clientX - sx) / r.width * GRID.W;
      if (nw < 10) nw = 10;
      f.w = nw;
      const pct = gridToPercent(f);
      el.style.width = pct.width;
      el.style.height = pct.height;
    });

    handle.addEventListener("pointerup", () => { on = false; });
    handle.addEventListener("pointercancel", () => { on = false; });
  }

  function renderFrames() {
    canvas.innerHTML = "";

    frames.forEach(f => {
      const m = FRAME_META[f.kind];
      const pct = gridToPercent(f);

      const el = document.createElement("div");
      el.className = "frame";
      el.dataset.id = f.id;
      el.style.left = pct.left;
      if (pct.useBottom) {
        el.style.bottom = pct.bottom;
      } else {
        el.style.top = pct.top;
      }
      el.style.width = pct.width;
      el.style.height = pct.height;
      el.style.setProperty("--inset", m.inset);

      const mask = document.createElement("div");
      mask.className = "mask";
      mask.style.inset = m.inset;
      if (f.kind === "oval") applyOvalMask(mask);

      const img = document.createElement("img");
      const pid =
        (f.fixedPhotoId && f.photoIds.includes(f.fixedPhotoId))
        ? f.fixedPhotoId
        : (f.photoIds[0] || photos[0]?.id);
      const p = pid ? findPhoto(pid) : photos[0];
      img.src = p ? p.dataUrl : makePlaceholderDataUrl();
      mask.appendChild(img);
      el.appendChild(mask);

      const ov = document.createElement("img");
      ov.className = "overlay";
      ov.src = m.src;
      el.appendChild(ov);

      const h = document.createElement("div");
      h.className = "handle";
      el.appendChild(h);

      attachDrag(el, f);
      attachResize(h, el, f);

      canvas.appendChild(el);
    });

    updateSelectionUI();
  }

  function renderSelected() {
    const f = selectedId ? findFrame(selectedId) : null;
    $("selectedInfo").textContent = f ? `ID: ${f.id} / 種類: ${f.kind} / 写真: ${f.photoIds.length}枚` : "なし";
    $("selectedStrip").innerHTML = "";

    if (!f || !f.photoIds.length) {
      $("selectedEmpty").style.display = f ? "" : "none";
      return;
    }

    $("selectedEmpty").style.display = "none";

    f.photoIds.forEach(pid => {
      const p = findPhoto(pid);
      if (!p) return;

      const box = document.createElement("div");
      box.className = "thumb";
      box.innerHTML = `
        <img src="${p.dataUrl}">
        <div class="act">
          <button class="primary">${f.fixedPhotoId === pid ? '固定中' : '固定'}</button>
          <button>除外</button>
        </div>
      `;

      box.querySelectorAll("button")[0].onclick = () => {
        f.fixedPhotoId = pid;
        renderFrames();
        renderSelected();
        showToast("固定しました");
      };

      box.querySelectorAll("button")[1].onclick = () => {
        f.photoIds = f.photoIds.filter(x => x !== pid);
        if (f.fixedPhotoId === pid) f.fixedPhotoId = null;
        renderFrames();
        renderSelected();
        showToast("除外しました");
      };

      $("selectedStrip").appendChild(box);
    });
  }

  function renderTray() {
    trayGrid.innerHTML = "";

    if (!photos.length) {
      $("trayEmpty").style.display = "";
      return;
    }

    $("trayEmpty").style.display = "none";

    photos.forEach(p => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.innerHTML = `
        <img src="${p.dataUrl}">
        <div class="badge">${selectedId ? '割当' : '写真追加済み'}</div>
      `;

      let timer = null;
      let longPressed = false;

      tile.addEventListener("pointerdown", () => {
        longPressed = false;
        timer = setTimeout(() => {
          longPressed = true;
          if (!confirm("この写真をライブラリから削除しますか？\n（フレームからも除外されます）")) return;

          photos = photos.filter(x => x.id !== p.id);
          frames.forEach(fr => {
            fr.photoIds = fr.photoIds.filter(x => x !== p.id);
            if (fr.fixedPhotoId === p.id) fr.fixedPhotoId = null;
          });

          if (!photos.length) {
            photos = [{
              id: uid(),
              name: "placeholder",
              dataUrl: makePlaceholderDataUrl(),
              ratio: 1,
              orient: "square"
            }];
          }

          renderAll();
          showToast("写真を削除しました");
        }, LONG_PRESS_MS);
      });

      tile.addEventListener("pointerup", () => {
        if (timer) clearTimeout(timer);
        timer = null;
        if (longPressed) return;

        if (!selectedId) {
          showToast("先にフレームを選択してください");
          return;
        }

        const f = findFrame(selectedId);
        if (!f) return;

        if (f.photoIds.includes(p.id)) {
          showToast("すでに割り当て済みです");
          return;
        }

        f.photoIds.push(p.id);
        renderFrames();
        renderSelected();
        showToast("写真を割り当てました");
      });

      tile.addEventListener("pointercancel", () => {
        if (timer) clearTimeout(timer);
        timer = null;
      });

      trayGrid.appendChild(tile);
    });
  }

  function renderAll() {
    renderFrames();
    renderSelected();
    renderTray();
    setTab("canvas");
  }

  function save() {
    const c = normalizeCodeInput();
    if (!/^\d{6}$/.test(c)) {
      showToast("6桁コードを入力してください");
      return;
    }

    localStorage.setItem(
      codeKey(c),
      JSON.stringify({
        meta: { savedAt: Date.now(), v: 12, layout: currentLayout },
        photos,
        frames
      })
    );

    showToast("保存 " + c + " 完了しました");
  }

  function load() {
    const c = normalizeCodeInput();
    if (!/^\d{6}$/.test(c)) {
      showToast("6桁コードを入力してください");
      return;
    }

    const raw = localStorage.getItem(codeKey(c));
    if (!raw) {
      showToast("このコードのデータはありません");
      return;
    }

    try {
      const d = JSON.parse(raw);
      photos = (Array.isArray(d.photos) && d.photos.length)
        ? d.photos
        : [{
            id: uid(),
            name: "placeholder",
            dataUrl: makePlaceholderDataUrl(),
            ratio: 1,
            orient: "square"
          }];
      frames = Array.isArray(d.frames) ? d.frames : [];
      if (d.meta && d.meta.layout) {
        currentLayout = d.meta.layout;
        updateLayoutButtons();
      }
      selectedId = null;
      renderAll();
      showToast("読み込み完了");
    } catch {
      showToast("読み込み失敗");
    }
  }

  function reset() {
    photos = [{
      id: uid(),
      name: "placeholder",
      dataUrl: makePlaceholderDataUrl(),
      ratio: 1,
      orient: "square"
    }];
    frames = [];
    selectedId = null;
    seedLayout(currentLayout);
    showToast(currentLayout + " にリセットしました");
  }

  $("saveBtn").onclick = save;
  $("saveBtn2").onclick = save;
  $("loadBtn").onclick = load;
  $("loadBtn2").onclick = load;
  $("resetBtn").onclick = reset;
  $("resetBtn2").onclick = reset;

  $("openViewBtn").onclick = () => {
    const c = normalizeCodeInput();
    if (!/^\d{6}$/.test(c)) {
      showToast("6桁コードを入力してください");
      return;
    }
    save();
    window.open("KPview.html?code=" + encodeURIComponent(c), "_blank");
  };

  $("addFrame").onclick = () => {
    const kind = $("frameType").value;
    const wPresets = [30, 35, 42];
    const w = wPresets[Math.floor(Math.random() * wPresets.length)];

    frames.push({
      id: uid(),
      kind,
      gx: 24 + Math.random() * 140,
      gy: 15 + Math.random() * 90,
      w,
      photoIds: photos[0] ? [photos[0].id] : [],
      fixedPhotoId: null
    });

    selectedId = frames[frames.length - 1].id;
    renderAll();
    showToast("フレームを追加しました");
  };

  $("deleteFrame").onclick = () => {
    if (!selectedId) {
      showToast("フレームを選択してください");
      return;
    }
    frames = frames.filter(f => f.id !== selectedId);
    selectedId = null;
    renderAll();
    showToast("削除しました");
  };

  $("fileInput").onchange = async (e) => {
    const files = [...(e.target.files || [])];
    if (!files.length) return;

    try {
      const arr = [];
      for (const f of files) {
        arr.push(await readFile(f));
      }
      photos = [...arr, ...photos];
      renderTray();
      showToast(arr.length + "枚追加しました");
    } catch {
      showToast("読み込み失敗");
    }

    e.target.value = "";
  };

  (async function init() {
    if (!/^\d{6}$/.test(normalizeCodeInput())) {
      $("codeInput").value = String(Math.floor(100000 + Math.random() * 900000));
    }

    photos = [{
      id: uid(),
      name: "placeholder",
      dataUrl: makePlaceholderDataUrl(),
      ratio: 1,
      orient: "square"
    }];

    await hydrateAspectRatios();
    seedLayout(currentLayout);

    const scaler = $("canvasScaler");
    const wrap = $("canvasWrap");

    function fitCanvas() {
      const wrapW = wrap.clientWidth;
      const scale = wrapW / 2400;
      scaler.style.transform = `scale(${scale})`;
    }

    fitCanvas();
    let rt = null;
    window.addEventListener("resize", () => {
      clearTimeout(rt);
      rt = setTimeout(() => { fitCanvas(); }, 80);
    });
  })();
})();
</script>
