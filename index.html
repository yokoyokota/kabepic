<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>KABEPIC Story8 Grid Check</title>
  <style>
    :root {
      --canvas-w: 2400;
      --canvas-h: 1500;
      --grid: 10px;
      --page-bg: #1f1f1f;
      --board-bg: #ffffff;
      --grid-line: rgba(0, 0, 0, 0.18);
      --grid-line-bold: rgba(0, 0, 0, 0.28);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      --label-bg: rgba(35, 35, 35, 0.85);
      --label-fg: #fff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    #boardWrap {
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    #board {
      position: relative;
      width: calc(var(--canvas-w) * 1px);
      height: calc(var(--canvas-h) * 1px);
      background:
        linear-gradient(to right, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to bottom, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-color: var(--board-bg);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .frame {
      position: absolute;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center center;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 16px);
      transform: translateX(-50%);
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--label-bg);
      color: var(--label-fg);
      font-size: 20px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      color: #111;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      font-size: 13px;
      line-height: 1.55;
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .legend {
      margin-top: 6px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story8 / 2400×1500 / 10pxグリッド固定</strong>
    1, 3, 8 = 縦長<br>
    2, 7 = 正方形<br>
    4, 5, 6 = 横長
    <div class="legend">
      今回は比率ではなく、<br>
      位置もサイズも「マス数」で指定しています
    </div>
  </div>

  <div id="app">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CANVAS_W = 2400;
      const CANVAS_H = 1500;
      const CELL = 10;

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      /*
        gx, gy, gw, gh は全部「10pxマス数」
        つまり:
          x = gx * 10
          y = gy * 10
          w = gw * 10
          h = gh * 10

        今回は画像からマス数ベースで組み直した版
      */
      const layout = [
        {
          id: 1,
          kind: "vertical",
          asset: "frame_vertical.png",
          gx: 0,
          gy: 50,
          gw: 35,
          gh: 41
        },
        {
          id: 2,
          kind: "square",
          asset: "frame_square.png",
          gx: 42,
          gy: 30,
          gw: 41,
          gh: 41
        },
        {
          id: 3,
          kind: "vertical",
          asset: "frame_vertical.png",
          gx: 89,
          gy: 6,
          gw: 54,
          gh: 64
        },
        {
          id: 4,
          kind: "horizontal",
          asset: "frame_horizontal.png",
          gx: 147,
          gy: 39,
          gw: 38,
          gh: 32
        },
        {
          id: 5,
          kind: "horizontal",
          asset: "frame_horizontal.png",
          gx: 189,
          gy: 49,
          gw: 50,
          gh: 42
        },
        {
          id: 6,
          kind: "horizontal",
          asset: "frame_horizontal.png",
          gx: 39,
          gy: 76,
          gw: 47,
          gh: 40
        },
        {
          id: 7,
          kind: "square",
          asset: "frame_square.png",
          gx: 90,
          gy: 76,
          gw: 51,
          gh: 51
        },
        {
          id: 8,
          kind: "vertical",
          asset: "frame_vertical.png",
          gx: 146,
          gy: 76,
          gw: 38,
          gh: 45
        }
      ];

      function px(n) {
        return `${n}px`;
      }

      function createFrame(item) {
        const el = document.createElement("div");
        el.className = "frame";
        el.style.left = px(item.gx * CELL);
        el.style.top = px(item.gy * CELL);
        el.style.width = px(item.gw * CELL);
        el.style.height = px(item.gh * CELL);
        el.style.backgroundImage = `url("${item.asset}")`;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = String(item.id);
        el.appendChild(label);

        return el;
      }

      function render() {
        board.innerHTML = "";
        layout.forEach((item) => {
          board.appendChild(createFrame(item));
        });
      }

      function fitBoard() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / CANVAS_W, vh / CANVAS_H) * 0.94;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fitBoard();
      window.addEventListener("resize", fitBoard);
    })();
  </script>
</body>
</html>
