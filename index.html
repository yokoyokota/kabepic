<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KABEPIC Layout</title>

<style>

body{
margin:0;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* 壁 */

#wall{
position:relative;
width:100vw;
height:100vh;
background:white;
overflow:hidden;
}

/* フレーム */

.frame{
position:absolute;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

/* 写真 */

.photo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="wall"></div>

<script>

/* =========================
基準キャンバス
========================= */

const BASE_W = 2400
const BASE_H = 1500

const scale = window.innerWidth / BASE_W

/* =========================
Story8 フレーム配置
========================= */

const frames = [

{type:"vertical",x:240,y:520,w:200,h:300},

{type:"square",x:520,y:420,w:320,h:320},

{type:"vertical",x:940,y:260,w:320,h:460},

{type:"square",x:1340,y:420,w:320,h:320},

{type:"horizontal",x:1720,y:420,w:420,h:300},

{type:"horizontal",x:480,y:800,w:420,h:300},

{type:"square",x:940,y:820,w:320,h:320},

{type:"vertical",x:1400,y:760,w:220,h:340}

]

/* =========================
描画
========================= */

const wall = document.getElementById("wall")

frames.forEach(f=>{

const frame = document.createElement("div")

frame.className="frame"

frame.style.left = f.x * scale + "px"
frame.style.top = f.y * scale + "px"
frame.style.width = f.w * scale + "px"
frame.style.height = f.h * scale + "px"

frame.style.backgroundImage =
`url(frame_${f.type}.png)`

const img = document.createElement("img")

img.className="photo"
img.src="https://picsum.photos/600?random="+Math.random()

frame.appendChild(img)

wall.appendChild(frame)

})

</script>

</body>
</html>
