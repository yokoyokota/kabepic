<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KABEPIC</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
overflow:hidden;
}

#topbar{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#000;
display:flex;
align-items:center;
gap:10px;
padding:10px;
z-index:1000;
}

button{
padding:8px 12px;
font-size:14px;
}

#canvasWrap{
position:absolute;
top:60px;
bottom:120px;
left:0;
right:0;
overflow:auto;
touch-action:none;
}

#canvas{
position:relative;
width:2000px;
height:2000px;
margin:auto;
}

.frame{
position:absolute;
touch-action:none;
}

.frame img.frameArt{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.photoLayer{
position:absolute;
overflow:hidden;
}

.photoLayer img{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

#photoPanel{
position:fixed;
bottom:0;
left:0;
right:0;
height:120px;
background:#000;
overflow-x:auto;
display:flex;
gap:8px;
padding:8px;
}

.thumb{
height:100px;
}

.thumb img{
height:100%;
}

.progress{
position:fixed;
top:60px;
left:0;
right:0;
height:4px;
background:#333;
}

.bar{
height:100%;
width:0%;
background:#0f0;
}

</style>
</head>

<body>

<div id="topbar">

<button id="editModeBtn">配置編集 OFF</button>

<button id="addPhotosBtn">
写真追加
</button>

<button id="viewBtn">
表示モード
</button>

<input type="file"
id="fileInput"
multiple
accept="image/*"
style="display:none">

</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div id="canvasWrap">
<div id="canvas"></div>
</div>

<div id="photoPanel"></div>

<script>

let editMode=false
let frames=[]
let photos=[]
let currentPhotoIndex=0
let canvas=document.getElementById("canvas")
let progressBar=document.getElementById("progressBar")

document.getElementById("editModeBtn").onclick=()=>{
editMode=!editMode
document.getElementById("editModeBtn").innerText=
editMode?"配置編集 ON":"配置編集 OFF"
}

document.getElementById("addPhotosBtn").onclick=()=>{
document.getElementById("fileInput").click()
}

document.getElementById("fileInput").onchange=(e)=>{

let files=[...e.target.files]

files.forEach((file,i)=>{

let reader=new FileReader()

reader.onload=()=>{

if(!photos.includes(reader.result)){

photos.push(reader.result)

addThumb(reader.result)

}

progressBar.style.width=
((i+1)/files.length*100)+"%"

}

reader.readAsDataURL(file)

})

setTimeout(()=>{
progressBar.style.width="0%"
},800)

}

function addThumb(src){

let div=document.createElement("div")
div.className="thumb"

let img=document.createElement("img")
img.src=src

div.appendChild(img)

document.getElementById("photoPanel")
.appendChild(div)

}

function createFrame(x,y,w,h,mask){

let frame=document.createElement("div")
frame.className="frame"
frame.style.left=x+"px"
frame.style.top=y+"px"
frame.style.width=w+"px"
frame.style.height=h+"px"

let photo=document.createElement("div")
photo.className="photoLayer"

photo.style.left="10%"
photo.style.top="10%"
photo.style.width="80%"
photo.style.height="80%"

if(mask=="oval"){

photo.style.borderRadius="50%"

}

let img=document.createElement("img")
photo.appendChild(img)

let art=document.createElement("img")
art.className="frameArt"

frame.appendChild(photo)
frame.appendChild(art)

canvas.appendChild(frame)

let dragging=false
let startX,startY

frame.addEventListener("pointerdown",(e)=>{

if(!editMode)return

dragging=true
startX=e.clientX
startY=e.clientY

})

window.addEventListener("pointermove",(e)=>{

if(!dragging)return

let dx=e.clientX-startX
let dy=e.clientY-startY

frame.style.left=
(frame.offsetLeft+dx)+"px"

frame.style.top=
(frame.offsetTop+dy)+"px"

startX=e.clientX
startY=e.clientY

})

window.addEventListener("pointerup",()=>{

dragging=false

})

frames.push({
frame,
photo,
img
})

}

function nextPhoto(){

if(photos.length==0)return

frames.forEach((f,i)=>{

let index=(currentPhotoIndex+i)%photos.length

f.img.src=photos[index]

})

currentPhotoIndex++

}

setInterval(nextPhoto,4000)

createFrame(100,100,400,600)
createFrame(600,100,400,400)
createFrame(1100,100,600,400)

</script>

</body>
</html>
