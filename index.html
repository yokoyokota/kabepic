<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KABEPIC</title>

<style>

html,body{
margin:0;
padding:0;
background:#f4efe6;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
}

#stage{
position:relative;
width:1600px;
height:900px;
margin:auto;
background:#f4efe6;
overflow:hidden;
}

.frame{
position:absolute;
touch-action:none;
cursor:grab;
}

.frame.dragging{
cursor:grabbing;
}

.frame img{
width:100%;
height:100%;
object-fit:fill;
pointer-events:none;
}

.photo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

/* Safari長押し対策 */

.frame,
.frame *{
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

</style>
</head>

<body>

<div id="stage"></div>

<script>

const stage=document.getElementById("stage")

const frames=[
{x:200,y:100,w:260,h:360,frame:"frame_vertical.png"},
{x:600,y:140,w:240,h:240,frame:"frame_square.png"},
{x:900,y:400,w:360,h:240,frame:"frame_horizontal.png"}
]

frames.forEach((f,i)=>{

const el=document.createElement("div")
el.className="frame"
el.style.left=f.x+"px"
el.style.top=f.y+"px"
el.style.width=f.w+"px"
el.style.height=f.h+"px"

const photo=document.createElement("img")
photo.className="photo"
photo.src="photo1.jpg"

const frame=document.createElement("img")
frame.src=f.frame

el.appendChild(photo)
el.appendChild(frame)

stage.appendChild(el)

})

let dragging=null
let offsetX=0
let offsetY=0

document.querySelectorAll(".frame").forEach(frame=>{

frame.addEventListener("pointerdown",e=>{

e.preventDefault()

dragging=frame

const rect=frame.getBoundingClientRect()

offsetX=e.clientX-rect.left
offsetY=e.clientY-rect.top

frame.classList.add("dragging")

})

})

document.addEventListener("pointermove",e=>{

if(!dragging)return

dragging.style.left=(e.clientX-offsetX)+"px"
dragging.style.top=(e.clientY-offsetY)+"px"

})

document.addEventListener("pointerup",()=>{

if(!dragging)return

dragging.classList.remove("dragging")

dragging=null

})

/* Safari長押し完全無効 */

document.addEventListener("contextmenu",e=>{
e.preventDefault()
})

document.addEventListener("selectstart",e=>{
e.preventDefault()
})

</script>

</body>
</html>
