<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

html,body{
margin:0;
background:#ece6da;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.wall{
width:min(92vw,1200px);
aspect-ratio:16/10;
background:#d8d3ca;
position:relative;
border-radius:20px;
}

.frame{
position:absolute;
background-size:100% 100%;
background-repeat:no-repeat;
background-position:center;
}

/* ---- grid ---- */
/* 24列 × 15行 */

:root{
--c:4.166%;
--r:6.666%;
}

/* 1 */
.f1{
left:calc(var(--c)*1);
top:calc(var(--r)*7);
width:calc(var(--c)*3);
aspect-ratio:894/1063;
background-image:url(frame_vertical.png);
}

/* 2 */
.f2{
left:calc(var(--c)*5);
top:calc(var(--r)*4);
width:calc(var(--c)*4);
aspect-ratio:1053/1052;
background-image:url(frame_square.png);
}

/* 3 */
.f3{
left:calc(var(--c)*10);
top:calc(var(--r)*1);
width:calc(var(--c)*4.8);
aspect-ratio:894/1063;
background-image:url(frame_vertical.png);
}

/* 4 */
.f4{
left:calc(var(--c)*15);
top:calc(var(--r)*5);
width:calc(var(--c)*3.8);
aspect-ratio:1063/894;
background-image:url(frame_horizontal.png);
}

/* 5 */
.f5{
left:calc(var(--c)*19);
top:calc(var(--r)*5);
width:calc(var(--c)*4.5);
aspect-ratio:1063/894;
background-image:url(frame_horizontal.png);
}

/* 6 */
.f6{
left:calc(var(--c)*4);
top:calc(var(--r)*10);
width:calc(var(--c)*4.5);
aspect-ratio:1063/894;
background-image:url(frame_horizontal.png);
}

/* 7 */
.f7{
left:calc(var(--c)*9.5);
top:calc(var(--r)*10);
width:calc(var(--c)*4);
aspect-ratio:1053/1052;
background-image:url(frame_square.png);
}

/* 8 */
.f8{
left:calc(var(--c)*15);
top:calc(var(--r)*10);
width:calc(var(--c)*3);
aspect-ratio:894/1063;
background-image:url(frame_vertical.png);
}

</style>
</head>

<body>

<div class="wall">

<div class="frame f1"></div>
<div class="frame f2"></div>
<div class="frame f3"></div>
<div class="frame f4"></div>
<div class="frame f5"></div>
<div class="frame f6"></div>
<div class="frame f7"></div>
<div class="frame f8"></div>

</div>

</body>
</html>
