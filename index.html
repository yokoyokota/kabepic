<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>KABEPIC Story8 Grid Fix</title>
  <style>
    :root {
      --canvas-w: 2400;
      --canvas-h: 1500;
      --cell: 10px;
      --page-bg: #1f1f1f;
      --board-bg: #ffffff;
      --grid-line: rgba(0, 0, 0, 0.14);
      --grid-line-bold: rgba(0, 0, 0, 0.24);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      --label-bg: rgba(35, 35, 35, 0.85);
      --label-fg: #fff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    #boardWrap {
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    #board {
      position: relative;
      width: calc(var(--canvas-w) * 1px);
      height: calc(var(--canvas-h) * 1px);
      background:
        linear-gradient(to right, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to bottom, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-color: var(--board-bg);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .frame {
      position: absolute;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center center;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translateX(-50%);
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--label-bg);
      color: var(--label-fg);
      font-size: 20px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      color: #111;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      font-size: 13px;
      line-height: 1.55;
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story8 / 2400×1500 / 10pxグリッド固定 修正版</strong>
    縦長: 1, 3, 8<br>
    正方形: 2, 7<br>
    横長: 4, 5, 6
  </div>

  <div id="app">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CANVAS_W = 2400;
      const CANVAS_H = 1500;
      const CELL = 10;

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      /*
        gx, gy, gw, gh
        すべて 10px マス数
        前回より「細長く見える」問題を補正した版
      */
      const layout = [
        {
          id: 1,
          asset: "frame_vertical.png",
          gx: 4,
          gy: 52,
          gw: 30,
          gh: 38
        },
        {
          id: 2,
          asset: "frame_square.png",
          gx: 43,
          gy: 31,
          gw: 39,
          gh: 39
        },
        {
          id: 3,
          asset: "frame_vertical.png",
          gx: 91,
          gy: 7,
          gw: 50,
          gh: 57
        },
        {
          id: 4,
          asset: "frame_horizontal.png",
          gx: 145,
          gy: 41,
          gw: 34,
          gh: 24
        },
        {
          id: 5,
          asset: "frame_horizontal.png",
          gx: 190,
          gy: 45,
          gw: 47,
          gh: 31
        },
        {
          id: 6,
          asset: "frame_horizontal.png",
          gx: 40,
          gy: 75,
          gw: 43,
          gh: 30
        },
        {
          id: 7,
          asset: "frame_square.png",
          gx: 92,
          gy: 73,
          gw: 42,
          gh: 42
        },
        {
          id: 8,
          asset: "frame_vertical.png",
          gx: 146,
          gy: 73,
          gw: 29,
          gh: 38
        }
      ];

      function px(n) {
        return `${n}px`;
      }

      function createFrame(item) {
        const el = document.createElement("div");
        el.className = "frame";
        el.style.left = px(item.gx * CELL);
        el.style.top = px(item.gy * CELL);
        el.style.width = px(item.gw * CELL);
        el.style.height = px(item.gh * CELL);
        el.style.backgroundImage = `url("${item.asset}")`;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = String(item.id);
        el.appendChild(label);

        return el;
      }

      function render() {
        board.innerHTML = "";
        layout.forEach((item) => {
          board.appendChild(createFrame(item));
        });
      }

      function fitBoard() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / CANVAS_W, vh / CANVAS_H) * 0.94;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fitBoard();
      window.addEventListener("resize", fitBoard);
    })();
  </script>
</body>
</html>
