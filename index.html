<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Story8 frame check</title>

<style>

body{
margin:0;
background:#e8e3d7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.wall{

width:95vw;
max-width:1100px;
aspect-ratio:8/5;

background:#d2cdc4;
border-radius:20px;

position:relative;

}

/* フレーム共通 */

.frame{
position:absolute;
background-size:100% 100%;
background-repeat:no-repeat;
background-position:center;
}

/* 比率固定 */

.portrait{aspect-ratio:894/1063;background-image:url(frame_vertical.png);}
.square{aspect-ratio:1053/1052;background-image:url(frame_square.png);}
.landscape{aspect-ratio:1063/894;background-image:url(frame_horizontal.png);}

</style>
</head>

<body>

<div class="wall" id="wall"></div>

<script>

const GRID_W = 240
const GRID_H = 150

const frames = [

{type:"portrait",x:4,y:51,w:31},
{type:"square",x:43,y:31,w:39},
{type:"portrait",x:91,y:10,w:47},
{type:"landscape",x:146,y:40,w:33},
{type:"landscape",x:186,y:48,w:45},
{type:"landscape",x:40,y:75,w:42},
{type:"square",x:93,y:74,w:42},
{type:"portrait",x:147,y:76,w:29},

]

const ratios={
portrait:894/1063,
square:1053/1052,
landscape:1063/894
}

const wall=document.getElementById("wall")

frames.forEach(f=>{

const el=document.createElement("div")
el.className="frame "+f.type

const x=f.x/GRID_W
const y=f.y/GRID_H
const w=f.w/GRID_W
const h=w/ratios[f.type]

el.style.left=(x*100)+"%"
el.style.top=(y*100)+"%"
el.style.width=(w*100)+"%"
el.style.height=(h*100)+"%"

wall.appendChild(el)

})

</script>

</body>
</html>
