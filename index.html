<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>KABEPIC Story8 Measured PNG Spec</title>
  <style>
    :root {
      --canvas-w: 2400;
      --canvas-h: 1500;
      --cell: 10px;
      --page-bg: #1f1f1f;
      --board-bg: #ffffff;
      --grid-line: rgba(0, 0, 0, 0.11);
      --grid-line-bold: rgba(0, 0, 0, 0.20);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      --label-bg: rgba(35, 35, 35, 0.85);
      --label-fg: #fff;
      --hole-stroke: rgba(70, 70, 70, 0.42);
      --hole-fill: rgba(255,255,255,0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--page-bg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    #boardWrap {
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    #board {
      position: relative;
      width: calc(var(--canvas-w) * 1px);
      height: calc(var(--canvas-h) * 1px);
      background:
        linear-gradient(to right, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to bottom, transparent 0, transparent 49px, var(--grid-line-bold) 50px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-color: var(--board-bg);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .frame {
      position: absolute;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center center;
    }

    .hole {
      position: absolute;
      border: 2px solid var(--hole-stroke);
      background: var(--hole-fill);
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translateX(-50%);
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--label-bg);
      color: var(--label-fg);
      font-size: 20px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      color: #111;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      font-size: 13px;
      line-height: 1.55;
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Story8 / PNG実測値版</strong>
    縦: 31×37 / 横: 37×31 / 正方形: N×N / 楕円: 26×37<br>
    inset は Claude 実測% を使用
  </div>

  <div id="app">
    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CANVAS_W = 2400;
      const CANVAS_H = 1500;
      const CELL = 10;

      const boardWrap = document.getElementById("boardWrap");
      const board = document.getElementById("board");

      /*
        PNG実測値ベース
        - 縦   31 x 37
        - 横   37 x 31
        - 正方形 N x N
        - 楕円 26 x 37
      */
      const SHAPES = {
        vertical: {
          asset: "frame_vertical.png",
          w: 31,
          h: 37,
          insetPct: { t: 15.1, r: 17.8, b: 14.8, l: 19.2 }
        },
        square: {
          asset: "frame_square.png",
          w: 34,
          h: 34,
          insetPct: { t: 18.4, r: 19.2, b: 19.5, l: 18.6 }
        },
        horizontal: {
          asset: "frame_horizontal.png",
          w: 37,
          h: 31,
          insetPct: { t: 17.8, r: 14.8, b: 19.2, l: 15.1 }
        },
        oval: {
          asset: "frame_oval.png",
          w: 26,
          h: 37,
          insetPct: { t: 15.1, r: 17.8, b: 14.8, l: 19.2 }
        }
      };

      /*
        Story8 配置
        位置は今までの比較結果から調整済み
        scale は「同じ実測比率のまま大小だけ変える」
      */
      const FRAMES = [
        { id: 1, kind: "vertical",   x: 4,   y: 51, scale: 1.00 },
        { id: 2, kind: "square",     x: 43,  y: 30, scale: 1.00 },
        { id: 3, kind: "vertical",   x: 91,  y: 6,  scale: 1.45 },
        { id: 4, kind: "horizontal", x: 146, y: 42, scale: 0.76 },
        { id: 5, kind: "horizontal", x: 191, y: 46, scale: 1.02 },
        { id: 6, kind: "horizontal", x: 40,  y: 75, scale: 1.06 },
        { id: 7, kind: "square",     x: 93,  y: 75, scale: 1.12 },
        { id: 8, kind: "vertical",   x: 147, y: 74, scale: 1.00 }
      ];

      function px(v) {
        return `${v}px`;
      }

      function createFrame(frame) {
        const spec = SHAPES[frame.kind];

        const wCells = Math.round(spec.w * frame.scale);
        const hCells = Math.round(spec.h * frame.scale);

        const wPx = wCells * CELL;
        const hPx = hCells * CELL;

        const el = document.createElement("div");
        el.className = "frame";
        el.style.left = px(frame.x * CELL);
        el.style.top = px(frame.y * CELL);
        el.style.width = px(wPx);
        el.style.height = px(hPx);
        el.style.backgroundImage = `url("${spec.asset}")`;

        const hole = document.createElement("div");
        hole.className = "hole";
        hole.style.left = `${spec.insetPct.l}%`;
        hole.style.top = `${spec.insetPct.t}%`;
        hole.style.width = `${100 - spec.insetPct.l - spec.insetPct.r}%`;
        hole.style.height = `${100 - spec.insetPct.t - spec.insetPct.b}%`;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = String(frame.id);

        el.appendChild(hole);
        el.appendChild(label);
        return el;
      }

      function render() {
        board.innerHTML = "";
        FRAMES.forEach((frame) => {
          board.appendChild(createFrame(frame));
        });
      }

      function fitBoard() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / CANVAS_W, vh / CANVAS_H) * 0.94;
        boardWrap.style.transform = `scale(${scale})`;
      }

      render();
      fitBoard();
      window.addEventListener("resize", fitBoard);
    })();
  </script>
</body>
</html>
