<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KABEPIC frame check</title>

<style>
html,body{
margin:0;
background:#ece6da;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-family:sans-serif;
}

.wall{
position:relative;
width:2400px;
height:1500px;
background:#d8d3ca;
border-radius:30px;
}

.frame{
position:absolute;
background-size:100% 100%;
background-repeat:no-repeat;
background-position:center;
}
</style>
</head>

<body>

<div id="wall" class="wall"></div>

<script>

const RATIO={
portrait:894/1063,
square:1053/1052,
landscape:1063/894,
oval:694/982
}

const frames=[

{kind:"portrait",src:"frame_vertical.png",x:80,y:520,w:360},

{kind:"square",src:"frame_square.png",x:520,y:320,w:420},

{kind:"portrait",src:"frame_vertical.png",x:980,y:40,w:500},

{kind:"landscape",src:"frame_horizontal.png",x:1500,y:430,w:360},

{kind:"landscape",src:"frame_horizontal.png",x:1910,y:440,w:500},

{kind:"landscape",src:"frame_horizontal.png",x:460,y:900,w:480},

{kind:"square",src:"frame_square.png",x:1020,y:860,w:430},

{kind:"portrait",src:"frame_vertical.png",x:1560,y:830,w:360}

]

const wall=document.getElementById("wall")

frames.forEach(f=>{

const h=f.w/RATIO[f.kind]

const el=document.createElement("div")

el.className="frame"

el.style.left=f.x+"px"
el.style.top=f.y+"px"
el.style.width=f.w+"px"
el.style.height=h+"px"

el.style.backgroundImage=`url(${f.src})`

wall.appendChild(el)

})

</script>

</body>
</html>
