<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<title>KABEPIC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{color:#2a2520;font-family:"DM Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;background:#f7f4ef;-webkit-font-smoothing:antialiased}
button{border:0;background:none;color:inherit;cursor:pointer;font:inherit;-webkit-user-select:none;user-select:none}
img{display:block;max-width:100%;-webkit-user-drag:none;user-select:none}
input[type=file]{display:none}
.hid{display:none!important}
#app{position:fixed;inset:0;background:#f7f4ef}
#editBar{position:fixed;bottom:72px;left:10px;right:10px;z-index:8000;display:flex;align-items:center;justify-content:center;gap:10px;height:44px;padding:0 10px;border-radius:20px;background:rgba(255,253,249,.97);border:1px solid rgba(130,118,96,.10);box-shadow:0 6px 20px rgba(50,40,20,.07);transform:translateY(200px);pointer-events:none;opacity:0;transition:transform .15s ease,opacity .15s ease}
#editBar.vis{transform:translateY(0);pointer-events:auto;opacity:1}
.ebb{height:34px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;color:#b5a898;background:#fffdf9;border:1px solid rgba(130,118,96,.10);white-space:nowrap;transition:transform 80ms,background 80ms}
.ebb:active{transform:scale(.93);background:rgba(0,0,0,.04)}
.ebb.dis{opacity:.22;pointer-events:none}
.ebb.enb{color:#3a3530;border-color:rgba(130,118,96,.22);background:#fff}
.ebd{height:34px;padding:0 16px;border-radius:999px;background:#4a6a8a;color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;transition:transform 80ms,background 80ms}
.ebd:active{transform:scale(.93);background:#3a5a7a}
#cvArea{position:absolute;top:0;left:0;right:0;bottom:72px;z-index:1;overflow:hidden;touch-action:manipulation}
body.em #cvArea{bottom:124px}
body.dm #cvArea{top:0;bottom:0}
#cvScale{position:absolute;top:0;left:0;width:2400px;height:1500px;transform-origin:top left}
#cv{position:relative;width:2400px;height:1500px;background:#f3eee6;overflow:hidden;touch-action:none;border-radius:3px;border:1px solid rgba(130,118,96,.08)}
body.dm #cv{border-color:rgba(0,0,0,.06);border-radius:0}
.fr{position:absolute;overflow:visible;touch-action:none;pointer-events:none;z-index:1;user-select:none;transition:left .12s,top .12s,width .12s,height .12s}
.fr.ed{pointer-events:auto;cursor:grab}.fr.ed:active{cursor:grabbing}
.fr.dg,.fr.rz{transition:none;z-index:80!important}
.fr-ring{position:absolute;inset:-10px;border-radius:20px;border:5px solid transparent;opacity:0;pointer-events:none;z-index:1}
.fr.sel .fr-ring{opacity:1;border-color:#7a9ab4;box-shadow:0 0 0 3px rgba(122,154,180,.14)}
.fr.dg .fr-ring,.fr.rz .fr-ring{opacity:1;border-color:#6d90aa;box-shadow:0 0 0 5px rgba(122,154,180,.2)}
.fr.sel{z-index:150!important;filter:drop-shadow(0 10px 18px rgba(40,30,16,.12))}
.pw{position:absolute;inset:0;overflow:hidden}
.pm{position:absolute;overflow:visible;background:transparent}
.pm img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.pm img.cf{position:absolute;inset:0;transition:opacity 1.4s ease-in-out}
.fov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
.rh{position:absolute;right:-26px;bottom:-26px;width:56px;height:56px;border-radius:50%;background:#fff;border:3px solid #7a9ab4;box-shadow:0 4px 14px rgba(40,30,16,.16);z-index:200;touch-action:none;display:none;pointer-events:auto}
.fr.sel .rh{display:block}
body:not(.em) .fr.sel .rh{display:none}
.fr-n{position:absolute;top:-10px;left:-10px;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;background:#2a2520;color:#fff;font-size:10px;font-weight:600;box-shadow:0 3px 8px rgba(0,0,0,.14);z-index:7;pointer-events:none}
.fr.sel .fr-n{background:#4a6a8a}
body.em .fr-n{display:flex}
.fr-p{position:absolute;top:-7px;right:-7px;height:18px;padding:0 7px;border-radius:999px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);color:#87796a;font-size:9px;font-weight:600;display:none;align-items:center;z-index:7}
.fr.lk .fr-p{display:inline-flex}
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:9000;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:6px 10px 8px;background:rgba(255,253,249,.97);border-top:1px solid rgba(130,118,96,.10);box-shadow:0 -4px 20px rgba(50,40,20,.06)}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:52px;border-radius:14px;font-size:10px;font-weight:500;letter-spacing:.04em;color:#87796a;border:1px solid transparent}
.nb:active{transform:scale(.96)}
.nb .ni{font-size:17px;line-height:1}
.nb.on{background:rgba(74,106,138,.07);color:#4a6a8a;border-color:rgba(74,106,138,.06)}
body.dm .bnav,body.dm .sht,body.dm #editBar{display:none!important}
body.crop-on .bnav,body.crop-on .sht,body.crop-on #editBar{display:none!important}
.sht{position:fixed;left:8px;right:8px;bottom:72px;z-index:3250;background:rgba(255,253,249,.97);border:1px solid rgba(130,118,96,.10);box-shadow:0 -6px 32px rgba(50,40,20,.08);border-radius:20px;max-height:50vh;overflow:hidden;display:none}
body.em .sht.opn{bottom:122px}
.sht.opn{display:block}
.shd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid rgba(130,118,96,.10)}
.sht-t{font-size:13px;font-weight:600}.sht-s{font-size:11px;color:#87796a;margin-top:1px}
.sha{display:flex;gap:5px;align-items:center}
.shb{padding:10px 12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(50vh - 56px)}
.pl{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 12px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid rgba(130,118,96,.10);background:#fffdf9;color:#2a2520}
.pl:active{transform:scale(.97);opacity:.85}
.pl.ac{background:#4a6a8a;color:#fff;border-color:transparent}
.pl.gh{background:transparent;border-color:transparent;color:#87796a}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.pc{position:relative;aspect-ratio:1;overflow:hidden;border-radius:8px;cursor:pointer;background:#f3eee6}
.pc img{width:100%;height:100%;object-fit:cover}
.pc .dx{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;font-size:9px;color:#b04e46;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.pc.fx{outline:2px solid #4a6a8a;outline-offset:-2px}
.pc .ft{position:absolute;left:3px;bottom:3px;background:rgba(42,37,32,.75);color:#fff;font-size:9px;border-radius:999px;padding:1px 7px}
.pem{text-align:center;color:#b5a898;font-size:12px;padding:24px 0}
.ml{display:grid;gap:5px}
.mi{min-height:44px;padding:0 12px;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:500;font-size:12px;border:1px solid rgba(130,118,96,.10);background:#fffdf9}
.mi:active{transform:scale(.99)}
.mi.on{background:rgba(74,106,138,.07);color:#4a6a8a;border-color:rgba(74,106,138,.1)}
.mi.dis{opacity:.32;pointer-events:none}
.mir{font-size:11px;color:#87796a;font-weight:400}
.mi.on .mir{color:#4a6a8a}
.sl{font-size:9px;font-weight:600;color:#b5a898;letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sc{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 4px 8px;border-radius:14px;border:1.5px solid rgba(130,118,96,.10);background:#fffdf9;cursor:pointer}
.sc:active{transform:scale(.95)}
.si{border:1.5px solid #2a2520;border-radius:2px}
.si.sq{width:28px;height:28px}.si.ls{width:34px;height:24px}.si.pt{width:22px;height:32px}.si.ov{width:26px;height:34px;border-radius:50%}
.sll{font-size:9px;font-weight:500;color:#87796a}
.sc.se{border-color:#4a6a8a;background:rgba(74,106,138,.07)}.sc.se .si{border-color:#4a6a8a}.sc.se .sll{color:#4a6a8a}
.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.dc{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px 10px;border-radius:14px;border:1.5px solid rgba(130,118,96,.10);background:#fffdf9;cursor:pointer}
.dc:active{transform:scale(.97)}
.dp{width:48px;height:48px;display:flex;align-items:center;justify-content:center}.dp img{max-width:100%;max-height:100%;object-fit:contain}
.dl{font-size:10px;font-weight:500;color:#87796a}
.sb{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;color:#87796a;cursor:pointer;padding:3px 0;margin-bottom:6px}
.sb:active{color:#2a2520}
#chgA{margin-top:6px}
.ca-on #addA,.ca-on #pinB,.ca-on #delB{opacity:.25;pointer-events:none}
.vw{position:fixed;inset:0;z-index:4000;background:rgba(42,37,32,.82);display:none;align-items:center;justify-content:center;padding:20px}
.vw.opn{display:flex}
.vw img{max-width:100%;max-height:100%;object-fit:contain;border-radius:14px;box-shadow:0 14px 36px rgba(0,0,0,.28)}
.vwx{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.1);font-size:15px;display:flex;align-items:center;justify-content:center}
#dHint{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:4200;padding:7px 14px;border-radius:999px;background:rgba(42,37,32,.72);color:#fff;font-size:11px;font-weight:500;opacity:0;transition:opacity .18s;pointer-events:none}
#bgPk{position:fixed;bottom:0;left:0;right:0;z-index:4100;display:none;flex-direction:column;align-items:center;gap:10px;padding:14px 16px 20px;background:rgba(42,37,32,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .25s ease,opacity .2s ease;opacity:0}
body.dm #bgPk.vis{display:flex;transform:translateY(0);opacity:1}
#bgPk .bp-row{display:flex;align-items:center;gap:10px}
.bp-sw{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.2);cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0}
.bp-sw:active{transform:scale(.9)}
.bp-sw.on{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.35)}
#bgSlider{-webkit-appearance:none;appearance:none;width:min(220px,55vw);height:6px;border-radius:999px;background:linear-gradient(to right,#1a1a1a,#ffffff);outline:none;cursor:pointer}
#bgSlider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.15);box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
#bgSlider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.15);box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
.bp-lbl{font-size:10px;color:rgba(255,255,255,.55);font-weight:500;letter-spacing:.05em}
#bgBack{position:fixed;top:14px;left:14px;z-index:4100;width:42px;height:42px;border-radius:50%;background:rgba(42,37,32,.55);color:#fff;border:1px solid rgba(255,255,255,.18);font-size:18px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;transition:opacity .18s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
body.dm #bgBack.vis{display:flex}
/* Photo shortage hint */
#pShort{display:none;margin:8px 0 4px;padding:0 2px;font-size:10px;color:#9a8f80;font-weight:400}
#pShort.vis{display:block}
/* Crop Adjustment Screen */
#cropScr{position:fixed;inset:0;z-index:6000;background:#1a1917;display:none;flex-direction:column}
#cropScr.opn{display:flex}
#cropHead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;flex-shrink:0}
#cropHead .ch-t{font-size:13px;font-weight:600;color:#fff}
.ch-btn{height:32px;padding:0 14px;border-radius:999px;font-size:11px;font-weight:600;display:inline-flex;align-items:center}
.ch-cancel{color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.ch-cancel:active{background:rgba(255,255,255,.08)}
.ch-save{background:#4a6a8a;color:#fff;margin-left:6px}
.ch-save:active{background:#3a5a7a}
#cropPreview{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-touch-callout:none}
#cropImg{position:absolute;touch-action:none;user-select:none;-webkit-user-drag:none;max-width:none!important;-webkit-touch-callout:none;pointer-events:none}
#cropFrame{position:absolute;border:none;pointer-events:none;z-index:2}
#cropDim{position:absolute;inset:0;z-index:1;pointer-events:none}
#cropTabs{display:flex;justify-content:center;gap:6px;padding:10px 14px 16px;flex-shrink:0}
.ct-btn{height:34px;padding:0 16px;border-radius:999px;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);background:transparent;transition:background .1s,color .1s}
.ct-btn:active{transform:scale(.96)}
.ct-btn.on{background:#4a6a8a;color:#fff;border-color:transparent}
#tst{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-5px);z-index:10000;max-width:min(88vw,360px);padding:7px 14px;border-radius:999px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);box-shadow:0 6px 20px rgba(50,40,20,.07);text-align:center;font-size:11px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .1s,transform .1s}
#tst.sh{opacity:1;transform:translateX(-50%) translateY(0)}
#pgO{position:fixed;inset:0;z-index:5500;background:rgba(42,37,32,.22);display:none;align-items:center;justify-content:center;padding:20px}
#pgO.opn{display:flex}
.pgc{width:min(86vw,300px);padding:18px;border-radius:20px;background:#fffdf9;border:1px solid rgba(130,118,96,.10);box-shadow:0 12px 36px rgba(50,40,20,.09)}
.pgc-t{font-size:13px;font-weight:600;margin-bottom:6px}
.pgc-m{color:#87796a;font-size:11px;margin-bottom:8px}
.pgb{height:5px;border-radius:999px;background:rgba(0,0,0,.05);overflow:hidden}
.pgf{height:100%;width:0%;background:#4a6a8a;border-radius:999px;transition:width .12s}
</style>
</head>
<body>
<div id="editBar">
  <button id="ebU" class="ebb dis" data-t="undo"></button>
  <button id="ebR" class="ebb dis" data-t="redo"></button>
  <button id="ebD" class="ebd" data-t="editDone"></button>
</div>
<div id="app">
  <input id="fIn" type="file" accept="image/*" multiple>
  <div id="cvArea"><div id="cvScale"><div id="cv"></div></div></div>
  <div class="bnav">
    <button id="nP" class="nb"><span class="ni">◻</span><span data-t="navPhoto"></span></button>
    <button id="nF" class="nb"><span class="ni">▦</span><span data-t="navFrames"></span></button>
    <button id="nE" class="nb"><span class="ni">✎</span><span data-t="navEdit"></span></button>
    <button id="nD" class="nb"><span class="ni">▶</span><span data-t="navDisplay"></span></button>
  </div>
  <div id="shP" class="sht"><div class="shd"><div><div class="sht-t" data-t="photoList"></div><div id="shPm" class="sht-s"></div></div><div class="sha"><button id="addP" class="pl ac" data-t="add"></button><button id="clP" class="pl gh" data-t="close"></button></div></div><div class="shb"><div id="pShort"><span id="pShortMsg"></span></div><div id="pGr" class="pg"></div><div id="pEm" class="pem" data-t="photoEmpty"></div></div></div>
  <div id="shF" class="sht"><div class="shd"><div class="sht-t" data-t="navFrames"></div><button id="clF" class="pl gh" data-t="close"></button></div><div class="shb"><div id="fLst" class="ml"></div></div></div>
  <div id="shE" class="sht"><div class="shd"><div class="sht-t" data-t="navEdit"></div><button id="clE" class="pl gh" data-t="close"></button></div><div class="shb" id="shEb"><div class="sl" data-t="addFrame"></div><div id="addA"><div id="aS1"><div class="sg"><button class="sc" data-s="square"><div class="si sq"></div><div class="sll" data-t="square"></div></button><button class="sc" data-s="landscape"><div class="si ls"></div><div class="sll" data-t="landscape"></div></button><button class="sc" data-s="portrait"><div class="si pt"></div><div class="sll" data-t="portrait"></div></button><button class="sc" data-s="oval"><div class="si ov"></div><div class="sll" data-t="oval"></div></button></div></div><div id="aS2" class="hid"><button id="aBk" class="sb" data-t="backShape"></button><div id="aDg" class="dg"></div></div></div><div class="sl" data-t="selectedFrame"></div><div class="ml"><button id="chgB" class="mi dis"><span data-t="changeFrame"></span><span id="chgR" class="mir" data-t="notSelected"></span></button><div id="chgA" class="hid"><div id="cS1"><div class="sg" id="cSg"></div></div><div id="cS2" class="hid"><button id="cBk" class="sb" data-t="backShape"></button><div id="cDg" class="dg"></div></div></div><button id="pinB" class="mi dis"><span id="pinT" data-t="pinPhoto"></span><span id="pinS" class="mir" data-t="notSelected"></span></button><button id="delB" class="mi dis"><span style="color:#b04e46" data-t="delete"></span><span class="mir"></span></button></div></div></div>
  <div id="vw" class="vw"><button id="vwC" class="vwx">&times;</button><img id="vwI" alt=""></div>
  <div id="dHint"></div>
  <div id="bgBack">&larr;</div>
  <div id="bgPk">
    <div class="bp-row" id="bgSwatches"></div>
    <div class="bp-row"><span class="bp-lbl" data-t="brightness"></span><input type="range" id="bgSlider" min="-10" max="10" value="0" step="1"><span class="bp-lbl" id="bgSlVal">0%</span></div>
  </div>
  <div id="cropScr">
    <div id="cropHead"><button id="cropCancel" class="ch-btn ch-cancel" data-t="cropCancel"></button><div class="ch-t" data-t="cropTitle"></div><button id="cropSave" class="ch-btn ch-save" data-t="cropSave"></button></div>
    <div id="cropPreview"><div id="cropDim"></div><div id="cropFrame"></div><img id="cropImg" alt=""></div>
    <div id="cropTabs"><button class="ct-btn" data-ct="portrait" data-t="portrait"></button><button class="ct-btn" data-ct="square" data-t="square"></button><button class="ct-btn" data-ct="landscape" data-t="landscape"></button></div>
  </div>
  <div id="tst"></div>
  <div id="pgO"><div class="pgc"><div class="pgc-t" data-t="addingPhotos"></div><div id="pgM" class="pgc-m"></div><div class="pgb"><div id="pgF" class="pgf"></div></div></div></div>
</div>
<script>
(function(){
"use strict";

/* ===== i18n DICTIONARY ===== */
var TEXT={
ja:{
undo:"\u21B6 \u623B\u3059",redo:"\u21B7 \u3084\u308A\u76F4\u3059",editDone:"\u7DE8\u96C6\u7D42\u4E86",
photoList:"\u5199\u771F\u4E00\u89A7",add:"\u8FFD\u52A0",close:"\u9589\u3058\u308B",
photoEmpty:"\u5199\u771F\u3092\u8FFD\u52A0\u3057\u3066\u58C1\u306B\u98FE\u308A\u307E\u3057\u3087\u3046",
addFrame:"\u30D5\u30EC\u30FC\u30E0\u8FFD\u52A0",square:"\u6B63\u65B9\u5F62",landscape:"\u6A2A",portrait:"\u7E26",oval:"\u6955\u5186",
backShape:"\u2190 \u5F62\u3092\u9078\u3073\u76F4\u3059",selectedFrame:"\u9078\u629E\u4E2D\u30D5\u30EC\u30FC\u30E0",
changeFrame:"\u30D5\u30EC\u30FC\u30E0\u5909\u66F4",notSelected:"\u672A\u9078\u629E",
pinPhoto:"\u5199\u771F\u56FA\u5B9A",unpinPhoto:"\u56FA\u5B9A\u89E3\u9664",delete:"\u524A\u9664",
addingPhotos:"\u5199\u771F\u3092\u8FFD\u52A0\u4E2D",

/* ===== Crossfade ===== */
/* Strict no-duplicate: only pick photos not shown in ANY other frame */
function nextP(f){
var pool=getPriorityPool(f.kind);
if(pool.length<2)return null;
var c=curP(f);
var othersShowing={};
fs.forEach(function(of){if(of.id!==f.id&&of.cp)othersShowing[of.cp]=true});
/* Exclude current photo AND photos shown in other frames — no fallback */
var candidates=pool.filter(function(p){return(!c||p.id!==c.id)&&!othersShowing[p.id]});
if(!candidates.length)return null;
return candidates[Math.floor(Math.random()*candidates.length)];
}
function startCF(){
stopCF();
if(rp().length<2)return;
fs.forEach(function(f){
if(f.fp)return;
var interval=SW0+Math.random()*(SW1-SW0);
var initialDelay=Math.random()*interval;
var timerId=setTimeout(function(){
doFade(f);
var repeater=setInterval(function(){doFade(f)},interval);
dt.push(repeater);
},initialDelay);
dt.push(timerId);
});
}
function doFade(f){
var n=nextP(f);
if(!n)return;
var el=$("cv").querySelector('[data-id="'+f.id+'"]');
if(!el)return;
var imgs=el.querySelectorAll(".pm img.cf");
if(imgs.length<2)return;
var currentSlot=cfSlots[f.id]||0;
var nextSlot=1-currentSlot;
var preload=new Image();
preload.onload=function(){
imgs[nextSlot].src=n.dataUrl;
imgs[nextSlot].style.objectPosition=getCropPos(n,f.kind);
void imgs[nextSlot].offsetWidth;
requestAnimationFrame(function(){
imgs[nextSlot].style.opacity="1";
imgs[currentSlot].style.opacity="0";
});
cfSlots[f.id]=nextSlot;
f.cp=n.id;
};
preload.src=n.dataUrl;
}
function stopCF(){dt.forEach(function(t){clearInterval(t);clearTimeout(t)});dt=[]}

function hexToRgb(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b]}
function rgbToHex(r,g,b){return"#"+[r,g,b].map(function(x){var s=Math.max(0,Math.min(255,Math.round(x))).toString(16);return s.length<2?"0"+s:s}).join("")}
function adjustBrightness(hex,pct){
var rgb=hexToRgb(hex);
var r=rgb[0],g=rgb[1],b=rgb[2];
if(pct>0){r+=(255-r)*pct/100;g+=(255-g)*pct/100;b+=(255-b)*pct/100}
else{r+=r*pct/100;g+=g*pct/100;b+=b*pct/100}
return rgbToHex(r,g,b);
}

function loadCropFromTemp(){

function storeCropToTemp(){

function saveAllCrops(){

storeCropToTemp();
var pid=cropPhoto.id;
for(var i=0;i<ps.length;i++){
if(ps[i].id===pid){
if(!ps[i].crop)ps[i].crop={portrait:null,landscape:null,square:null};
ps[i].crop.portrait=cropTemp.portrait?{x:cropTemp.portrait.x,y:cropTemp.portrait.y}:null;

function renderCrop(){
if(!cropPhoto)return;
document.querySelectorAll("#cropTabs .ct-btn").forEach(function(b){
b.classList.toggle("on",b.getAttribute("data-ct")===cropOrient);
});
var prev=$("cropPreview");
var pw=prev.clientWidth,ph=prev.clientHeight;
if(!pw||!ph){requestAnimationFrame(renderCrop);return}
var imgAR=cropPhoto.width/cropPhoto.height;
var frameAR=CROP_AR[cropOrient];
var iw,ih;
if(imgAR>pw/ph){iw=pw;ih=pw/imgAR}else{ih=ph;iw=ih*imgAR}
var il=(pw-iw)/2,it=(ph-ih)/2;
var img=$("cropImg");
img.src=cropPhoto.dataUrl;
img.style.width=iw+"px";img.style.height=ih+"px";
img.style.left=il+"px";img.style.top=it+"px";
var fw,fh;
if(frameAR>imgAR){fw=iw;fh=fw/frameAR}else{fh=ih;fw=fh*frameAR}
var halfFW=fw/2,halfFH=fh/2;
var cx=il+cropTempX*iw;
var cy=it+cropTempY*ih;
var minCx=il+halfFW,maxCx=il+iw-halfFW;
var minCy=it+halfFH,maxCy=it+ih-halfFH;
cx=Math.max(minCx,Math.min(maxCx,cx));
cy=Math.max(minCy,Math.min(maxCy,cy));
var fl=cx-halfFW,ft=cy-halfFH;
var frame=$("cropFrame");
frame.style.left=fl+"px";frame.style.top=ft+"px";
frame.style.width=fw+"px";frame.style.height=fh+"px";
var dim=$("cropDim");
dim.style.cssText="position:absolute;inset:0;z-index:1;pointer-events:none;"+
"background:rgba(0,0,0,.65);"+
"clip-path:polygon(0 0,100% 0,100% 100%,0 100%,0 0,"+
fl+"px "+ft+"px,"+fl+"px "+(ft+fh)+"px,"+(fl+fw)+"px "+(ft+fh)+"px,"+(fl+fw)+"px "+ft+"px,"+fl+"px "+ft+"px)";
}
function clampCrop(){
cropTempX=Math.max(0,Math.min(1,cropTempX));
cropTempY=Math.max(0,Math.min(1,cropTempY));
}
function bindCropDrag(){
var prev=$("cropPreview");
prev.addEventListener("contextmenu",function(e){e.preventDefault()});
prev.addEventListener("pointerdown",function(e){
if(!cropPhoto)return;
cropDragging=true;cropSX=e.clientX;cropSY=e.clientY;
cropOX=cropTempX;cropOY=cropTempY;
prev.setPointerCapture(e.pointerId);
});
prev.addEventListener("pointermove",function(e){
if(!cropDragging||!cropPhoto)return;
var pw=prev.clientWidth,ph=prev.clientHeight;
var imgAR=cropPhoto.width/cropPhoto.height;
var iw,ih;
if(imgAR>pw/ph){iw=pw;ih=pw/imgAR}else{ih=ph;iw=ih*imgAR}
var dx=e.clientX-cropSX;
var dy=e.clientY-cropSY;
cropTempX=cropOX+dx/iw;
cropTempY=cropOY+dy/ih;
clampCrop();
cropDirty=true;
renderCrop();
});
prev.addEventListener("pointerup",function(){cropDragging=false});
prev.addEventListener("pointercancel",function(){cropDragging=false});
}
