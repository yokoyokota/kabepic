<!DOCTYPE html>

<html>
<head><meta charset="utf-8"><title>Read Save</title></head>
<body>
<h2>保存データ読み取り</h2>
<p>コード: <input id="code" value="826050"><button onclick="read()">読込</button></p>
<pre id="out"></pre>
<script>
function read() {
  const code = document.getElementById('code').value;
  const key = 'kabepic_code_v12_' + code;
  const raw = localStorage.getItem(key);
  if (!raw) { document.getElementById('out').textContent = 'データなし'; return; }
  const d = JSON.parse(raw);
  let text = 'frames:\n';
  d.frames.forEach((f, i) => {
    text += `  #${i+1} ${f.kind}  gx=${f.gx?.toFixed(2)}  gy=${f.gy?.toFixed(2)}  w=${f.w?.toFixed(2)}  bottomAlign=${f.bottomAlign}\n`;
  });
  document.getElementById('out').textContent = text;
}
</script>
</body>
</html>
