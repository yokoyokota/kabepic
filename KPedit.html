<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>KABEPIC - KPedit</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-border: rgba(0, 0, 0, 0.08);
      --text: #1e1e1e;
      --muted: #666;
      --accent: #1d4ed8;
      --accent-soft: rgba(29, 78, 216, 0.12);
      --danger: #b91c1c;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --toolbar-h: 116px;
      --handle-size: 28px;
      --frame-outline: rgba(29, 78, 216, 0.8);
      --frame-selected-shadow: 0 0 0 2px rgba(29, 78, 216, 0.25), 0 12px 28px rgba(0, 0, 0, 0.16);
      --wall-padding: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        Arial,
        sans-serif;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 34%),
        linear-gradient(180deg, #f5f1e7 0%, #efe8da 100%);
    }

    .topbar {
      position: absolute;
      left: 12px;
      right: 12px;
      top: calc(var(--safe-top) + 10px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .topbar-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: auto;
    }

    .chip-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .brand {
      padding: 10px 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      font-size: 18px;
    }

    .btn,
    .seg-btn,
    .icon-btn {
      appearance: none;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      touch-action: manipulation;
    }

    .btn:active,
    .seg-btn:active,
    .icon-btn:active {
      transform: scale(0.98);
    }

    .btn.primary,
    .seg-btn.active,
    .icon-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(29, 78, 216, 0.26);
    }

    .btn.ghost {
      background: rgba(255,255,255,0.78);
    }

    .btn.warn {
      color: var(--danger);
    }

    .toolbar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(var(--safe-bottom) + 10px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      pointer-events: auto;
    }

    .toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar-row.scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
      padding-bottom: 2px;
    }

    .toolbar-row.scroll::-webkit-scrollbar {
      display: none;
    }

    .toolbar-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.04em;
      padding: 0 4px;
    }

    .file-label {
      position: relative;
      overflow: hidden;
    }

    .file-label input {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
    }

    .workspace {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }

    .wall {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      overflow: hidden;
    }

    .wall-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .wall.show-grid .wall-grid {
      opacity: 1;
    }

    .frames-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }

    .frame {
      position: absolute;
      user-select: none;
      touch-action: none;
      transform-origin: center center;
      transition:
        box-shadow 0.18s ease,
        transform 0.18s ease,
        outline-color 0.18s ease;
    }

    .frame[data-selected="true"] {
      z-index: 50 !important;
    }

    .frame-inner {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      background: rgba(255,255,255,0.56);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.08),
        0 1px 0 rgba(255,255,255,0.8) inset;
      border: 1px solid rgba(0,0,0,0.07);
    }

    .frame.selected .frame-inner {
      box-shadow: var(--frame-selected-shadow);
      outline: 2px solid var(--frame-outline);
      outline-offset: 4px;
    }

    .frame-photo-window {
      position: absolute;
      overflow: hidden;
      background: rgba(255,255,255,0.98);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.05) inset,
        0 8px 12px rgba(0,0,0,0.06) inset;
    }

    .frame.window-v .frame-photo-window {
      inset: 9% 10%;
      border-radius: 6px;
    }

    .frame.window-h .frame-photo-window {
      inset: 10% 8%;
      border-radius: 6px;
    }

    .frame.window-s .frame-photo-window {
      inset: 9%;
      border-radius: 6px;
    }

    .frame.window-o .frame-photo-window {
      inset: 11% 10%;
      border-radius: 999px;
      -webkit-mask-image: radial-gradient(circle at center, #000 67%, transparent 68%);
      mask-image: radial-gradient(circle at center, #000 67%, transparent 68%);
    }

    .frame-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-position: 50% 50%;
      background: #f0ece4;
      display: block;
      pointer-events: none;
    }

    .frame-photo.cover {
      object-fit: cover;
    }

    .frame-photo.contain {
      object-fit: contain;
      background:
        linear-gradient(180deg, rgba(250,248,243,0.96), rgba(245,241,232,0.96));
    }

    .frame-overlay-img,
    .frame-overlay-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
    }

    .frame-overlay-img {
      object-fit: fill;
      z-index: 2;
    }

    .frame-overlay-img.is-hidden {
      display: none;
    }

    .frame-overlay-fallback {
      z-index: 1;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.92), rgba(234,226,214,0.94));
      border: 10px solid rgba(132, 102, 70, 0.34);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.55),
        inset 0 12px 18px rgba(255,255,255,0.24),
        inset 0 -16px 24px rgba(0,0,0,0.08);
    }

    .frame[data-shape="oval"] .frame-overlay-fallback {
      border-radius: 999px;
    }

    .frame[data-shape="vertical"] .frame-overlay-fallback,
    .frame[data-shape="horizontal"] .frame-overlay-fallback,
    .frame[data-shape="square"] .frame-overlay-fallback {
      border-radius: 8px;
    }

    .frame-badge {
      position: absolute;
      top: -10px;
      left: -10px;
      z-index: 6;
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.88);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    .frame-lock {
      position: absolute;
      top: -10px;
      right: -10px;
      z-index: 6;
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
      pointer-events: none;
    }

    .frame[data-locked="true"] .frame-lock {
      display: flex;
    }

    .resize-handle {
      position: absolute;
      right: calc(var(--handle-size) * -0.28);
      bottom: calc(var(--handle-size) * -0.28);
      width: var(--handle-size);
      height: var(--handle-size);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(255,255,255,0.75) 30%, rgba(29,78,216,1) 31%, rgba(29,78,216,1));
      border: 2px solid #fff;
      box-shadow: 0 8px 20px rgba(29,78,216,0.3);
      z-index: 8;
      touch-action: none;
      display: none;
    }

    .frame.selected .resize-handle {
      display: block;
    }

    .guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .guide-line {
      position: absolute;
      background: rgba(29, 78, 216, 0.28);
      display: none;
    }

    .guide-line.v {
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .guide-line.h {
      left: 0;
      right: 0;
      height: 1px;
    }

    .mode-pill {
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(17, 24, 39, 0.88);
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
    }

    .status {
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(84vw, 460px);
      padding: 22px 18px;
      text-align: center;
      z-index: 2;
      color: #4b5563;
    }

    .empty h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }

    .empty p {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty strong {
      color: #111827;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .brand {
        font-size: 16px;
      }

      .btn,
      .seg-btn,
      .icon-btn {
        padding: 10px 12px;
        font-size: 13px;
      }

      .toolbar {
        left: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-row">
        <div class="brand panel">KABEPIC</div>
        <div class="chip-group">
          <div id="modePill" class="mode-pill hidden">位置調整モード</div>
          <div id="statusText" class="status panel">写真を追加してください</div>
        </div>
      </div>

      <div class="topbar-row">
        <div class="chip-group panel" style="padding: 8px;">
          <button class="seg-btn" data-layout="3">Calm 3</button>
          <button class="seg-btn" data-layout="5">Flow 5</button>
          <button class="seg-btn active" data-layout="8">Story 8</button>
          <button class="seg-btn" data-layout="11">Scene 11</button>
        </div>

        <div class="chip-group panel" style="padding: 8px;">
          <button id="toggleGridBtn" class="btn ghost">グリッド</button>
          <button id="saveBtn" class="btn ghost">保存</button>
          <button id="loadBtn" class="btn ghost">読込</button>
        </div>
      </div>
    </div>

    <div id="workspace" class="workspace">
      <div id="wall" class="wall">
        <div class="wall-grid"></div>
        <div id="framesLayer" class="frames-layer"></div>
        <div id="guide" class="guide">
          <div id="guideV" class="guide-line v"></div>
          <div id="guideH" class="guide-line h"></div>
        </div>
      </div>

      <div id="emptyState" class="empty panel">
        <h1>KPedit 初期土台</h1>
        <p><strong>写真を追加</strong>すると自動で縦 / 横 / 正方形に振り分けます。</p>
        <p>フレームは <strong>ドラッグ移動</strong>、右下ハンドルで<strong>サイズ変更</strong>、<br>フレームを<strong>長押し</strong>すると写真位置調整モードに入ります。</p>
      </div>
    </div>

    <div class="toolbar panel">
      <div class="toolbar-row scroll">
        <label class="btn primary file-label">
          写真を追加
          <input id="photoInput" type="file" accept="image/*" multiple />
        </label>
        <button id="toggleLockBtn" class="btn ghost">固定</button>
        <button id="changeShapeBtn" class="btn ghost">形変更</button>
        <button id="bringFrontBtn" class="btn ghost">前面</button>
        <button id="deleteBtn" class="btn warn">削除</button>
        <button id="resetBtn" class="btn ghost">リセット</button>
      </div>

      <div class="toolbar-row">
        <div class="toolbar-label">選択中</div>
        <div id="selectionInfo" class="status" style="flex: 1 1 auto;">なし</div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "kabepic-kpedit-state-v1";

      const RATIO_MAP = {
        vertical: 3 / 4,
        horizontal: 4 / 3,
        square: 1,
        oval: 4 / 5
      };

      const FRAME_IMAGE_MAP = {
        vertical: "images/frame_vertical.png",
        horizontal: "images/frame_horizontal.png",
        square: "images/frame_square.png",
        oval: "images/frame_oval.png"
      };

      const LAYOUT_PRESETS = {
        3: [
          { shape: "vertical",   x: 0.13, y: 0.20, w: 0.22, z: 1 },
          { shape: "square",     x: 0.41, y: 0.15, w: 0.20, z: 2 },
          { shape: "horizontal", x: 0.57, y: 0.39, w: 0.26, z: 3 }
        ],
        5: [
          { shape: "vertical",   x: 0.08, y: 0.22, w: 0.18, z: 1 },
          { shape: "square",     x: 0.30, y: 0.12, w: 0.16, z: 2 },
          { shape: "horizontal", x: 0.51, y: 0.16, w: 0.22, z: 3 },
          { shape: "vertical",   x: 0.72, y: 0.31, w: 0.17, z: 4 },
          { shape: "horizontal", x: 0.30, y: 0.53, w: 0.24, z: 5 }
        ],
        8: [
          { shape: "vertical",   x: 0.06, y: 0.18, w: 0.15, z: 1 },
          { shape: "square",     x: 0.24, y: 0.11, w: 0.14, z: 2 },
          { shape: "horizontal", x: 0.43, y: 0.11, w: 0.20, z: 3 },
          { shape: "vertical",   x: 0.69, y: 0.17, w: 0.14, z: 4 },
          { shape: "square",     x: 0.17, y: 0.41, w: 0.14, z: 5 },
          { shape: "horizontal", x: 0.38, y: 0.42, w: 0.19, z: 6 },
          { shape: "vertical",   x: 0.63, y: 0.47, w: 0.14, z: 7 },
          { shape: "square",     x: 0.79, y: 0.33, w: 0.13, z: 8 }
        ],
        11: [
          { shape: "vertical",   x: 0.04, y: 0.16, w: 0.13, z: 1 },
          { shape: "square",     x: 0.18, y: 0.08, w: 0.12, z: 2 },
          { shape: "horizontal", x: 0.34, y: 0.08, w: 0.18, z: 3 },
          { shape: "vertical",   x: 0.58, y: 0.10, w: 0.13, z: 4 },
          { shape: "square",     x: 0.74, y: 0.12, w: 0.11, z: 5 },
          { shape: "vertical",   x: 0.11, y: 0.39, w: 0.12, z: 6 },
          { shape: "horizontal", x: 0.26, y: 0.34, w: 0.18, z: 7 },
          { shape: "square",     x: 0.49, y: 0.39, w: 0.11, z: 8 },
          { shape: "vertical",   x: 0.65, y: 0.36, w: 0.12, z: 9 },
          { shape: "horizontal", x: 0.29, y: 0.62, w: 0.19, z: 10 },
          { shape: "square",     x: 0.70, y: 0.58, w: 0.11, z: 11 }
        ]
      };

      const state = {
        photos: [],
        photoIndex: 0,
        frames: [],
        layoutCount: 8,
        selectedFrameId: null,
        editMode: "layout",
        drag: null,
        resize: null,
        longPressTimer: null,
        longPressFrameId: null,
        zCounter: 100,
        showGrid: false
      };

      const els = {
        workspace: document.getElementById("workspace"),
        wall: document.getElementById("wall"),
        framesLayer: document.getElementById("framesLayer"),
        emptyState: document.getElementById("emptyState"),
        photoInput: document.getElementById("photoInput"),
        selectionInfo: document.getElementById("selectionInfo"),
        statusText: document.getElementById("statusText"),
        modePill: document.getElementById("modePill"),
        toggleLockBtn: document.getElementById("toggleLockBtn"),
        changeShapeBtn: document.getElementById("changeShapeBtn"),
        bringFrontBtn: document.getElementById("bringFrontBtn"),
        deleteBtn: document.getElementById("deleteBtn"),
        resetBtn: document.getElementById("resetBtn"),
        saveBtn: document.getElementById("saveBtn"),
        loadBtn: document.getElementById("loadBtn"),
        toggleGridBtn: document.getElementById("toggleGridBtn"),
        guideV: document.getElementById("guideV"),
        guideH: document.getElementById("guideH"),
        layoutButtons: Array.from(document.querySelectorAll("[data-layout]"))
      };

      function uid(prefix = "id") {
        return `${prefix}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function getWallRect() {
        return els.wall.getBoundingClientRect();
      }

      function getFrameById(id) {
        return state.frames.find(frame => frame.id === id) || null;
      }

      function getSelectedFrame() {
        return getFrameById(state.selectedFrameId);
      }

      function classifyAspect(width, height) {
        const ratio = width / height;
        if (ratio > 1.05) return "horizontal";
        if (ratio < 0.95) return "vertical";
        return "square";
      }

      function nextShape(shape) {
        const shapes = ["vertical", "horizontal", "square", "oval"];
        const currentIndex = shapes.indexOf(shape);
        return shapes[(currentIndex + 1) % shapes.length];
      }

      function getPhotoFit(shape, photoAspectType) {
        if (shape === "square" && photoAspectType === "square") {
          return "contain";
        }
        return "cover";
      }

      function updateStatus(text) {
        els.statusText.textContent = text;
      }

      function setMode(mode) {
        state.editMode = mode;
        if (mode === "position") {
          els.modePill.classList.remove("hidden");
          updateStatus("写真位置調整モード：選択中フレームを上下左右にドラッグ");
        } else {
          els.modePill.classList.add("hidden");
          updateStatus(state.photos.length ? "編集モード：ドラッグで移動、右下でサイズ変更" : "写真を追加してください");
        }
      }

      function setSelectedFrame(id) {
        state.selectedFrameId = id;
        render();
      }

      function clearSelection() {
        state.selectedFrameId = null;
        render();
      }

      function showGuides(x, y) {
        els.guideV.style.display = "block";
        els.guideH.style.display = "block";
        els.guideV.style.left = `${x}px`;
        els.guideH.style.top = `${y}px`;
      }

      function hideGuides() {
        els.guideV.style.display = "none";
        els.guideH.style.display = "none";
      }

      function selectLayoutButton(count) {
        els.layoutButtons.forEach(btn => {
          btn.classList.toggle("active", Number(btn.dataset.layout) === count);
        });
      }

      function getPhotoById(photoId) {
        return state.photos.find(p => p.id === photoId) || null;
      }

      function getAssignablePhotos() {
        return state.photos.slice();
      }

      function pickPhotoForShape(shape, startOffset = 0) {
        const list = getAssignablePhotos();
        if (!list.length) return null;

        const preferred = list.filter(photo => {
          if (shape === "oval") return true;
          return photo.aspectType === shape;
        });

        const source = preferred.length ? preferred : list;
        const index = (state.photoIndex + startOffset) % source.length;
        state.photoIndex = (state.photoIndex + 1) % source.length;
        return source[index];
      }

      function createFrameFromPreset(preset, index) {
        const photo = pickPhotoForShape(preset.shape, index);
        const frame = {
          id: uid("frame"),
          shape: preset.shape,
          x: preset.x,
          y: preset.y,
          w: preset.w,
          locked: false,
          z: ++state.zCounter,
          photoId: photo ? photo.id : null,
          offsetX: 50,
          offsetY: 50,
          fit: photo ? getPhotoFit(preset.shape, photo.aspectType) : "cover"
        };
        return frame;
      }

      function applyLayout(count) {
        state.layoutCount = count;
        selectLayoutButton(count);

        const presets = LAYOUT_PRESETS[count];
        const existingSelectedId = state.selectedFrameId;
        const lockedFrames = state.frames.filter(frame => frame.locked);

        const nextFrames = presets.map((preset, index) => {
          const lockedMatch = lockedFrames[index];
          if (lockedMatch) {
            return {
              ...lockedMatch,
              shape: lockedMatch.shape || preset.shape,
              x: clamp(lockedMatch.x, 0, 1),
              y: clamp(lockedMatch.y, 0, 1),
              w: clamp(lockedMatch.w, 0.1, 0.45),
              z: ++state.zCounter
            };
          }
          return createFrameFromPreset(preset, index);
        });

        state.frames = nextFrames;
        if (!state.frames.find(frame => frame.id === existingSelectedId)) {
          state.selectedFrameId = state.frames[0] ? state.frames[0].id : null;
        }
        render();
      }

      function createPhotoRecord(file) {
        return new Promise((resolve, reject) => {
          const objectUrl = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            const record = {
              id: uid("photo"),
              name: file.name,
              src: objectUrl,
              width: img.naturalWidth,
              height: img.naturalHeight,
              aspectType: classifyAspect(img.naturalWidth, img.naturalHeight)
            };
            resolve(record);
          };
          img.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error(`画像の読み込みに失敗しました: ${file.name}`));
          };
          img.src = objectUrl;
        });
      }

      async function handlePhotoInput(event) {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;

        try {
          const records = await Promise.all(files.map(createPhotoRecord));
          state.photos.push(...records);
          assignPhotosToFrames();
          els.emptyState.classList.add("hidden");
          updateStatus(`${records.length}枚追加しました`);
          render();
        } catch (error) {
          console.error(error);
          alert(error.message || "画像追加に失敗しました");
        } finally {
          event.target.value = "";
        }
      }

      function assignPhotosToFrames() {
        if (!state.photos.length) return;
        const list = state.photos.slice();

        state.frames.forEach((frame, index) => {
          if (frame.locked && frame.photoId && getPhotoById(frame.photoId)) {
            return;
          }

          const preferred = list.filter(photo => {
            if (frame.shape === "oval") return true;
            return photo.aspectType === frame.shape;
          });

          const source = preferred.length ? preferred : list;
          const photo = source[index % source.length];
          if (photo) {
            frame.photoId = photo.id;
            frame.fit = getPhotoFit(frame.shape, photo.aspectType);
            if (typeof frame.offsetX !== "number") frame.offsetX = 50;
            if (typeof frame.offsetY !== "number") frame.offsetY = 50;
          }
        });
      }

      function deleteSelectedFrame() {
        const selected = getSelectedFrame();
        if (!selected) return;
        state.frames = state.frames.filter(frame => frame.id !== selected.id);
        state.selectedFrameId = state.frames[0] ? state.frames[0].id : null;
        render();
      }

      function bringSelectedToFront() {
        const selected = getSelectedFrame();
        if (!selected) return;
        selected.z = ++state.zCounter;
        render();
      }

      function toggleSelectedLock() {
        const selected = getSelectedFrame();
        if (!selected) return;
        selected.locked = !selected.locked;
        render();
      }

      function changeSelectedShape() {
        const selected = getSelectedFrame();
        if (!selected) return;
        selected.shape = nextShape(selected.shape);
        const photo = selected.photoId ? getPhotoById(selected.photoId) : null;
        if (photo) {
          selected.fit = getPhotoFit(selected.shape, photo.aspectType);
        }
        render();
      }

      function framePixelRect(frame) {
        const wallRect = getWallRect();
        const width = frame.w * wallRect.width;
        const height = width / RATIO_MAP[frame.shape];
        return {
          left: frame.x * wallRect.width,
          top: frame.y * wallRect.height,
          width,
          height
        };
      }

      function normalizeFrameWithinWall(frame) {
        const wallRect = getWallRect();
        const minW = wallRect.width * 0.10;
        const maxW = wallRect.width * 0.42;
        frame.w = clamp(frame.w, minW / wallRect.width, maxW / wallRect.width);

        const width = frame.w * wallRect.width;
        const height = width / RATIO_MAP[frame.shape];

        const marginX = wallRect.width * 0.03;
        const marginY = wallRect.height * 0.05;

        frame.x = clamp(frame.x, marginX / wallRect.width, (wallRect.width - width - marginX) / wallRect.width);
        frame.y = clamp(frame.y, marginY / wallRect.height, (wallRect.height - height - marginY) / wallRect.height);
      }

      function saveState() {
        try {
          const data = {
            layoutCount: state.layoutCount,
            frames: state.frames.map(frame => ({
              id: frame.id,
              shape: frame.shape,
              x: frame.x,
              y: frame.y,
              w: frame.w,
              locked: frame.locked,
              z: frame.z,
              photoName: frame.photoId ? (getPhotoById(frame.photoId)?.name || null) : null,
              offsetX: frame.offsetX,
              offsetY: frame.offsetY,
              fit: frame.fit
            }))
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          updateStatus("レイアウトを保存しました");
        } catch (error) {
          console.error(error);
          alert("保存に失敗しました");
        }
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            alert("保存データがありません");
            return;
          }

          const parsed = JSON.parse(raw);
          state.layoutCount = Number(parsed.layoutCount) || 8;
          selectLayoutButton(state.layoutCount);

          const nameMap = new Map(state.photos.map(photo => [photo.name, photo.id]));
          state.frames = (parsed.frames || []).map(item => {
            const photoId = item.photoName ? nameMap.get(item.photoName) || null : null;
            return {
              id: item.id || uid("frame"),
              shape: item.shape || "square",
              x: Number(item.x) || 0.1,
              y: Number(item.y) || 0.1,
              w: Number(item.w) || 0.2,
              locked: Boolean(item.locked),
              z: Number(item.z) || ++state.zCounter,
              photoId,
              offsetX: typeof item.offsetX === "number" ? item.offsetX : 50,
              offsetY: typeof item.offsetY === "number" ? item.offsetY : 50,
              fit: item.fit || "cover"
            };
          });

          state.frames.forEach(normalizeFrameWithinWall);
          state.selectedFrameId = state.frames[0] ? state.frames[0].id : null;
          render();
          updateStatus("保存済みレイアウトを読み込みました");
        } catch (error) {
          console.error(error);
          alert("読み込みに失敗しました");
        }
      }

      function resetAll() {
        if (!confirm("配置を初期化します。よろしいですか？")) return;
        state.frames = [];
        state.selectedFrameId = null;
        state.photoIndex = 0;
        applyLayout(state.layoutCount);
        assignPhotosToFrames();
        render();
        updateStatus("レイアウトを初期化しました");
      }

      function formatSelectionInfo(frame) {
        if (!frame) return "なし";
        const photo = frame.photoId ? getPhotoById(frame.photoId) : null;
        const shapeLabelMap = {
          vertical: "縦",
          horizontal: "横",
          square: "正方形",
          oval: "楕円"
        };
        return `${shapeLabelMap[frame.shape] || frame.shape} / ${photo ? photo.name : "写真なし"}${frame.locked ? " / 固定" : ""}`;
      }

      function render() {
        els.wall.classList.toggle("show-grid", state.showGrid);
        els.emptyState.classList.toggle("hidden", state.photos.length > 0 || state.frames.length > 0);

        const selected = getSelectedFrame();
        els.selectionInfo.textContent = formatSelectionInfo(selected);

        els.toggleLockBtn.textContent = selected?.locked ? "固定解除" : "固定";
        els.changeShapeBtn.disabled = !selected;
        els.toggleLockBtn.disabled = !selected;
        els.bringFrontBtn.disabled = !selected;
        els.deleteBtn.disabled = !selected;

        els.framesLayer.innerHTML = "";

        const framesSorted = [...state.frames].sort((a, b) => a.z - b.z);
        const wallRect = getWallRect();

        framesSorted.forEach((frame, index) => {
          normalizeFrameWithinWall(frame);

          const frameEl = document.createElement("div");
          frameEl.className = "frame" + (frame.id === state.selectedFrameId ? " selected" : "");
          frameEl.dataset.id = frame.id;
          frameEl.dataset.shape = frame.shape;
          frameEl.dataset.selected = String(frame.id === state.selectedFrameId);
          frameEl.dataset.locked = String(frame.locked);
          frameEl.style.zIndex = String(frame.z);

          const widthPx = frame.w * wallRect.width;
          const heightPx = widthPx / RATIO_MAP[frame.shape];

          frameEl.style.left = `${frame.x * wallRect.width}px`;
          frameEl.style.top = `${frame.y * wallRect.height}px`;
          frameEl.style.width = `${widthPx}px`;
          frameEl.style.height = `${heightPx}px`;

          const shapeClassMap = {
            vertical: "window-v",
            horizontal: "window-h",
            square: "window-s",
            oval: "window-o"
          };

          frameEl.classList.add(shapeClassMap[frame.shape] || "window-s");

          const inner = document.createElement("div");
          inner.className = "frame-inner";

          const photoWindow = document.createElement("div");
          photoWindow.className = "frame-photo-window";

          const img = document.createElement("img");
          img.className = "frame-photo";
          const photo = frame.photoId ? getPhotoById(frame.photoId) : null;
          if (photo) {
            img.src = photo.src;
            img.alt = photo.name;
            img.classList.add(frame.fit || "cover");
          } else {
            img.alt = "photo";
            img.classList.add("cover");
          }
          img.style.objectPosition = `${frame.offsetX ?? 50}% ${frame.offsetY ?? 50}%`;

          photoWindow.appendChild(img);

          const overlayFallback = document.createElement("div");
          overlayFallback.className = "frame-overlay-fallback";

          const overlayImg = document.createElement("img");
          overlayImg.className = "frame-overlay-img";
          overlayImg.alt = "";
          overlayImg.src = FRAME_IMAGE_MAP[frame.shape] || "";
          overlayImg.onerror = () => {
            overlayImg.classList.add("is-hidden");
          };

          const badge = document.createElement("div");
          badge.className = "frame-badge";
          badge.textContent = String(index + 1);

          const lock = document.createElement("div");
          lock.className = "frame-lock";
          lock.textContent = "固定";

          const resizeHandle = document.createElement("div");
          resizeHandle.className = "resize-handle";
          resizeHandle.dataset.role = "resize";

          inner.appendChild(photoWindow);
          inner.appendChild(overlayFallback);
          inner.appendChild(overlayImg);

          frameEl.appendChild(inner);
          frameEl.appendChild(badge);
          frameEl.appendChild(lock);
          frameEl.appendChild(resizeHandle);

          attachFrameEvents(frameEl, frame);
          els.framesLayer.appendChild(frameEl);
        });
      }

      function pointerXY(event) {
        if (event.touches && event.touches[0]) {
          return { x: event.touches[0].clientX, y: event.touches[0].clientY };
        }
        return { x: event.clientX, y: event.clientY };
      }

      function attachFrameEvents(frameEl, frame) {
        const resizeHandle = frameEl.querySelector(".resize-handle");

        frameEl.addEventListener("pointerdown", event => {
          if (event.target === resizeHandle) return;

          event.stopPropagation();
          const point = pointerXY(event);
          setSelectedFrame(frame.id);

          state.longPressFrameId = frame.id;
          clearTimeout(state.longPressTimer);
          state.longPressTimer = setTimeout(() => {
            if (state.selectedFrameId === frame.id) {
              setMode("position");
              navigator.vibrate?.(12);
            }
          }, 420);

          if (frame.locked) return;

          if (state.editMode === "position") {
            state.drag = {
              type: "position",
              frameId: frame.id,
              startX: point.x,
              startY: point.y,
              startOffsetX: frame.offsetX ?? 50,
              startOffsetY: frame.offsetY ?? 50
            };
            return;
          }

          state.drag = {
            type: "move",
            frameId: frame.id,
            startX: point.x,
            startY: point.y,
            startFrameX: frame.x,
            startFrameY: frame.y
          };
        });

        frameEl.addEventListener("pointerup", () => {
          clearTimeout(state.longPressTimer);
        });

        frameEl.addEventListener("pointercancel", () => {
          clearTimeout(state.longPressTimer);
        });

        resizeHandle.addEventListener("pointerdown", event => {
          event.stopPropagation();
          event.preventDefault();
          clearTimeout(state.longPressTimer);
          setSelectedFrame(frame.id);

          if (frame.locked) return;

          const point = pointerXY(event);
          state.resize = {
            frameId: frame.id,
            startX: point.x,
            startW: frame.w
          };
        });
      }

      function onWorkspacePointerDown() {
        clearTimeout(state.longPressTimer);
        hideGuides();
        if (state.editMode === "position") {
          setMode("layout");
        }
        clearSelection();
      }

      function onPointerMove(event) {
        const wallRect = getWallRect();
        const point = pointerXY(event);

        if (state.drag) {
          const frame = getFrameById(state.drag.frameId);
          if (!frame) return;

          clearTimeout(state.longPressTimer);

          if (state.drag.type === "move") {
            const dx = point.x - state.drag.startX;
            const dy = point.y - state.drag.startY;

            frame.x = state.drag.startFrameX + dx / wallRect.width;
            frame.y = state.drag.startFrameY + dy / wallRect.height;
            normalizeFrameWithinWall(frame);

            const rect = framePixelRect(frame);
            showGuides(rect.left + rect.width / 2, rect.top + rect.height / 2);
          }

          if (state.drag.type === "position") {
            const dx = point.x - state.drag.startX;
            const dy = point.y - state.drag.startY;

            frame.offsetX = clamp(state.drag.startOffsetX - dx * 0.10, 0, 100);
            frame.offsetY = clamp(state.drag.startOffsetY - dy * 0.10, 0, 100);
          }

          render();
        }

        if (state.resize) {
          const frame = getFrameById(state.resize.frameId);
          if (!frame) return;

          const dx = point.x - state.resize.startX;
          frame.w = state.resize.startW + dx / wallRect.width;
          normalizeFrameWithinWall(frame);

          const rect = framePixelRect(frame);
          showGuides(rect.left + rect.width, rect.top + rect.height);
          render();
        }
      }

      function onPointerUp() {
        clearTimeout(state.longPressTimer);
        state.drag = null;
        state.resize = null;
        hideGuides();
      }

      function initEvents() {
        els.photoInput.addEventListener("change", handlePhotoInput);

        els.layoutButtons.forEach(btn => {
          btn.addEventListener("click", () => {
            const count = Number(btn.dataset.layout);
            applyLayout(count);
            assignPhotosToFrames();
            updateStatus(`Frames: ${count} に変更しました`);
            render();
          });
        });

        els.toggleLockBtn.addEventListener("click", () => {
          toggleSelectedLock();
          const selected = getSelectedFrame();
          updateStatus(selected?.locked ? "固定しました" : "固定を解除しました");
        });

        els.changeShapeBtn.addEventListener("click", () => {
          changeSelectedShape();
          updateStatus("フレーム形状を変更しました");
        });

        els.bringFrontBtn.addEventListener("click", () => {
          bringSelectedToFront();
          updateStatus("前面へ移動しました");
        });

        els.deleteBtn.addEventListener("click", () => {
          deleteSelectedFrame();
          updateStatus("削除しました");
        });

        els.resetBtn.addEventListener("click", resetAll);
        els.saveBtn.addEventListener("click", saveState);
        els.loadBtn.addEventListener("click", loadState);

        els.toggleGridBtn.addEventListener("click", () => {
          state.showGrid = !state.showGrid;
          els.toggleGridBtn.classList.toggle("primary", state.showGrid);
          render();
        });

        els.workspace.addEventListener("pointerdown", event => {
          if (event.target === els.workspace || event.target === els.wall || event.target === els.framesLayer) {
            onWorkspacePointerDown();
          }
        });

        window.addEventListener("pointermove", onPointerMove, { passive: false });
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);

        window.addEventListener("resize", () => {
          state.frames.forEach(normalizeFrameWithinWall);
          render();
        });
      }

      function bootstrap() {
        initEvents();
        applyLayout(8);
        render();
      }

      bootstrap();
    })();
  </script>
</body>
</html>
